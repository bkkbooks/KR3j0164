body:
  text: 香祖筆記卷九刑部尚書王士禎撰蜀人射白鷴錦雞以食余嘗賦詩記其事范石湖桂海虞衡志載嶺南近海郡或以鸚鵡作鮓孔雀翡翠為臘余邑子又有嗜食金魚者天地間何所不有玳瑁背有甲十三片海人養以鹽水飼以纎鱗遇甲子庚申日輒不食謂之玳瑁齋見虞衡志真臘風土記牛馬死不敢食亦不剝其皮革云以其與人出力故此俗勝中國人多矣朱相國平涵湧幢小品載其嘗館一貴人家其人奉齋一日怒厨人凡易十餘品俱不稱意朱笑謂之曰何不開齋近吳湖州園次綺遊廣州有僧大汕者日伺候督撫將軍諸監司之門一日向吳自述酬應雜遝不堪其苦吳笑應之曰汝既苦之何不出了家座上皆大噱二事頗相類而吳語尤可味楊誠齋詩云袈裟未著言多事著了袈裟事更多其此僧之謂乎天台山志僑寓條首載沈約字休文陳征鹵將軍永平中棄官乞為道士來憩桐柏見剡縣金庭觀石刻妄語可笑梁陳間安得兩沈約皆字休文休文為梁武帝佐命與陳逺不相及何以有此謬妄蓋道釋好為傅會往往不稽時代不諳事理如真靈位業圖之類不可勝數也鶴林玊露以范雲與陳武帝九錫之命亦可笑余於宋南渡後詩自陸放翁之外最喜薑夔堯章堯章又號白石道人學詩於蕭千巖而與范石湖楊誠齋善時黃岩老亦號白石亦學詩於千巖時稱雙白石云右見鶴林玉露南渡四大家為蕭楊范陸而誠齋答堯章詩云尤蕭范陸四詩翁則謂遂初也玉露言子瞻謫儋州子由謫雷州魯直謫宜州皆章惇取其字之偏傍而謔之當時有術士曰儋字從立人子瞻其北歸乎雷字雨在田上承天之澤子由其未艾乎宜字有蓋棺之象魯直其不返乎後皆驗豫考之殊不然山谷以紹聖初謫涪州徙戎州徽宗即位赦復官建中靖國元年除知舒州崇寧元年知太平州二年以承天寺記為陳舉所訐羈管宜州竟卒於宜先是東坡已以建中靖國元年卒常州矣安得如羅云云乎按此説本之老學菴筆記乃謂二蘇公與劉莘老丞相莘老時貶新州故也余邑先輩文獻無徵每以為恨故於羣書中遇邑人逸事遺文輒掌録之乙酉再至安德觀永平府志得邑方伯徐公凖詩一首盧龍塞云燕呼黑水作盧龍塞北風沙泣斷蓬漢將已隨羌笛老秦人莫恨久從戎公即詩人夜字東癡之曾祖也萬厯中嘗為永平太守朱性甫鐵網珊瑚載鮮于伯機所藏有唐沈傳師墨迹一絶云積雪隂山欲度難傳更深夜鐵衣寒將軍破了單于陳更把兵書子細看傳師元和間名臣有嶽麓寺長句最佳此詩殊不類唐人風調合肥龔大宗伯鼎孳往往酒酣賦詩輒用杜韻歌行亦然豫嘗舉以為問公笑曰無他只是捆了好打耳新安門人汪洪度字于鼎夙有詩名嘗有詠一品妃詩云敢以三春草蒙稱一品妃植根緣湛露發艷借恩輝幸自生同蒂羞將影獨違未須勞逺寄念此亦當歸自注當歸花曾入禁苑賜此名余按藥花入詩最新如人參枳殼皆見唐人詩連翹見楊太宰夢山詩余丙子使蜀山路中見白芨花因得西風盡日濛濛雨開遍空山白芨花之句若當歸詩人止習用太史慈薑伯約事未詠其花始見于鼎此詩耳按崔豹古今注當歸一名文無本草云七八月開花似蒔蘿淺紫色余偶論唐宋大家七言歌行譬之宗門李杜如來禪蘇黃祖師禪也謝方山重輝别業杏花村之東有古槐十餘株傳是正德年間物乃總督宣大楊順侍郎故居也楊即殺沈鍊以媚嚴嵩者豫徘徊其下顧謂方山曰此樹閲世古矣惜非安石之甘棠詞家綺麗豪放二𣲖往往分左右袒豫謂第當分正變不當分優劣四十年前在廣陵與鄒訏士祇謨同定倚聲集豫評陳卧子詞云如香車金犢流連陌阡反令人思草頭一點之樂宋人書問自尊與卑曰不具以卑上尊曰不備朋友交馳曰不宣見東軒筆録今人多不辨此然三字之分别殊亦不解孫仲謀欲築濡須塢諸將曰上岸擊賊跣足入船何用塢為快語讀之輒為浮一大白古樂府詩云百金買寶刀懸著中梁柱一日三摩挲劇于十五女等是快語語有令人骨騰肉飛者此類是也余家自高曾祖父已來各房正廳皆置兩素屏一書心相三十六善一書陽宅三十六祥所以垂家訓示子孫也按三十六善見宋吳處厚青箱雜記三十六祥未詳所出又各房正廳一聯云紹祖宗一脈真傳克勤克儉教子孫兩行正路惟讀惟耕青箱雜記云前代有翰林學士本朝咸平中始置翰林侍讀學士以楊徽之為之又置翰林侍講學士以邢昺為之此讀講學士之始亦見石林燕語鴟尾之説傳記紛紜不一對類總龜謂龍生九子一名嘲風好險在殿角一名蚩吻好吞在殿脊博物志逸篇云螭􅀈形似獸性好望故立屋角上􅀈􅀈形似龍性好風雨故用於屋脊二説已不同唐會要云漢武柏梁殿災越巫獻術言海中有魚名虬其尾似鴟激浪則降雨遂作其形置殿脊以厭火災又或謂漢柏梁臺災越巫上厭勝之法乃大起建章宫遂設鴟尾之象於殿脊二説亦有不同又龍九子一名霸下好負重故為碑座屓屭好文在碑文兩旁亦出總龜博物志逸篇又云屭贔性好負重故用載石碑螭虎形似龍性好文采故立於碑文上二説名字亦不同顧鄰初宗伯説略云霸下未詳屭贔韻會云鼇也一曰雌鼇吳都賦云巨鼇屭贔是也廣雅云有角曰􅬔龍無角曰􅀈音螭龍今世石碑上下四旁率刻螭虎而載石作龜形蓋似鼇而稍訛霸下則竟不知何狀即龍生九子其名亦無一定之説也漢光武帝曰仕宦當作執金吾師古曰金吾鳥名也主辟不祥逸篇又以為九子之一云金吾形似美人首尾有兩翼其性通靈不睡故用以巡警則又似鰥魚之屬鰥魚見孔叢子又應劭曰吾者禦也掌執金革以禦非常古今注曰執金吾棒也以銅為之金塗兩末謂之金吾余向疑宋攻作之局曰文思院不詳命名之意青箱雜記云考工記栗氏掌攻金其量銘曰時文思索故今世攻作之所號文思院江鄰幾云或説文思殿名聚工巧於其側因名之曰文思院使玉茗花海紅花皆山茶也古詩云淺為玉茗深都勝大曰山茶小海紅都勝即寶珠山茶田綸霞雯少司徒為詩文好新異康熙壬午謝病歸浹歲臥疴醫立方以進輒嫌其俗易他名始服之如以枸杞為天精人參為地精木香為東華童子之類其癖好新竒如此秦俗尚白民間遇元旦賀壽吉慶事輒麻巾素衣以往余所經歷西安鳯翔漢中諸府皆然聞西巡時民庶迎駕亦不改服按六朝人主宴處戴白紗帽晉人好著白接㒿謝萬著白綸巾南齊垣崇祖著白紗帽南史和帝時百姓皆著下簷白紗帽唐六典天子服有白紗帽又唐制新進士皆白袍故有袍似爛銀文似錦相將白日上青天之句而肅宗與李泌同出觀者謂衣黃聖人衣白山人則人臣在君前亦可衣白矣清波雜志載宋乾道中內相王日嚴謂一堂環坐皆淺素極可憎乞仍存紫衫又云前此仕族子弟未受官者皆衣白則六朝唐宋皆有之不止西方尚白也酉陽雜俎云北朝時徐州角城縣僧尼著白布法衣余家藏宋王晉卿煙江疊嶂圖長卷後有米元章書東坡長句康熙癸未三月萬壽節九卿皆進古書書畫為壽此卷蒙納入內府傳旨云向來進御凡畫概無收者此卷畫後米字甚佳故特納之仍諭知濟南有帝舜祠在南門之內癸未春方作醮事火忽自殿上出頃刻焚爇殆盡踰數日諸當事有事於祠方就殿址禮拜階下舜井水忽溢高數尺須臾泛濫急覓輿馬而出竟不終禮而罷亦異災也井水出祠北流入明湖至今尚然不知是何祥也泰山東嶽廟同時亦災上駐蹕杭州山隂耆民王錫元同胞兄弟五人見於行宫長次係雙生皆年八十三年七十八四年七十六五年七十五率子姪凡十七人孫十八人賜宴賜縀錦各一匹又賜御書扁額一門人瑞見邸報東坡志林載合浦老人蘇佛兒年八十二有兄二人長九十二次者九十亦庶幾矣四十四年春夏雨澤愆期至五月望乃雨二十一日雨自酉迄辰逺近霑足榖秫皆蘇豆乃播種六月初八十一日皆大雨縣東境有蝗自東北來南去不為災草四草五日復大雨清波雜志言鄭㿩叔靄集荆襄川蜀金石刻為五路墨寶既録碑之全文附以已説歐陽集古考究未備者間有辨正類為數巨册考證良備悉上祕府按宋人多留意金石文字惟歐陽永叔劉原父吕進伯趙明誠董逌黃長睿薛紹彭于今獨著鄭之名迄無知者不獨其書之湮沒無傳也惜哉南宋人陳起有寶刻叢編尤為該洽嘗從朱竹垞彛尊見寫本未暇鈔録濟寧州學武生歐陽淕叩閽自稱大禹之後下其詞巡撫議大禹姒姓歐陽淕狂率冒稱後裔革去武生依律充軍云明太宗攻濟南鐵鉉出戰倐見有羣僧助戰甚力迹之入大佛山琵琶洞中洞石壁上刻阿羅漢皆汗流浹體命以鐵撾碎其首像乃唐貞觀時製歷城穆吏部深字桂陽為閹寺所中罷歸鬱鬱成疾額中有一小人騎驢時時往來醫不知其何疾竟以是卒明德藩端王于白雲湖在章丘亦名劉郎中泊得一馬鹿形每宴會則列於筵前負八寶盤崇禎戊寅馬無故自斃未幾濟南陷濟南藩司署後臨明湖西偏即曾子固集中所謂西湖也曾守郡日嘗作名士軒軒今入署中明時尚有古竹數竿芍藥一叢傳是宋故物環明湖有七橋曰芙蓉水西湖西北池百花濼源石橋曾子固詩從此七橋風與月夢魂長到木蘭舟元張文忠養浩故居在今布政司街有七聘堂今改為祠明尹恭簡旻宅在歷城縣治東尹家巷邉尚書貢宅在王府前今巡撫衙署有萬卷樓王祭酒雲芝名同先尚書公諱李按察攀龍宅皆在西門外柴市許長史邦才宅在布政司街漢終軍故里在府城南九十里尹太宰旻尹家亭子在湖上邉尚書貢别業在張馬泊劉吏部天民别業在城南六十里弔枝菴許長史邦才别業在北水門外殷文壯士儋通樂園在趵突泉西趙尚書世卿别業在府城東祝店李按察攀龍白雪樓初在韓倉店所謂西揖華不注東揖鮑山者後改作於百花洲在王府後碧霞宫西許長史詩所謂湖上樓也今趵突泉東有白雪樓乃後人所建以寓仰止之意非舊迹也娥皇女英祠在趵突泉今廢曾子固詩層城齊魯衣冠會况有娥英詫世人水經注濼源亦謂娥英水以泉上有舜妃娥英廟故也俗人但知吕仙祠矣宋李易安名清照濟南李格非文叔之女詞中大家其母王狀元拱辰女亦工文章辛幼安棄疾亦歷城人亦詞中大家少與黨懷英同學南渡為名臣黨入金官翰林學士承旨尤工篆書德州謝生方山郎中之兄也嘗於城北水次掘得一甕色黝而光可以鑑舁置於家忽於黝光中見人影細審之具仙佛美人衣冠甲士種種諸相須臾變滅旬日後乃無所睹德州四牌坊西居人掘地得古冢中一石枕上鋟詩云百寶裝腰帶金絲絡臂韝笑時花近眼舞罷錦纒頭間門中今古録論李易安晚節改適云翁則清獻為時名臣又引瞿佑詩話清獻名家厄運乖羞將晚景對非才云云以挺之為抃謬矣蓋以閲道諡清獻而挺之諡清憲故致此舛訛耳謝肇浙西吳支乘云元時吳興三絶趙松雪書錢舜舉畫馮應科筆尹旻墓在八里山王雲芝墓在龍窩山南邉貢墓在萊莊劉天民墓在五里溝李攀龍墓在栁溝許邦才墓在火閘天心水面亭南有薛文清王文成二公祠東有許忠節公逵祠正統間文清以吏部尚書郭璡薦督學山東文成以𢎞治甲子典山東試得堂邑穆文簡孔暉為解元忠節初令樂陵當劉六之亂破賊全城後與孫忠烈公燧同死宸濠之變祠中有庶子何洛文碑又一碑刻大復先生何景明樂陵令行一篇洛文即大復之孫也濟南郡城東七十里龍山鎮即水經注巨合城也漢耿弇討費敢進兵先脅巨里即此東坡陽關詞濟南春好雪初晴行到龍山馬足輕舊注引孟嘉落帽事固大謬施注竟略之以此知注書之難而陸務觀任淵皆不敢注蘇有以也王文正不知藥欄之壞而時服其德量陳彭年不知僦宅有石榴樹而人譏其躁進其人品異也宋太宗問杜鎬官家之義鎬以三皇官天下五帝家天下為對太宗善之蔡雍獨斷曰親近侍從稱曰大家百官小吏稱曰天家天子無外以天下為家故稱天家也漢書東平王宇曰今縣官年少張晏曰不敢指斥成帝謂之縣官然不明著其義當亦稱陛下乘輿之義也雍又曰陛下者天子必有近臣執兵陳於陛側以戒不虞謂之陛下者羣臣與天子言不敢直斥故呼在陛下者而告之由卑達尊之意也乘輿出於律律云敢盜乘輿服御物謂天子所服食者也天子至尊不敢泄瀆言之故託之乘輿乘猶載也輿猶車也或謂之車駕又曰天子自謂曰行在所猶言行所至也澶淵之盟既成王欽若進孤注之説而萊公見疏太祖朝盧多遜請移都鎮州經略攻取俟復幽薊則還蹕於汴此真孤注耳本朝遇內朝行慶賀禮則上拜於兩宫之門內諸王公貝勒貝子等從拜於門外閣臣亦與焉六部尚書都察院左都御史已下則拜於午門最為得體宋天聖中明肅太后垂簾詔皇帝率羣臣上皇太后壽范文正仲淹方為祕閣挍理上疏請皇帝率親王皇族於內中上壽詔宰臣率百僚於前殿上兩宫壽即今制也事詳儒林公議無錫馬翀字雲翎文肅公世竒之孫起自孤露中康熙壬子江南鄉試詩有竒氣時時仿李長吉而未竟其才遊京師所皈心者獨余與崑山葉文敏訒菴方藹他無所詣也歸未幾而病依靈岩毅禪師於柏城菴得領悟一夕索筆書偈曰刀斫虛空於吾何有十里桃花千溪楊桞泊然而化年才三十惡詩相傳流為里諺此真風雅之厄也如世亂奴欺主時衰鬼弄人唐杜荀鶴詩也今朝有酒今朝醉明日愁來明日愁羅隱詩也但知行好事莫要問前程五代馮道詩也閉門不管庭前月分付梅花自主張南宋陳隨隱自述其先人藏一警句為真西山劉漫塘所賞擊者也宋太祖自陳橋擁兵回長入祗候班喬陸二卒長率衆拒於南門乃入自北解衣折箭誓不殺咸義不臣宋自縊太祖親至直舍歎曰忠義孩兒賜廟曰忠義易班曰孩兒終宋之世孩兒班帽後垂粉青頭􅣎為周世宗持服直舍正門以黃羅護之傍穿小門出入用以旌忠南渡景定間又命撰二侯加封碑文惜二侯之名無考碑文見隨隱漫録據此則宋歷朝之褒忠可謂至矣五代史乃不為韓通立傳何所忌諱耶王子融作唐餘録載韓通於忠義傳且冠以宋初褒贈之典有見哉薛尚功鐘鼎欵識第二卷有濟南鼎二其文如五嶽真形圖薛云是向􅡶傳本又云二銘字畫竒怪未容詮釋以鼎出濟南姑以名之此吾郡典故也然二鼎今不知所在或已入宣和內府矣楓窗小牘言宋婦人封號自夫人以下凡八等如侍郎以上封碩人太中大夫以上封令人通直郎以上封孺人今皆無之碩人孺人率為婦人之通稱矣楓窗小牘記東坡一帖録足疾方葳靈仙牛膝二味為末蜜丸空心服神效宋有杜善甫者濟南名士善為詩時有掌兵官逺戍其妻宴客竟夕笙歌善甫賦詩云高燒銀燭照雲鬟沸耳笙歌徹夜闌不念征西人萬里玉關霜重鐵衣寒聞者韙之詩見山書隨筆癸辛雜識言劉羲仲摘歐陽五代史之訛誤為糾謬一書以示坡公云云又言揮麈録云蜀人吳縝初第請于文忠願預官屬不許因作糾謬疑其别是一書不知吳縝所著糾繆乃新唐書也豫家有舊刻本當是公謹未睹此故疑為一書耳東坡志林云唐末五代文章衰盡詩有貫休齊已書有亞棲村俗之氣大略相似此論固然然齊已白蓮集至今尚傳余嘗見海虞馮氏寫本有荆南孫光憲序篇帙完好略無闕佚文章流傳信有命乎吾家西第石帆亭玉版書屋多大竹常有小鳥翠色飛鳴其間大僅踰婦人叉梁物或結巢堅緻如罘罳似即嶺南之翡翠也栁文暢有詠白蘋洲翡翠詩則不惟粵中有之矣李衛公有桐花鳳賦亦類此歸田録載宜春庫有翡翠盞一隻形似碧玉乃所謂翡翠屑金者非此鳥之羽也越絶言舜父頑母嚚兄狂弟傲尸子言舜事親養兄為天下法是舜又有兄也尸子又云其遊得六人曰雄陶方回續伯牙陽東不識秦不空皆賢者也或益以靈甫為七人然則舜既徴庸而七人者何以皆不見舉諸子之言誕妄不經如此吕覽淮南新序説苑之類類此者多有君子存而不論可矣東坡謂史記舜請流共工于幽陵以變北狄殛鯀于羽山以變東夷云云屈原云鯀悻直以亡身則鯀乃剛而犯上者耳若四族皆小人安能變四裔之俗哉蓋四族之誅皆非誅死但遷之遠方為要荒之君長爾此論與竹書紀年黜崇伯鯀合而史記乃附會以渾敦窮竒檮杌叨餮惡獸之名杜預又以檮杌為鯀若然則所謂不可教訓不知話言不惟方命圯族而已四嶽何為而舉而堯何為而姑試之耶皆不可通韓非子又謂堯欲傳天下於舜鯀與共工諌堯不聽舉兵而誅鯀于羽山誅共工于幽州吕氏春秋則謂堯以天下讓舜鯀為諸侯怒欲為亂比獸之角能以為城舉其尾能以為旌舜于是殛之羽山審若是則堯舜揖讓而先以征誅而舜乃以私憾殺鯀何以服天下由是黃熊元魚黃龍諸妄説紛紛而起禹何其不幸哉楚詞注堯長放鯀于羽山絶在不毛之地三年不舍其罪與東坡之説相近差可信南城陳伯璣允衡善論詩昔在廣陵評豫詩譬之昔人云偶然欲書此語最得詩文三昧今人連篇纍牘牽率應酬皆非偶然欲書者也坡翁稱錢唐程奕筆云使人作字不知有筆此語亦有妙理郭文答溫忠武曰人無害獸心則獸亦不害人豫佩此語終身故在世塗官中外者四十五年而與世淡忘如海鷗鳥晚嵗乃為風馬牛不相及之事為宵人媒蝎中傷似郭文之言有時而不驗然適遂其魚鳥之性雖不敢矯情德之亦未嘗以為怨也觀音經云咒詛諸毒藥所欲害身者念彼觀音力還著于本人坡翁改之實獲我心耳趙德麟侯鯖録以醉鄉日月為皇甫松持正撰誤也持正乃皇甫湜字松湜之子也余初撰五言詩七言詩成京師同人鈔寫祇有七部即蔣京少景祁所刻陽羡本也曲阜顔吏部修來光敏手鈔杜蘇黃陸四家歌行而以余詩次其後日雒誦之古藥方一兩乃今之三兩也隋合三兩為一兩右見江鄰幾雜志及侯鯖録今醫家或未知此蜀道有郎當驛即明皇雨中聞鈴聲處豫丙子嵗過之題詩驛壁云金雞賜帳事披猖河朔從兹不屬唐却使青騾行萬里三郎當日太郎當三郎郎當黃幡綽對明皇語也蜀道有花名龍爪花色殷紅秋日開林薄間甚艷又有蟲其聲清越如擊磬然豫壬子初入蜀曾有絶句云稻熟田家雨又風枝枝龍爪出林紅數聲清磬不知處山子晚啼黃葉中遊宦紀聞載永福古讖云龍爪花紅狀元西東後石壁松上生龍爪瑞花其年蕭國梁魁天下次舉黃定臚傳復第一距花生處東西各三十五里想即此花然山中樵蘇習見不知其為可貴也遊宦紀聞記程沙隨治腎虛腰痛方杜仲酒浸透炙乾搗羅為末無灰酒調下又記治食生冷心脾痛方用陳茱萸五六十粒水一大盞煎取汁去滓入平胃散三錢再煎熱服又沙隨嘗患淋日食白東瓜三大甌而愈干支即幹枝省文張世南云余昔閲高麗史愛其臣金富軾之文又兄弟一名軾一名轍疑其當宣和時去元祐未逺何以已竊取眉山二公之名讀遊宦紀聞云徐兢以宣和六年使高麗密訪其兄弟命名之意蓋有所慕文章動蠻貊語不虛云觀此則知余前疑不誤而是時中國方禁錮蘇黃文章字畫豈不為島夷所笑哉雪峯百里間多奯竹筍味甚美寺衆自三月至六月猶饜飫是義存禪師手植余考戴凱之竹紀六七十種而無奯竹先方伯贈尚書府君譜竹尤多亦不之及近杭僧奯堂有詩名其自號殆取諸雪峯云奯音豁字書云空大也五代楊少師凝式旦將出遊僕請所之楊曰宜東遊廣愛寺僕曰不若西遊石壁寺凝式舉鞭曰姑遊廣愛僕又請遊石壁凝式曰姑遊石壁此與明陳太常音也罷相似雖似可笑實有雲行水流之意可以心空及第歐陽文忠詩雒陽相君忠孝家可憐亦進姚黃花考澠水燕談雒陽進花始於李文定迪非始思公宋王闢之聖塗云皇祐中范文正公守青州興龍僧舍西南洋溪中有甘泉涌出公搆亭泉上刻石記之幽人逋客往往賦詩鳴琴烹茶其上日光玲瓏珍禽上下真物外之遊歐陽永叔劉貢父皆有詩刻石青人目之曰范公泉按范公泉非一今益都西南百八十里顔神鎮城東秋谷有范公祠泉清泠出祠中東北流合城西之籠水亦名顔娘泉北流歷淄川長山新城為孝水鄒平長白山東峯上之書堂西峯下之醴泉寺皆有范公泉蓋文正幼隨其母流寓長山讀書長白山中又往來秋谷故范泉有三皆其孤貧流寓時讀書之迹而青州之范泉則既貴後宦遊之迹也世或不知故詳著之海寧陸處士氷修嘉淑昔在京師與施愚山閏章梅耦長庚每夕必過豫邸不冠不襪縱談至夜分始别去陸有絶句紀事云科跣到門衣不船船襟紉蓋方言也若杜子美天子呼來不上船自紀實事冷齋夜話以為用方言則鑿矣武林陸圻字麗京晚號講山隱居賣藥後遊嶺南禮天然禪師法名今龍又常遊溫台諸山中無定所或云有見之武當者終不詳其蹤迹也或以問洪升昉思答以口號曰君問西泠陸講山飄然瓶鉢竟忘還乘雲或作孤飛鶴來往天台鴈宕間升豫門人以詩有名京師遭家難流寓困窮備極坎廪歸杭年餘五十矣甲申自苕霅歸落水死其詩大半經豫點定不知其子能收拾否蒲州吳雯天章詩尤超逸豫嘗目為仙才亦以甲申病歿於家皆士之才而不遇者而天終厄之如此惜哉豫童子時嘗夢人屬對出句云君子有酒旨且多豫應聲曰詩人之賦麗以則覺而不知所謂後亦卒無驗云香祖筆記卷九
