body:
  text: 香祖筆記卷三刑部尚書王士禎撰陳子昻文集十卷詩賦二卷雜文八卷與陳氏别傳及經籍志合子昻五言詩力變齊梁不湏言其表序碑記等作㳂襲頽波無可觀者第七卷上大周受命頌表一篇大周受命頌四章曰神鳯曰赤雀慶雲甿頌其辭謟誕不經至云乃命有司正皇典恢帝綱建大周之統歴革舊唐之遺號在宥天下咸與維新賜皇帝姓曰武氏臣聞王者受命必有錫氏軒轅二十五子班為十二姓髙陽才子二八名為十六族故聖人起則命歴昌必有錫氏之規云云集中又有請追上太原王帝號表太原王者士彠也此與揚雄劇秦美新無異殆又過之其下筆時不知世有節義亷恥事矣子昻真無忌憚之小人哉詩雖美吾不欲觀之矣子昻後死貪令段簡之手殆髙祖太宗之靈假手殛之耳特加在籍原任刑部侍郎任克溥尚書銜任聊城人順治丁亥己丑進士尋卒予奉使廣州屢見紅鸚鵡又有五色者尤珍麗姚旅云滇中多紅斑鳩又云曩宫中有黄鸚鵡屠長卿詩云一入雕籠奪翠裳羽毛新得染鵞黄此與漢赤鴈朱鷺隋宦官劉繼詮獻芙蓉鷗皆異物也熊掌最難熟故楚靈王請食熊蹯而死明秦府王孫不羈云用草繩匝掌煮之則易熟今世公卿士大夫下逮輿𨽻婦女無不嗜煙草者田家種之連畛頗獲厚利考之本草爾雅皆不載姚旅露書云呂宋國有草名淡巴菰一名曰金絲醺煙氣從管中入喉能令人醉亦辟瘴氣搗汁可毒頭蝨初漳州人自海外攜來莆田亦種之反多於呂宋今處處有之不獨閩矣山水豹遍身作山水紋故名萬厯乙夘上髙縣人得一虎身文皆作飛鳥走獸之狀峩嵋瓦屋山出貔貅常誦佛號予隴蜀餘聞載之雅州傅良選進士云其鄉蔡山多貔貅狀如黄牛犢性食虎豹而馴於人常至僧舎索食獨獸名似猿而大能食猿猿性羣獨性特猿鳴三獨鳴一見五侯鯖宣和畫譜所載最古者吴曹弗興耳畜獸首晉史道碩按西京雜記漢元帝時有安陵陳敞新豐劉白龔寛竝工為牛馬飛鳥下杜陽望樊育尤善布色皆與毛延夀同誅然則畜獸花鳥之類漢已多有不獨文翁石室畫古聖賢像而已若山水則後起者也石􅎕音刼南越志云形如龜甲或云脚遇春雨則生花右丞詩來經石􅎕春春字非趂韻也古人字無虛設如此自同州四十里至肅州東望大山金人云此新羅山其中産人参白附子與髙句驪接界見許亢宗行程録云議政大臣管侍衛内大臣一等公費揚古諡襄壯康熈四十年九月二十三日多羅平郡王納爾福諡悼康熈四十年九月二十三日鑲白旗漢軍都統雷繼尊諡敏慤康熈四十年十月十一日和碩簡親王雅布諡修康熈四十年十一月十三日和碩顯親王丹臻諡宻康熈四十一年六月二十三日都統管九門歩軍廵捕三營統領凱音布諡肅敏康熈四十一年閏六月十七日福建陸路提督總兵官左都督贈太子少保王萬祥諡敏壯康熈四十一年閏六月十七日浙江永嘉縣知縣殉難贈布政使司叅政馬琾諡忠勤康熈四十二年四月二十六日太子少傅禮部尚書保和殿大學士致仕加少傅王熙諡文靖康熈四十二年五月初四日吏部尚書文華殿大學士致仕伊桑阿諡文端康熈四十二年七月二十一日廣西富川知縣殉難贈太僕寺少卿劉欽鄰諡忠節康熈四十三年闕月闕日以副都御史陳論為刑部右侍郎海寧人辛丑甲辰進士王彦輔麈史云予在開封時長子渝遊相國寺得唐漳州刺史張登文集一册六卷權文公為之序其略曰詩賦之外誌記書序等合為一百二十篇彦輔又云所得書肆鏤本纔六十六篇已亾其半矣予續文稡登之文以至金石所傳裒而録之以廣前集惜彦輔之書亦無傳古剔犀器以滑地紫屏為貴底如仰瓦光澤而堅薄色如膠棗曰棗兒犀元時禾郡西塘楊滙所作漢僧徒著赤布僧迦梨秣陵僧衣色仿西竺宇文周忌聞黒衣之䜟易以黄色衣褐亦起於宇文鄭康成尚書中候注云比目魚一名東鯀見紺珠集内鄉李子田蓘撰宋藝圃集二十二卷凡二百八十人時在隆慶初元海内尊尚李王之𣲖諱言宋詩而子田獨闡幽抉異撰為此書其學識有過人者然於宋初載廖融江為沈彬孟賔于之流皆五代人也又取馬定國周昻李純甫趙渢龎鑄史肅劉昻霄諸人皆中州集所載金源之産定國又劉豫偽翰林學士也而與平園誠齋石湖放翁等幷列淄澠混淆所宜刋正華州郭宛委宗昌嘗從遼左得倭帥豐臣書一紙書間行草古雅蒼勁有晉唐風是朝鮮破後求其典籍之書也鱗介之族乃能好古如此王𢎞撰山史云東嘉趙士楨字常吉能詩工書明文華殿中書一日出内府藏硯悉刻前代年號命士楨改製刻萬厯字内有一硯乃唐文皇賜虞世南者士楨奏云太宗賢主世南名臣乞留此硯以彰前代君臣相與之美從之潄石閒談云成都有耕者得薛濤墓棺懸石室中四圍環以彩牋無慮數萬顔色鮮好觸風散若塵霧夫濤死而以牋殉牋在地下厯千年不瓌皆理之不可信者殆好事者為之耳兩廣雲貴多有毒蟲飲食後咀嚼當歸即解葉蒲州南岩傳治刀瘡藥方端午日取韭菜搗汁和石灰杵熟為餅用敷瘡處血即止即骨破亦可合竒效劉眘虛盛唐詩人之傑李華作三賢論論眘虛與元徳秀蕭頴士曰劉名儒史官之家兄弟以學著稱述詩書禮樂春秋為五説條貫源流備古今之變劉在京下嘗寢疾太尉房公時臨扶風聞之通夕不寐謂賔從曰挺卿日若不起無復有神道尚書劉公毎詣與談終日忘返嘆曰聞劉公清言見皇王之理矣殷直清有識尚恨言理少對未見劉面常想見其人渤海髙適逹夫落落有竒氣是皆重劉者也又云元罷魯山終於陸渾劉避地逝於安康蕭歸𦵏先人歿於汝南無復下夀云眘虛學行盖不僅詩人之冠冕惜不槩見於後世而所傳五言亦止十四篇新舊唐書儒學文苑皆不為眘虛立傳與韋蘇州同一憾亊眘虛字挺卿今亦無知者唐劉蛻文冡銘自評其文粲如星光如貝氣如蛟宫之水此喻最妙文冡在今潼川州予康熈壬子曽過之為賦一詩唐末古文並稱樵蛻蛻文泉子予所手録然不逮樵逺甚樵之文在大中時惟杜牧可稱勍敵吾鄉章丘縣有术氏乃金南渡奸相术虎髙琪之後歸潛志載劉勲少宣濟南詩云舟行著色屏風裏人在囬文錦字中勲初名訥字辯老雲中人金翰林學士趙秉文嘗述党承㫖懐英論詩云律詩最難工五十六字皆如聖賢中有一字不經鑪錘便如一屠沽兒厠其間也按此五代人劉昭禹語党述之耳大唐傳載開元東封有太原人于伯隴者年一百二十八嵗兩孫随之各年七八十矣詣闕引見自言臣神堯皇帝之臣也上賜紫袍牙笏優䘏有加唐時知貢舉皆預定親知權要皆得薦其私人乃至榜帖亦屬他人為之如摭言所載鄭顥託崔雍為榜延至榜除日待榜不至但遣小僮夀兒者𫝊云來早陳賀日暮夀兒寄宿院中夜已艾夀兒以蠟丸進顥即榜也主司在院而榜自外來且使命出入更無闗防已可笑尤可異者杜黄門第一榜第三塲庭叅之際謂諸生曰未有榜帖尹樞年七十餘獨趨進公欣然延之從容授以紙筆樞毎劄一人則抗聲斥其姓名列庭聞之皆咨嘆嗟其公道唯空其元公覽讀致謝訖乃以狀元為請樞曰狀元非老夫不可公大竒之即命筆親自劄之狀頭出於舉子自定殆近兒戲矣又鄭損舎人為主司以陸扆為狀元帖皆請扆自定范𫝊正作李翰林墓碑云與賀監汝陽王崔宗之裴周南等八人為酒中八仙周南之名杜酒中八仙歌無之唐書白本𫝊所載酒八仙人亦與杜詩同唐文宗太和中詔以李白歌詩張旭草書裴旻劔舞為三絶命翰林學士為之贊僖宗廣明元年車駕幸蜀詔曰行在三絶右散騎常侍李潼有曽閔之行職方郎中孫樵有揚馬之文前進士司空圖有巢許之風列在青史以章有唐中興之徳唐代留意風雅如此談之芬人齒頰風俗通漢有太守􅀈先井音膽有井春今誤作井春近在部見爰書有妙姓島姓盤姓民姓纒姓杵姓侴姓律姓茶姓煙姓穰姓首姓卑姓威姓氷姓坎姓榻姓攬姓慈姓章八元賦慈恩塔詩元白見之云不意嚴維出此弟子其詩鄙惡俚俗予於居易録已言之姚園客乃以為盧照鄰作又似無目人語矣李格非文叔易安之父也嘗著洛陽名園記不見其詩露書載其臨淄懐古絶句云擊鼓吹竽七百年臨淄城闕尚依然如今只有耕耘者曽得當時九府錢頗可誦京山李東白者能詩隠於衣工有登黄鶴樓七律最佳其中二聨云興饒老子胡牀上秋在仙人鐵笛中鄂渚霜花沿岸白漢陽楓樹隔江紅明詩諸選多録歐大任青衣李英詩而不及東白因著之李宗伯本寧嘗識其人後舟過雲夢吟詩拍手一笑躍入水死蜀青城山有牡丹二株皆髙三十丈號大將軍小將軍見元人題䟦朱圖南謂在羊亘見峭壁上秋海棠髙丈餘吐花如錦連綿十里尤竒又玉堂嘉話云海州東峽島生海棠作矮樹花㴱紅大如茶盌香韻殊絶毎嵗進御以金牌記之治難産方用杏仁一枚去皮一邉書日字一邉書月字用蜂蜜黏住外用熬蜜為丸滾白水或酒吞下此方乃異僧所傳露書中州才士近有襄城李來章禮山劉青藜太乙劉歌詩李古文皆有可傳劉庚辰公車至京師杯酒間為余言郟縣仝軌車同詩文皆擅絶壬午仝寄余長句瀏灕頓挫與劉勍敵也因語廵撫少司馬徐公青來潮門人張侍御蘧若瑗聘主大梁書院予昔使秦中偶遊慈恩寺見塔上康乃心題詩亟為延譽康遂以此知名當世皆今士人之才而貧者也康亦字太乙其詩曰園廟衣冠此内藏野花嵗嵗上陵香邯鄲鼓瑟應如舊贏得佳兒畢六王杜子美黒白二鷹詩干人何事網羅求南唐元宗謂馮延己云吹皺一池春水干卿何事舊唐書明皇為楚王叱金吾將軍武懿宗曰吾家朝堂干汝何事敢迫吾騎從此語在前見本紀五月二十五日駕幸古北口外避暑弇州巵言載滄溟在闗中過許中丞宗魯伯誠許問今天下名能詩何人滄溟曰唯王元美次則宗臣子相許請子相詩觀之滄溟勃然曰夜來火燒却許面赤而已余嘗嗤之夫子相詩未必能過伯誠即索觀亦屬恒事何至怫然如此又蔡子木入覲酒間自歌其䕫州諸作吴明卿輒鼾睡鼾聲與歌聲相低昻歌罷鼾亦止今觀明卿詩品亦未能過子木也文士䕶前往往夜郎王自大適足為識者軒渠耳厥後蔡廵撫中州吴謫歸徳府推官與徐予與張肖甫皆為屬官蔡身為行酒曰吾安敢有其一以傲三君子哉子木固盛徳不知爾時明卿當復置身何地特著二事以為文士相輕之戒云胡應麟作丹鉛新録萟林學山以駁升菴自負博辯然舛譌復不自覺如引三國志闗某傳注謂羽欲娶布妻啓曹公疑布妻有殊色因自留之按此乃秦宜禄妻與布何渉元瑞豈未一檢陳書耶又唐人長安女兒踏春陽一絶見沈亞之集異夢録胡止據博異志似未覩沈集者田汝成西湖志餘又傅㑹以為宋人西湖事謂為水仙與鳯俱沈湖中則剿襲司馬才仲遇蘇小事而為之尤可笑嘉陵江岸有刀鐶山康熈丙子余再使蜀舟過之口占絶句云晨過赤銅水望見刀鐶山閨中應計日不見稾砧還赤銅亦利州水名盖用古樂府稾砧今何在山上復有山何當大刀頭破鏡飛上天語也此詩偶逸之未編入雍益集聊記此范徳機嘗得十字云雨止修竹間流螢夜㴱至既復曰語太幽殆類鬼作吴正傳師道禮部集一條云聞之危太樸昔與先生秋夜不寐㣲歩山中得此二句喜甚且曰云云當以他語映帶之因足成此章云右二語果佳余少時有句云螢火出㴱碧池荷聞暗香故友葉文敏訒菴方藹極喜之取入獨賞集胡氏經籍㑹通云燕中書肆多在大明門之右及禮部門外拱辰門西花朝後三日則移於燈市毎朔望幷下浣五日則徙於城隍廟中燈市嵗三日廟市月三日今京師書肆皆在正陽門外西河沿餘惟琉璃窰厰間有之而不多見燈市初在靈佑宫稍列書攤自囬禄後移於正陽門大街之南則無書矣毎月朔望及下浣五日百貨集慈仁寺書攤止五六往間有秘本二十年來絶無之余庚申冬過之有兩漢紀初印本最精又三禮經傳通解亦舊刻議價未就旬日市期早過之二書已為人購去懊恨累日至廢寢食壬午夏見舊版雍録雕刻極工重過之已為人購去矣癸未夏得陳子昻文集十卷猶是故物然如優鉢羅花偶一見耳康熈壬午年吾鄉有少年十餘人自登萊往濟南肩舁數籠籠有虎一熊一又一羊六足一犬三足欲觀者先以錢投之攫資無算文殊普賢厮打本釋家語宋叅政錢象祖與史彌逺合謀殛殺韓侂胄請和於金時人為之語曰文殊普賢自鬬象祖打殺師王盖侂胄以太師封平原郡王佞者皆稱師王故也可謂善謔杭州靈隠寺飛來峰有楊璉真伽石像嘉靖二十二年福清陳仕賢知杭州命斬之田汝成記其事比於申屠廸毁曺操之廟頃張御史瑗請平西山碧雲寺魏忠賢墓仆其碑碎之有闗名教可並傳也嘗見一書言今江浙所祀五通邪神乃明太祖伐陳友諒陣亾士卒詔令五人一隊得受香火云云而武林聞見録又載宋嘉泰中大理寺决一囚數日後見形獄吏云泰和樓五通神虛位某欲充之求一差檄言差充某神位得此為據可矣如其言經數月東庫人聞樓上五通神日夜喧閧如争競狀吏乃泄前事為増塑一神像遂寂然則宋時已有五通之説不自明初始至於决囚鑽營偽牒得補神位則其為邪魅昭然矣吴越之人信而畏之理不可解宜湯潛菴斌碎其土偶投畀湖中也唐肅宗賜李輔國香玉辟邪二長一尺五寸香聞數百歩南宋有李大卿者其子娶韓平原之女奩具中有香玉師子髙二尺五寸精妙無比後歸福邸支硎山有泉自石罅流出雖大旱不竭相傳支道林遺跡也有賈胡過之坐臥其側凡半月取一玉蟹而去五侯鯖載薛瓊至孝家貧采薪遇老父以一物遺之曰此銀實也用四壁土種之銅盆中當得銀如言種之旬日生苗再旬開花花有銀色如鈿螺及結實皆銀也銀亦可種與雍伯種玉皆異聞米紫來漢宛平人明太僕友石萬鍾之孫也父夀都字吉土亦知名紫來以順治十八年辛丑登第多技藝工書畫書仿南宫尤工金石篆刻以長葛知縣行取適有博學宏詞之舉改翰林編修以典試罣誤久之召入供奉内廷遷侍講賜宅西華門尋病卒太僕有勺園在京城西海淀與武清侯清華園相望亦曰風煙里今暢春苑即兩園故址也紫來少喜交游所交游皆海内名士與予最相善頗有倡和其詩惜為書畫所掩亦㪚佚無傳矣紫來曾以其滇中詩屬予論次藥花入詩多新異如陳白沙恰到溪窮處山山枳殻花之類予居易録載之矣偶讀南宋姜堯章集一絶云憐君歸槖路迢迢到得茅齋轉寂寥應嘆藥闌經雨爛土肥抽盡縮砂苗亦佳然以藥闌為藥物之藥則誤耳唐人栁枝詞專詠栁竹枝詞則泛言風土如楊㢘夫西湖竹枝之類前人亦有一二專詠竹者殊無意致宋葉水心又剏為橘枝詞亾友汪鈍翁琬編修亦擬作二首其一云郎行時節橘花零南風吹來香滿庭今年橘實大如斗勸郎莫羡楚江萍姜白石詩説有數則可取録之人所易言我寡言之人所難言我易言之難説處一語而盡易説處莫便放過僻事實用熟事虛用學有餘而約以用之善用事者也意有餘而約以盡之善措辭者也篇中出人意表或反終篇之意皆妙句中無餘字篇中無長語非善之善者也句中有餘味篇中有餘意善之善者也始於意格成於句字詩有四種髙妙一曰理髙妙二曰意髙妙三曰想髙妙四曰自然髙妙一篇全在結句如截奔馬辭意俱盡如臨水送將歸辭盡意不盡若夫意盡辭不盡剡溪歸棹是也辭意俱不盡温伯雪子是也一家之言自有一家風味如樂之二十四調各有韻聲乃是歸宿處橅仿者語雖似之韻則亾矣右論詩末到嚴滄浪頗亦足叅㣲言温伯雪子日擊而道存見莊子田子方篇陳忠國字升揆公安人諸生曽中四川鄉試副榜以冒籍黜壬午來京師其鬚長過於膝行則自兩肩搭於背上毎行過市人競随觀之趙統詩話杭人陸濤言其鄉有役為老人者鬚長委地行則辮而繞之頸又白醉璅言云攸縣有徐寨主者鬚十餘莖以囊盛之舒之則其脩二丈元鮮于伯機記杭醫宋㑹之者善治水蠱以乾絲瓜一枚去皮剪碎入巴豆十四粒同炒以巴豆黄色為度去巴豆用絲瓜炒陳倉米如絲瓜之多少候米黄色去絲瓜研之為末和清水為丸如桐子大毎服百丸皆愈宋言巴豆逐水絲瓜象人脉絡去而不用藉其氣以引之也來投胃氣也宋時武林馬塍藏花之法紙糊宻室鑿地作坎覆竹置花其上糞土以牛溲硫黄然後置沸湯於坎中候湯氣薫蒸則扇之經宿則花放今京師園丁亦然予嘗以冬月寄諸盆花約明年花樹不敗則酬其直惟桂花不能如舊西湖志餘謂桂必清涼而後放法當置石洞岩竇間暑氣不到處鼓以涼颸乃開今與桃梅牡丹之屬同置煖室地窖宜其不殖也此亦格物者所當知從伯文玉諱與玟號能詩嘗有詠宋髙宗一絶云千金空買玉孩兒不得其解讀西湖志餘髙宗嘗宴大臣見張循王俊持扇有玉孩兒扇墜上識是舊物昔往四明誤墜於水者問俊所從得對曰臣從清河坊舖家買得之詢舖家云得之提籃人復詢之乃從候潮門外陳宅厨孃處得之詢之厨孃云破黄花魚腹中所得也上大悦舖家提籃人補校尉厨孃封孺人中牟縣城南有湖數十畝中有亭額以蒲盧為邑名士張林宗民表觴詠之地予丙子以奉使祭告西嶽過之惜其命名非典因為易名墊巾以存林宗之舊使後來知名流故蹟按毛詩小宛疏云螟蛉桑蟲也果嬴蒲盧也細腰土蜂謂之蒲盧郭璞爾雅注細腰蜂俗呼􅝡螉若水中之蒲其根著在土而浮蔓多緣木故亦或謂之果嬴是細腰水蒲得以互稱於命名之義無一可者不知當時義何居也予甲子冬奉使祭告南海之神嵗杪次桐城大雪中陳黙公焯初未相見即過予客署二從者背負巨囊揖罷即呼其案顧從者取囊書數十大册羅列案上指示予曰此吾二十年來所輯宋元詩㑹若干卷聞公奉使當過此喜甚將待公决擇之然後出問世耳已過其滌岑雪中逺眺龍眠諸山縱觀是書竟日賔主談諧無一言及世事此亦冠盖交㳺中所少黙公順治壬辰進士二甲臚𫝊第一以耳聾不仕終予以乙丑二月抵南海始與陳元孝恭尹定交揖甫罷即出一端石小研相示曰吾得此水坑石甚寳惜之將以梁子藥亭公車之便屬寄公於京師既聞奉使當至粤故留以俟視其側有銘八字云獨漉之貽漁洋寳之元孝工漢𨽻此其手書也予甚珍之獨漉元孝别字亦自稱羅浮布衣子勵後中己夘舉人陳衎竒石記云米仲詔嗜石有五石最竒一靈壁石髙四寸餘延袤陂陀勢如大山四面皆畫家皴法近山脚特起一臺臺上平下削平處刻伯原二字小篆絶佳伯原元清碧先生杜本字也又一靈壁石非方非圓週遭如屏鄣有脉兩道作殷紅色自凹處垂下如瀑布之射朝日髙八寸許圍徑尺純黒凝潤如膏一英徳石髙四寸長七寸如䨇虬盤臥玲瓏透漏千蹊萬徑穿穴鈎連一兖州石大如拳堅緻有聲得之嶧山一仇池石亦如拳峰巒洞壑竒巧殊絶刻其側曰小武夷明大内英華殿供西畨佛像殿前菩提樹二孝定皇太后手植也光禄寺志云英華殿四月八日供大不落夾二百對小不落夾三百對叔祖季木考功詩云慈寧宫裏佛龕崇瑶水珠燈照碧空四月䖍供不落夾内官催辦小油紅盖紀此事也慈寧宮當作英華殿為確荆州南門有息壤其來舊矣上有石記云犯之頗致雷雨康熈元年荆州大旱州人請掘息壤出南門外堤上掘不數尺有狀若屋而露其脊者再下尺許啓屋而入見一物正方上銳下廣非土非木亦非金石有文如古篆土人云即息壤也急掩之其夜大雨厯四十餘日江水泛溢决萬城堤幾壊城海寧孝㢘查伊璜繼佐崇禎中名士也甞冬雪偶歩門外見一丐避廡下貌殊異呼問曰聞市井有鐵丐者汝是否曰是也能飲乎曰能引入發醅坐而對飲查已茗艼而丐殊無酒容衣以絮衣不謝徑去明年復遇之西湖放鶴亭下露肘跣行詢其衣曰入春不須此已付酒家矣曰曽讀書識文字乎曰不讀書識字何至為丐耶查竒其言為具湯沭而衣履之詢其氏里曰呉姓六竒名東粤人問何以丐曰少好博進敗其産故流轉江湖自念叩門乞食昔賢不免僕何人敢以為汚查遽起捉其臂曰呉生海内竒士我以酒徒目之失呉生矣留與痛飲一月厚資遣之六竒者家世潮陽祖明世為觀察以摴蒱故遂為寠人既歸粤寄食充驛卒稔知闗河阨塞形勢㑹王師入粤邏者執六竒六竒曰請得見大帥言事既見備陳諸郡形勢因請給遊劄數十通散其土豪所至郡縣壁壘皆下帥上其功十年中累官至廣東水陸師提督孝㢘家居久不復記憶前事一旦有粤中牙將叩門請謁致呉書問以三千金為夀邀致入粤水行三千里供帳極盛度梅嶺已遣其子迎候道左所過部下將吏皆負籣抱弩矢為前驅抵恵州呉躬自出迎導從雜沓擬於侯王至㦸門則蒲伏泥首登堂北面長跪厯叙往事無所忌諱入夜置酒髙㑹身行酒炙歌舞妙麗絲竹迭陳諸將遞起為夀質明始罷自是留止一載裝累鉅萬將歸復以三千金為夀錦綺珠貝珊瑚犀象之屬不可訾計查既歸數年值呉興私史之獄牽連及之呉為之營救查遂獲免於難初查在恵州幕府一日遊後圃圃有英石一峰髙二丈許深賞異之再往已失此石問之則以巨艦載致呉中矣今石尚存查氏之家六竒後卒官贈少師兼太子太師諡順恪武昌小南門獻花寺老僧自究者病噎食臨終謂其徒曰我不幸罹斯病胸臆間必有物為祟歿後剖視乃可入歛其徒如教得一骨如簪形取置經案久之有兵帥借寓一日從者殺鵞其喉未殊偶見此骨取以挑刺鵞血濺骨骨立消後其徒亦病噎因前事悟鵞血可療數飲之遂愈因廣其傳以方授人無弗愈者唐初修隋史不為文中子立傳千古疑之且其時總裁者魏徴秉筆者陳叔逹皆及門也而房杜諸人又皆佐命力豈不能為其師立一史傳而必待三百年後宋景文修唐書始為之表章於王績勃質諸傳耶頃閱仇俊卿通史它石論此甚快可破千古之疑其説本於宋史非剏也宋史謂通為長孫無忌所惡當時畏無忌故遺通而無忌之惡王氏則由於王凝次子勮劾貶侯君集君集與無忌善因而惡及其祖耳初叔逹撰隋紀王績欲借觀且曰吾芮城兄亦有隋書若干卷欲續成以終其志殆諷之也予謂隋書不為王通立傳五代史不為韓通立傳二公未嘗以一傳有無為輕重獨可為當時操史筆者惜耳韓通不立傳亦別有説通次子福畤福畤子凝凝子勔㔧勃香祖筆記卷三
