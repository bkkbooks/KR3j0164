body:
  text: 香祖筆記卷二刑部尚書王士禎撰異物類苑云山都人面黒長身有尾踵見人則笑笑則上脣掩目按諸書言人都鳥都猪都皆不爾此乃誤以狒狒為山都耳僅字有少餘二義唐人多作餘義用如元㣲之云封章諫草繁委箱笥僅逾百軸白樂天哭唐衢詩著文僅千首六義無差忒小説崔煒傳大食國有陽遂珠趙佗令人航海盗歸番禺僅千載矣甘澤謡陶峴傳浪跡怡情僅三十載摭言曲江之宴長安僅於半空玉壺清話南唐先主傳吴越災遣使唁之賚帑幣糧鏹僅百餘艘之類至宋人始率從少義迄今㳂用之令狐子先安陸髙士予嘗著之古懽録矣王彦輔麈史載其著書甚多有萬卷録易説精義晉年統緯世總樂要注黙書讒髄琹譜兵途要轄等若干卷又云令狐先生卒阮逸天隠表之林逸書孟逸篆額號三逸碑南齊侍中庾杲之家貧毎食生韭熟韭韭菹時人為之語曰孰謂庾郎貧毎食二十七種後魏陳留侯李崇為尚書令性儉恡食止韭菹其客李元佑戲語人曰李令公一食十八種問其故答曰二九一十八二事極相似梅村詩話云嘗與陳卧子共宿問其七言律詩何句最為得意卧子自舉禁苑起山名萬嵗複宫新戲號千秋一聨然予觀其七言殊不止此如九龍移帳春無草萬馬窺邉夜有霜左徒舊宅猶蘭圃中㪚荒園尚竹林禹陵風雨思王㑹越國山川出覇才石顯上賔居栁市竇嬰别業在藍田七月星河人出塞一城砧杵客登樓四塞山河歸漢闕二陵風雨送秦師諸聨沉雄瑰麗近代作者未見其比殆冠古之才一時瑜亮獨有梅村耳彈棊之戲始見西京雜記後漢梁冀𫝊注稍詳之似近投壺而其製不𫝊今人詩多以奕棊當之可發一笑王建宫詞云彈碁玉指兩参差肯局臨虛鬭著危先打角頭紅子落上三金字半邉垂讀之亦不能通曉也揮麈新談記費鵞湖初第謁彭文憲文憲曰殿上金堦滑須慢慢行吾鄉髙念東侍郎珩有句云金堦路滑且徐行本此唐蕭倣咸通四年知禮部貢舉責授蘄州刺史有與浙東鄭大夫書云韓綰即文公之孫栁告是栁州之子鳯毛殊有而名字陸沉皆倣是年所舉士也千里馬人皆知之王兆雲湖海搜竒載陜西民家有千里驢腰有腎六又張翁言有友人省親山東親家以一驢至曰此千里驢也乗之倐忽抵家唐人五言絶句往往入禪有得意㤀言之妙與浄名黙然逹磨得髓同一闗捩觀王裴輞川集及祖詠終南殘雪詩雖鈍根初機亦能頓悟程石臞有絶句云朝過青山頭暮歇青山曲青山不見人猿聲聴相續予毎嘆絶以為天然不可凑泊予少時在揚州亦有數作如㣲雨過青山漠漠寒煙織不見秣陵城坐愛秋江色青山蕭條秋雨夕蒼茫楚江晦時見一舟行濛濛水雲外江上雨後明月來照見下山路人語隔溪煙借問停舟處恵山下鄒流綺過訪山堂振法鼓江月掛寒樹遥送江南人鷄鳴峭帆去焦山曉起送崑崙還京口又在京師有詩云凌晨出西郭招提過㣲雨日出不逢人滿院風鈴語早至天寜寺皆一時佇興之言知味外味者當自得之南昌陳士業宏緒言嘗登泰山日觀峰四更起候日出見霞彩萬道碧緑交加有赤盤從中涌出晃漾不定久之乃成日輪因悟氣至此始聚而為日日生一日非以昨日之日復為今日之日也新吴宋長庚亦有此論此説甚竒山海經云義和二國名毎日出二國人為御推升太虛語尤荒誕可笑七言律聨句神韻天然古人亦不多見如髙季廸白下有山皆遶郭清明無客不思家楊用修江山平逺難為畫雲物髙寒易得秋曺能始春光白下無多日夜月黄河第幾灣近人節過白露猶餘熱秋到黄州始解涼瓜歩江空㣲有樹秣陵天逺不宜秋釋讀徹一夜花開湖上路半春家在雪中山皆神到不可湊泊錢武肅王目不知書然其寄夫人詩云陌上花開可緩緩歸矣不過數言而姿制無限雖復文人操筆無以過之東坡演之為陌上花三絶句云陌上花開蝴蝶飛江山猶是昔人非遺民幾度垂垂老遊女還歌緩緩歸五代時列國以文雅稱者無如南唐西蜀非呉越所及賴此一條足以解嘲韓蘇七言詩學急就篇句法如鴉鴟鷹鵰雉鵠鵾騅駓駰駱驪駵騵等句予既載之池北偶談近又得五言數語韓詩蚌螺魚鼈蟲盧仝鰻鱣鮎鯉鰌鸂鶒鴒鷗鳬蔡襄弓刀甲盾弩筋皮毛骨羽然此種句法間作七言可耳五言即非所宜解人當自知之武林女子王倩玉貌甚羙而工詩詞已字人矣悦其中表沈生遹聲而越禮焉母家訟於官杭守戈珽㫁離鬻於駐防旗下沈百方贖歸復為沈生一女而死𫝊其寄沈長相思一闋云見時羞别時愁百轉千囬不自由教奴怎罷休懶梳頭怯凝眸明月光中上小樓思君楓葉秋雖淫奔失行其才慧亦尤物也癸未正月十六日大駕南廵視河工上諭官民人等及革職降級官員贖罪人犯願赴山東被災地方泰安州沂州新泰蒙隂郯城等縣賑濟饑民者列名以聞事畢議叙㑹試總裁官東閣大學士兼禮部尚書熊賜履吏部尚書陳廷敬吏部右侍郎兼掌翰林院事吴涵禮部右侍郎許汝霖本朝惟髙陽李文勤公三典㑹試今孝感熊公以癸丑甲戌丁丑庚辰癸未五典㑹試澤州陳公以壬戌辛未癸未亦三典㑹試可謂盛事按明二百七十年惟金谿王公英永樂戊戌宣徳庚戌正統壬戌三典㑹試耳臺灣風信與他海殊異風大而烈者為颶又甚者為颱颶倐發倐止颱常連日夜不止正二三四月發者為颶五六七八月發者為颱九月則北風初烈㦯至連月為九降過洋以四七十月為穏以四月少颶七月寒暑初交十月小春天氣多晴暖故也六月多颱九月多九降最忌颱颶俱多挾雨九降多無雨而風凡颱將至則天邉有㫁虹先見一片如船㠶者曰破㠶稍及半天如鱟尾者曰屈鱟土番識風草草生無節則一年無颱一節則颱一次多節則多次颶之名以時而異正月初四日曰接神颶初九日曰玉皇颶十三日曰闗帝颶念九日曰烏狗颶二月二日曰白鬚颶三月三日曰上帝颶十五日曰真人颶念三日曰馬祖颶真人多風馬祖多兩已上春三月共三十六颶此其大者四月八日曰佛子颶五月五日曰屈原颶十三日曰闗帝颶六月十二日曰彭祖颶十八日曰彭婆颶念四日曰洗炊籠颶七月十五日曰鬼颶八月一日曰竈君颶十五日曰魁星颶九月十六日曰張良颶十九日曰觀音颶十月十日曰水仙王颶念六日曰翁爹颶十一月念七日曰普菴颶十二月念四日曰送神颶念九日曰火盆颶念四日已後皆曰送年風按升菴先生云當作颶音具鳯山縣有薑名三寶薑相𫝊明初三寶太監所植可療百病諸羅縣番首名大睂者毎嵗東作時諸番請其出射射所及之地稼輙大熟號靈箭正月二十七日前少傅兼太子太傅保和殿大學士兼禮部尚書王熙卒公禮部尚書文貞公崇簡長子也順治丁亥進士父子同官禁林又同為學士康熙壬戌以兵部尚書大拜居政府者二十年辛巳以病予告至是卒年七十六賜諡文靖王文貞公六子長熙保和殿大學士禮部尚書次槱桃源縣知縣次然廣西布政使司布政使次照浙江金華道叅議次燕貴州廵撫都察院副都御史次黙刑部郎中閥閱之盛時無其比二月二十九日放榜㑹元王式丹江南寶應人康熙中以尚書拜相者或進部銜如宛平王胥庭熙相國以司馬大拜而進兼禮部尚書京江張素存玉書相國以宗伯大拜而進兼户部尚書是也其後呉沁州銅川琠以刑部尚書大拜止兼本部浙江廵撫張泰交以士民公籲請前廵撫陞浙閩總督諡忠貞范承謨春秋特祀允行湯調鼎淮之清河人順治初進士著辨物志議論多發人神智偶筆其記人參二則於此隋髙祖時上黨民宅後聞人呼聲求之得人參一本根五尺餘具體人狀占者謂晉王隂謀奪宗故妖草生予曰非妖也人參如人形者食之得仙根至五尺而具人狀盖嵗久神靈之物而上黨又人參之所出惜時無張華其人故其物不著而以為隂謀奪宗之應文帝以丞相僭帝位何嘗不以隂謀得哉又元覽云人參千嵗為小兒枸杞千載為犬子按參以人名伏土嵗久而具體人狀氣類神靈之感無足怪者枸杞字不從犬何以嵗久為犬廣韻云春名天精子夏名枸杞秋名却老根冬名地骨皮是枸杞特四名之一考山海經建木上有九欘下有九枸枸根盤錯也與犬義絶不相渉使枸杞而為犬天精却老地骨皮又何化乎人參譜呂與叔記二程子語云今日釋氏未消理㑹大患者在介甫之學譬之盧從史在潞朝廷將討之當時便使一處逐節度使朝議欲討之而李文饒之意必欲先討潞州則不必治彼而自敗今日却要先整頓介甫之學壊了學者程子云詩小序必是當時人所傳國史明乎得失之迹者是也不得此何緣知此篇是甚意思大序則是仲尼所作要之皆得大意朱子學宗二程子詩序獨不然何也伯淳道君實語自謂如人參甘草病未甚時可用病甚則非所能及愚謂熙寧之病已甚温公出而立起膏肓天下更生天不祚宋遂使公年不永豈云非所及哉三月十五日上南廵視河囬宫内閣九卿迎駕於南海子西紅門四川廵撫貝和諾請復設蜀省五十七學學官下禮部議覆得俞㫖允行謝在杭肇淛小草齋詩話殊多憒憒啓發人意處絶少如云詩境貴虗故仙語勝釋釋語勝儒夫仙語如歩虛辭等最易厭釋語入詩最近雅今乃反之豈非强作解事者惟所云王右丞律選歌行絶句種種臻妙圖繪音律獨歩一時尤精禪理晚居輞川窮極山水園林之樂唐三百年詩人僅見此耳如云明詩逺過於宋又云本朝僅數名家力追上古然刻畫摹擬已不勝其費力矣其他作者雖復如林上乗雋語人不數篇要其究竟尚不及宋宋人有實學而本朝多剽竊故也右二條自相矛盾當以後論為允又云國初詩林鴻髙啓尚矣鴻一意盛唐而啓雜出元白長吉夫鴻之為盛唐贋鼎耳安得與啓並稱而且語有軒輊此真齊人之知有管晏而已又云李西涯樂府野狐外道夫西涯樂府雖變體自是天地間一種文字弇州晚年尚爾服膺遽斥之為野狐外道可乎約略駁正數端以例其餘至外篇雜篇以下多載晚唐五代宋元詩無可采者正與劉後村詩話同耳三月十八日萬夀節大赦天下十九日赴暢春苑啓奏刑部釋放囚犯八百餘人是日請㫖御批又減等二十一人二十六日已刻文華殿經筵滿禮部尚書席爾逹漢禮部尚書韓菼進講知者樂仁者夀二句滿吏部左侍郎傅繼祖漢詹事府詹事徐秉義進講易經其徳剛健而文明三句講畢賜宴太和門上南廵畿輔在籍諸臣迎駕詔復原任禮部右侍郎田種玉國子監司業劉芳喆御史戈英原官至江南詔起用原任河南廵撫侍郎顧汧翰林編修楊瑄加檢討尤侗侍講復内閣學士盧琦諭徳秦松齡檢討潘耒徐釚馮勗御史吴震方等原官特賜江南舉人汪灝何焯蔣廷錫三人與癸未科㑹試中式舉人王式丹等一體殿試宋中丞牧仲得王介甫唐百家詩選殘本自第五卷王昌齡李頎起至第八卷錢起盧綸司空曙止又自十三卷王建起建詩二卷逸上卷至十六卷許渾止中間第六卷沈千運已下全取元次山篋中集而益以李嘉祐等七人通三十八家盖亦詳於中晚而略於初盛宋人選唐詩大概如此意初唐盛唐諸人之集更五代亂離𫝊者較少故也牧仲謂今所𫝊十卷是章安楊蟠所改竄非介甫元本此雖闕本而真面目尚在山陽閻百詩若璩云曽見閩賈持翻刻本正二十卷惜無從覓之近牧仲有書至云已購得全本方刻之吴門云三月二十五日特命皇長子臨故少傅大學士王熙之喪拜奠舉哀特恩異數都人驚𫝊以為未嘗有也上諭以世祖皇帝舊臣故加殊禮内閣部院諸臣公疏謝恩報聞四月初四日殿試初七日𫝊臚狀元王式丹㑹元江南寳應人榜眼趙晉福建閩縣人探花錢名世江南武進人是科以違式黜者三人呉時寛沈淇雷曽十五日引見癸未科進士選汪灝等四十九人為庻吉士與鼎甲三人同入館讀書十二日在暢春苑御試庚辰科鼎甲汪繹等及庻吉士十七日命下留館授職者十三人顧圖河甲戌一甲第二汪繹季愈皆鼎甲餘庶吉士滿漢共十人戊辰庶吉士梁佩蘭張尚瑗辛未庶吉士狄億皆外用外用者共三十一人東閣大學士兼吏部尚書熊賜履以老病請告允之仍令居京師備顧問以吏部尚書陳廷敬為文淵閣大學士兼吏部尚書以副都御史勵杜訥為刑部右侍郎刑部侍郎金璽以前任湖廣廵撫紅苖事調用以直𨽻廵撫兵部侍郎李光地為吏部尚書管廵撫事鄞縣同年史及超少宗伯前身為僧大成予既書之池北偶談第二十六卷癸未二月與同年屠少司馬芝岩粹忠㑹於僧舎屠亦鄞人也因訊及史事屠言其邑人戎通㕘上徳前身亦僧也嘗以鐵鍊鎖項募緣市中通㕘之父戎翁者嘗施齋供與之善後僧化去而通㕘以是日生亦夢僧入其室按宋相史彌逺乃覺長老後身即宗伯之先也唐武后遊石淙倡和詩首御製自皇太子相王以下和者十六人相王之後次梁王武三思次内史狄仁傑次奉宸令張易之麟臺監中山縣開國男張昌宗又次鸞臺侍郎李嶠鳳閣侍郎蘇味道夏官侍郎姚元崇奉宸大夫汾隂縣開國男薛曜書久視元年五月刋於平樂澗之北崖諸詩惟李嶠沈佺期二篇差成章餘皆拗拙可資笑柄耳黄岡葉井叔封知登封縣撰嵩陽石刻集記始著録之而刪去九首不為無見而朱竹垞太史憾其闕略以得覩全碑為喜則亦好竒之過也當牝朝淫昏之世二張每侍行幸預倡和已令千古齒冷而列銜於李嶠蘇味道輩之前諸人亦俯首甘之當時君臣上下豈復知有羞惡之心哉文海披沙記筆之異者鍾繇張芝王右軍皆用䑕鬚歐陽蘭臺用貍毛為心蕭祭酒用胎毛為柱張茂先用鹿毛陶隠居用羊鬚鄭䖍謂麝毛一管可書四百紙貍毛可書八百紙又有豐狐䖮蛉龍筋虎僕及猩猩毛狼毫雖竒品而醇正得宜不及中山兎毫若淇源之鴨毛雀雉毛但取五色相間為觀美耳今吴興兎毫佳者直百錢羊毫僅二十分之一貧士多用之然柔而無鋒臧懋循欲取貂䑕毛為之輔以兎毫謂鍾王所用䑕鬚必此也然稍肥舉落運用不如人意已上謝在杭所記備矣近日湖州專用羊毛殊柔輭無骨形貌亦醜貂䑕珍貴專為貴人裘帽之用筆工當何從購之李滄溟食饅頭欲有蔥味而不見蔥唯蔡姬者所造乃食其法先用蔥不切入饀而留饅頭上一竅候其熟即㧞去蔥而以麫塞其竅此謝在杭文海披沙所載即所謂蔡姬典盡舊羅裙者也揚州銀杏樹内有觀音大士像寧波落迦山石有大士竹林鸚鵡像予皆載之池北偶談閱文海披沙一則云永州蘇山多石淋以水鋸破中有觀音彌勒寒山拾得等像西方聖人神道設教理㦯然也吾鄉風雅盛於明𢎞正嘉隆之世前有邉尚書華泉後有李觀察滄溟滄溟集盛𫝊於世華泉集一刻於胡中丞可泉再刻於魏推官允孚又逸槀六卷刻於王方伯桃溪又有李中麓太常選本山西臺察趙俟齋刻於太原予所及見者前三本而中麓選本獨未之見諸本亦漸就澌滅矣康熈己夘予乃選刻於京師凡四卷予兒啓洓以予私淑先生之切也移書宗姪苹訪其後裔久之苹乃詳其家世報洓曰先生二子長子翼以廕官光禄寺丞其後無聞次子習厯城諸生字仲學號南洲有詩名習子治禮治禮子節節子庶皆以諸生奉祀事庶子材材子紹祖自先生至紹祖凡七世其家尚有先生畫像云先生祀郡邑鄉賢其奉祀至材始失之材今年老為人佃田紹祖始十餘嵗亦失學傭工辛巳予假歸洓乃為予述之而濟南諸生某某以書導材攜紹祖及先生畫像謁予里第比予過郡因與廵撫王中丞東侯提學徐僉事章仲備言先生名徳而後裔僅有存者遂以紹祖奉先生祀焉先生墓在萊莊亦苹云黄子鴻名儀常熟人隠居博學工書法予刻漁洋續集將仿宋槧苦無解書者門人崑山盛誠齋侍御符升聞子鴻多見宋刻獨工此體因禮致之子鴻欣然而來都無厭倦今續集自首迄尾皆其手書也尤工小詞有句云井桐休放月痕來玉堦剛臥金鈴犬人多稱之安丘劉憲石相國正宗好為詩嘗賦從軍行云匣裏䨇雄劔腰間兩石弓蓬蒿真浪死何必怯遼東後竟以事𨽻旗下人以為詩䜟江南蘇松糧儲道㕘議馬逸姿疏言臣父琾原任永嘉縣知縣康熈十三年值逆藩耿精忠之變與温處道臣陳丹赤恪守臣節同時殉難荷蒙皇恩矜恤屢下温綸從優議叙贈臣父浙江布政使司㕘政廕一子入監併賜葬祭康熈三十六年撫臣疏請於温州府建䨇忠祠復荷俞允先是三十五年丹赤蒙特恩賜諡三十八年皇上南廵幸浙丹赤子湖州府知府一䕫恭迎聖駕復荷軫念御書扁額懸之忠祠榮被萬世臣父琾殉難與丹赤同時賜祠又復同祀仰懇皇上破格一體賜諡賜額昭垂萬世云云禮部議覆奉㫖馬琾著與諡旋賜諡忠勤牴􅲨二獸名秉心忠直今承天門内華表頂上者是又衛輝府前石亦是按此亦蒲牢屭屓蚩吻睚眦之屬而龍生九子不載其名世𫝊羿妻奔月謂之嫦娥亦曰蟾蜍又酉陽雜爼月中有一人斫桂樹名吴剛又云月中仙人名宋無忌何月中人物之紛紛耶又鬱華一名鬱儀奔日之仙結璘奔月之仙見七聖記鈕玉樵琇云有王秋山者工為㧬畫凡人物樓臺山水花木皆於紙上用指甲及細針㧬出設色濃淡布境淺湥一法古名畫按㧬當作巩音築字書以手㧬物也近閩中有織畫乃破紙為條織成之山水人物花鳥布置設色種種臻妙與刺繡無異亦竒技也南海友人陳元孝恭尹作狨賦其文甚工予按陸佃云狨尾作金色俗謂金線狨一名猱猱獼猴也楚人謂之沐猴甚愛其尾毛柔長可藉宋制官二品狨坐不言食猴又按石㹼獸名食猴則元孝之賦當作石㹼為是㹼音菊異物類苑云㹼如師子蒼黒色瞑目聳耳出武當山又黄山志盧狄似穿山甲而無鱗嗜猿及蜂毎呼羣猿至羅跪於下擇肥者以木葉覆其頂而食之山海經何羅魚出譙明山譙水中聲如吠犬食之已瘧今登萊海上三月何羅魚始至味甚美即寧波之鮝也谷音三卷皆宋末人詩上卷王澮以下凡十人率任俠節義之士下卷詹本以下凡十五人則藏名避世之流也番陽布衣瀟湘漁父以下五人不可得其姓字要之皆宋之逸民也其詩慷慨激烈古澹蕭寥非宋末作者所及是時謝臯羽林霽山輩皆以文章節義著於東南而又有此三十人者與之遥為應和亦竒矣此書毛氏汲古閣本與月泉吟社合刻最工亾友施愚山備兵湖西又嘗刻之清江盖杜清碧其郡人也適見黄少司馬雪洲集記此書初得之臨淮顧徳光氏後又見江西刻本多帝虎陶隂之憾間託南都博洽之士是正稍復其真虞部主事吴時冕見而愛之遂刻諸真州分署以𫝊知𢎞正以來此書盖不一刻矣集中諸人本末各有耿耿不沒者宜有神物在在䕶持之也黄名瓉字公獻揚之儀真人五月十五日朝退御乾清門賜滿漢大學士尚書侍郎御書扇各一士禎得御製虎丘五言律詩一首前有暢春小印後有康熈宸翰稽古右文二印袁海叟詩集若干卷康熈壬午雲間門人周庶常彛策銘所寄鈔本用羅紋箋寫之甚工有大復空同二序陸儼山序又董宜陽題編首謂海叟手定國初刻於張氏者久燬儼山編次為别本而陸序云海叟集舊有刻又别有選行在野集者暇日與獻吉共讀之又删次為今集云按明初詩人共推髙季廸為冠而大復獨以海叟為冠空同許為知言今讀其詩古詩學魏晉近體學杜皆具體而㣲耳遽躋之青丘生之列未免失倫故予謂從來學杜者無如山谷山谷語必已出不屑禆販杜語後山簡齋之屬都未夢見况其下如海叟者乎詩小序必不可廢古今通儒論皆如此然如郝楚望之毎一詩必駁朱注亦自不可常熟顧大韶仲恭欲刋定一書用毛𫝊為主毛必不可通然後用鄭毛鄭必不可通然後用朱毛鄭朱皆不可通然後網羅羣説而以已意折衷之嚴粲詩緝作於朱注之後獨優於諸家大全之作敷衍朱注全無發明用覆醬瓿可也此論最公見顧仲子傳益都孫文定公沚亭建銓嘗撰顔山雜記四卷極稱簡核然於建置設官綠起猶未詳按黄瓚雪洲集議礦盗一疏是瓚廵撫山東時所奏略云臣㑹同鎮守太監黎鑑廵按山東監察御史王相徐冠議照禦盗之法本非一端要在術以防之令以禁之嚴逐捕以銷之足衣食以安之而已前項礦賊勢雖頗衆其初實倡於一二不逞之徒而市井無頼與凡窮困無聊者遂相率而從之臣等查得青州府益都縣去郡二百餘里地名顔神鎮土多煤礦利兼窰冶四方商販羣聚於此其中時有不逞之徒此廵海道副使潘珍先有開立縣治之議今有特設通判之請固欲得其要害而治之誠有見也但鄰近州縣復多徒黨亦未得專事乎此而遽遺於彼也合無准照副使潘珍及左布政使姚鏌右布政使盛應期按察使王泰署都指揮僉事馬愷分守左㕘政許淳分廵僉事魯鏎所議於益都縣顔神鎮地方聴令壘石為堡建立府館一所添設捕盗通判一員許其兼制前項鄰近州縣舊有礦洞不時廵察新編總甲嚴為約束操練弓兵民快人等遇有盗賊小則宻謀發卒以收掩捕之效大則移文紏衆以成合擊之功務在㫁絶奸盟毋令復相屯聚示已往於不究開方來以自新則賊黨自此可消矣云云紀略以為正徳十二年廵按御史黄某奏請兵部覆准盖未詳也但黄疏有聴壘石堡之語而顔城實嘉靖三十六年王弇州世貞兵備青州時建則正徳中止設官而未建城耳黄雪洲同畢嘉㑹送馮憲副還浙一首廣陵淹畢諴越山老馮唐兩賢師友間力障波瀾狂翩翩遊子衣獨與朔鴈翔汲古尚董井銷魂更雷塘胡然歌式㣲綵服戀故鄉驚心濟南叟桃李空門墻江蘺未堪折逺思慿誰將嘉㑹吾邑大司空畢公亨也公官兩淮運使為茶陵李相所重卒為名臣止從釣臺集得其一詩餘不槩見偶閱黄集録之備公故事云余自少年與先長兄考功同上公車毎停驂輟軛輒相倡和書之旗亭驛壁率不留稾諸同人見之者後在京師往往為余誦之怳如昨夢近見吴江鈕玉樵琇觚賸亦載余逸句因憶丙午自里中北上戲題徳州南曲律店壁一絶云曲律店子黄河厓亦地名朝來一雨清風霾青松短壑不能住騎驢又踏長安街語雖詼嘲不足存亦小有風趣聊記於此今京師宴席最重鹿尾雖猩唇駝峰未足為比然自唐已貴之陳子昻麈尾賦云卒網羅以見逼受庖割而罹傷豈不以斯尾之有用而殺身於此堂為君雕爼之羞厠君金盤之實云云若六朝已來則以麈尾為談柄耳未聞充盤爼也耶律楚材西域詩亦以鹿尾駝蹄作對韓宗伯菼所居在宣武門外與胡侍講任輿為鄰韓逝未浹月胡亦病卒胡甲戌狀元也乙丑狀元陸侍講肯堂先卒於此宅陸是科㑹元胡甲子江南解元皆兩掄元樊川詩云家住城南杜曲旁兩株仙桂一時芳禪師都未知名姓始信空門意味長諒哉括異志述吴地記云昔有金牛糞金村民臯伯通逐之牛入山穴山頽兄弟皆死妄語無稽豈又一金牛耶又一臯伯通耶吴地記又云漢議郎臯伯通字奉卿卒𦵏胥門號伯通墩則伯通非村民又不死於山矣古今論世者以尹吉甫為名臣徒以伐獫狁及崧髙烝民韓奕江漢四詩耳吾獨疑吉甫惑後妻之言至使其子伯竒衣苔帶藻作履霜之操此與晉獻驪姬之事何異夫不能齊家而妄稱之曰萬邦為憲吾不信也其猶後世詞人之諛韓侂胄賈似道者動以伊周擬之其又足信乎姚士麟叔祥言曽見趙松雪自書家用簿運筆精妙凡養蠶種桑等事與今不殊惟用麫作食及烏豆之類動至百斤百石耳姚叔祥又言海鹽有優兒金鳯以色幸於嚴東樓非金則寢食弗甘金既衰老而所謂鳴鳯記盛𫝊於時於是金復塗粉墨扮東樓焉此一事較侯方域馬伶傳更竒見只編云蘭谿魏某嘗客華州王槐野祭酒家見架上有夏國書凡閱三旬始遍則此書較契丹志金志卷袠尤多矣右二志予皆有鈔本夏國志則世罕知之明代自南部入閣者甚少惟萬厯丁未葉文忠向髙以南京吏部侍郎徑授禮部尚書東閣大學士文忠是時年四十九鄭端簡古言云永叔毁繫辭君實詆孟子安石非春秋二程子改古大學晦菴不用子夏詩序皆不可解香祖筆記卷二
