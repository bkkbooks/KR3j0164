body:
  text: 香祖筆記雜家類三雜説之屬提要臣等謹案香祖筆記十二卷國朝王士禎撰皆康熙癸未甲申二年所記其曰香祖者王象晉羣芳譜曰江南以蘭為香祖士禎蓋取其祖之語以名滋蘭之室因以名書也是書體例與居易録同亦多可采惟其中姚旅露書以章八元詩為盧照鄰某詩話以栁惲詩為趙孟俯案某詩話原本不著其名蓋有所諱今亦仍其舊文記憶偶誤事所恆有指其疏舛足矣而一則以為無目人語一則以為眯目人道黑白肆口毒詈皆乖著書之體士禎池北偶談任惇表語一條何嘗不以劉禹錫覆舟側畔千帆過病樹前頭萬木春二句為白居易詩漁洋文略遊攝山記何嘗不以左思振衣千仞岡濯足萬里流二句為郭璞詩乎此由晚年解組侘傺未平筆墨之間遂失其沖夷之故度斯亦盛德之纍矣又第十二卷一條曰輟耕録言或題畫曰特健藥不喻其義余因思昔人如秦少遊觀輞川圖而愈疾黃大癡曹雲溪沈石田文衡山輩皆工畫皆享大年人謂是煙雲供養則特健藥之名不亦宜乎案法書要録載武平一徐氏法書記曰駙馬武延秀聞二王之迹強學寶重乃呼薛稷鄭愔及平一評其善惡諸人隨事答稱為上者題云特健藥云是突厥語案唐書稱延秀嘗質於突厥解其國語書法要録所載太平公主三馱藐提四字印亦突厥語也其解甚明士禎乃以字義穿鑿殊為失考此非僻事殆耄而忘乎然其品題文藝宏奬風流至於老而不衰固足尚也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e10dab3040e3b0618288d88f0e1cb98db2094ebc528f22c98b2a3b07dcb1a179
