body:
  text: 香祖筆記卷八刑部尚書王士禎撰陳霆字水南吳興人著兩山墨談甚有義理閲金陵瑣事始詳其本末霆字震伯僦居白下又著唐餘紀傳渚山詞話嘗作詞弔張麗華云麗華死於青溪後人哀之為立小祠祠像乃二女郎其一即孔貴嬪也今祠亦不復存成𢎞間留都扇骨以李昭製者為最見顧東江清集往徐健菴司寇為宫坊時贈豫金陵仰氏扇豫謝以詩有舊京扇貴李昭骨之句翼日相遇朝班問李昭出處豫但據東江集答之後閲金陵瑣事乃詳李昭李贊蔣誠三人製扇骨最精徐守素蔣徹李信修補古銅器如神恨昔者不能舉此應之信彊記之難也張遺字瑤星金陵遺民也居棲霞一小菴數十年不入城市著書十餘種有一書紀南渡時事可禆史乘惜未版行凡所撰著稱白雲自怡年九十而終四十年前游東萊時先兄西樵亦客萊相友善及豫在䢴江數客金陵未及見之蓋已禁足攝山矣豫撰古歡録亦遺此人故著於此明時欽差行人吳惠葬劉真人於留都鳯臺門外壙中得一石匣中有玉冠蓋上刻王真人玉冠五字此與王喬玉棺相似玉冠尤為新異舊例科場進呈試録主考官自撰程文其用士子文稍為㸃定自萬厯十三年乙酉科始治血山崩當歸一兩荆芥一兩酒一鍾水一鍾煎服立止撫州商人病痢危甚太學生倪某用當歸末阿魏丸之白滚湯送下三服而愈又治痢方黃花地丁搗取自然汁一酒盞加蜂蜜少許服之神效濕痰腫痛不能行用􅭀蘞草水紅花蘿蔔英白金鳯花水龍骨花椒槐條蒼术金銀花甘草以上十味煎水蒸患處水稍溫即洗之治小腸疝氣烏藥六錢天門冬五錢白水煎服神效治小便不通芒硝一錢研細以龍眼肉包之細嚼咽下立愈治瘤方用竹刺將瘤頂稍稍撥開油皮勿令見血細研銅緑少許放撥開處以膏藥貼之接骨方土鱉用新瓦焙乾半兩錢醋淬七次自然銅乳香沒藥菜瓜子仁各等分為細末每服一分半酒調下上體傷食後服下體傷空心服治疫腫頭面方金銀花二兩濃煎一盞服之腫立消針入腹用櫟炭末三錢井水調服即下又方以磁石置肛門外引下已上俱出正續金陵瑣事沈石田周干支八字與明英宗同明寧國大長公主所用遺墨半挺上用紫金打成龍口吞之一瓷杯酌酒滿則隱起一龍形鱗鬛具備酒盡不復見金陵王某家有大石子中具兜塵觀世音像跌坐如生面目衣裓如畫義南唐元宗時溧水桑樹生須菩提像右袒左跪衣裓宛然其色如純漆光可以鑑南唐書有馬令胡恢陸游三家馬陸二書盛行於世近吳門又有合刻惟胡書世罕傳之聞江隂李忠毅應升家有藏本草年前屬江隂令陸雲士次雲訪之久不見報義屬門人楊侍講賓實名時求之亦不得按恢金陵人博物彊記工篆隸客京師久不得調上韓忠獻公詩云建業關山千里逺長安風雪一人寒公深憐之使篆太學石經因復官任華州推官卒宋明帝借張永南苑三百年詔云期畢便申周宰相王溥父祚以觀察使致仕一卜者諛其夀可百四十惟百二十歲時春夏間微苦臟腑祚大喜顧子孫曰孩兒輩切記是年莫教我喫冷湯水二事癡絶可笑杜牧詩百年便作萬年計富貴中人不悟此者多矣釋氏六如之喻正為此輩棒喝顧鄰初云沈約宋書凡歌字皆作哥字豫昔官廣陵於一士大夫家見趙松雪家書凡哥字皆作歌字蓋古通用也捨筏登岸禪家以為悟境詩家以為化境詩禪一致等無差别大復與空同書引此正自言其所得耳顧東橋以為英雄欺人誤矣豈東橋未能到此境地故疑之耶京口張文選公選九徵博物君子也嘗題豫過江入吳兩集云筆墨之外自具性情登覽之餘别深懷抱此語可與解人道豫少游京師日與汪苕文琬劉公㦷體仁倡和晨夕過從無間一日往汪邸舍其小僕孫玉者走報曰王貽上來苕文出為豫述之豫笑曰此子不減蕭茂挺家僕孔平仲雜記云今公家文字用仰字出北史北齊孝昭紀詔定三恪禮儀體式亦仰議之汪苕文赴京師過揚州豫送之舟中欲附惠泉五壜寄家西樵兄汪以道逺稍難之豫笑謂曰汪大乃成俗吏汪亦一笑許之後記其事於說鈴宋時徑山僧行園為蛇傷足一參方僧為治之先汲淨水洗患處易水數斛令腐膿敗肉悉去瘡上白筋見乃挹以軟帛以藥末勻糝瘡中惡水泉湧明日淨洗敷藥如初一月毒盡肉生平復如舊其方乃香白芷為末入鴨嘴膽礬麝香各少許見談藪宋制軍營中有天王堂小說亦屢載之不知何天王也談藪云唐天寶西蕃寇安西奏乞援兵詔不空三藏誦仁王經帝見神人帶甲荷戈在殿前問不空曰此毗沙門天王第二子獨健往救安西耳後安西奏見神人破賊城上天王見形圖形上進因詔諸節鎮所在州府於城西北隅各立天王像佛寺亦然宋時沿之入軍營也又括異志言宋建炎中敵將屠秀州天王現於城上若數間屋大懼而引去因建天王樓於城西北隅汪鈍翁琬嘗問豫王孟齊名何以孟不及王子曰正以襄陽未能脫俗耳汪深然之且曰他人從來見不到此豫又嘗謂鈍翁李長吉詩云骨重神寒天廟器骨重神寒四字可喻詩品司空表聖與王駕評詩云王右丞韋蘇州趣味澄敻如清沇之貫逵元白力勍而氣孱乃都市豪估耳元白正坐少此四字故其品不貴表聖論詩有二十四品豫最喜不著一字盡得風流八字又云采采流水蓬蓬逺春二語形容詩境亦絶妙正與戴容州藍田日暖良玉生烟八字同㫖弇州云朦朧萌拆情之來也明雋清圓詞之藻也四語亦妙古人同調齊名大抵不甚相逺獨劉楨與思王並稱豫所不解建安七子自孔文舉不當與諸人同流此外如陳琳之飲馬長城窟行阮瑀之定情詩徐幹之室思皆有漢人風矩惟楨詩無一語可采而自古在昔並稱曹劉未有駁正其非者鍾嶸又謂其仗氣愛竒動多振絶思王而下楨為獨步殊似囈語豈佳處今不傳耶乃秦少游亦云五字一何工妙絶冠儔匹殆亦耳食之習萊陽宋荔裳琬按察言幼時讀書家孰其邑一前輩老甲科過之問孺子所讀何書對曰史記又問何人所作曰司馬遷義問渠是某科進士曰漢太史令非進士也遽取而觀之讀未一二行輒抵於案曰亦不見佳何用讀為荔裳時方髫鬌知匿笑之而此老夷然不屑豫十數歲時屢夢坐園亭上有五色異禽小於鸜鵒羽毛甚麗羣飛亭中或集於肩或投於懷馴擾不去又兩夢有人贈一奩墨開之有異香既覺為諸兄言之曰此文字之祥也順治八年辛卯豫年十有八一日讀書倦而假寐夢神人告曰汝知今科闈中題乎乃子曰惟仁者能好人能惡人也詩經題乃維清緝熙文王之典叩其餘則不應及八月入闈首題果符其夢頌題則聖敬日躋及明年壬辰會試頌題乃維清緝熙二句也豫中是科鄉試第一旋改第六壬辰下第而先兄吏部登進士神所告乃豫兄弟鄉會試首尾二題也康熙初士人挾詩文遊京師必謁龔端毅鼎孳公次即謁長洲汪苕文琬潁川劉公㦷體仁及豫三人陽羡陳緯雲維嶽其年維嵩之弟也初入都手寫行卷三通置案上友人問所詣曰吏部劉公户部汪公禮部王公也友人曰吾為子預卜之汪得卷必摘其瑕疵而駁之王得卷必取其警策而揚之劉則一覽輒擲去無所可否已而果然豫聞之笑謂公㦷曰吾二人或駁之或揚之皆尋常耳惟兄此一擲最不易到公㦷亦為之絶倒交趾老道士結廬潮州之金山年已百歲養一雞大如么鳯置枕中鳴即睡覺一胡孫小如蝦蟇以線繫几一龜如錢大置金合子中豫門人東莞令錢蔗山以塏曰雞陽精也胡孫心猿也龜神靈而服氣也皆小者損之又損也其言甚有理致嶺海見聞云蚌聞雷而孕望月而胎珠中秋蚌始胎中秋無月則蚌無胎凡秋夕海色空明天半有朱霞光起蚌曬珠也珠之名類不一有精珠褪光珠璫珠走珠滑珠磊砢珠官雨珠稅珠􅀢符珠珠重七分為珍珠八分為寶珠合浦人以珠為貴生男曰珠兒生女曰珠娘香樹生海南黎峒葉如冬青凡葉黃則香結香或在根株或在枝幹最上者為黃沉亦曰鐵骨沉從土中取出帶泥而黑堅而沉水其價三倍或在樹腹如松脂液有白木間之曰生沉投之水亦沉投之水半沉半浮曰飛沉皆為上品有曰速香者不俟凝結而速取之也不沉而香時異曰花剷者香與木雜剷木而存香也有曰土伽楠與沉香並生沉香性堅伽楠性軟其氣上升故老人佩之少便溺産占城者佳樹為大蟻所穴蟻食石蜜遺漬香中歲久凝而堅潤其色若鴨頭緑上之上也又有虎豹斑金絲結其色黃貴與鴨頭緑等椰杯見毒則裂嶺南人多製為食器以辟蠱永安産燭竹文信公駐軍時燃此竹以代炬海蜘蛛生粵海島中巨若車輪文具五色絲如絙組虎豹觸之不得脫斃乃食之瓊州黎峒有黎長統之必符王二姓乃得立黎長家有古罐傳為祖先所遺非陶非石天欲雨則先鳴官軍將入山則大鳴廣州之虎門合蘭海每歲正月初三四五日現海市城闕樓臺車騎人物倐忽萬狀康熙丙辰見戈甲之形粵有兵變黃太冲宗羲亦言寧波有海市蓋東海南海皆有不惟登州但登見以四五月廣見以正月初旬三日是小異耳鄞之見不言定期嶺海見聞言鐵樹生海底石上幹類珊瑚尾如彗千年則成珊瑚其旁有蚌守之往往得鐵樹則兼得珠是鐵樹與珊瑚同類俱生於海然珊瑚大者五六尺小者不過尺許以鐵網取之在水則軟見風則堅初白漸黃得日色乃殷紅如丹砂按王濟雨舟所記云官橫州於一指揮家圃中親見此樹歷言其六十年開花之詳豫在羊城學使署亦見鐵樹高大不殊諸樹乃木本非玊石之屬但以鐵培護其根則茂與他樹以水澆灌者差異與前所云云不類豈名同實兩種耶嶺海見聞云香樹幹如樹蘭葉如黃楊子如連翹而黑以夏月子熟種之亦有寄生榕樹上者閩小紀云千年榕樹上生竒南香陶嶽五代史補載馮道鎮同州有酒務吏乞以家財修夫子廟道以付判官判官素滑稽書一絶句於判後云荆棘森森繞杏壇儒官高貴盡偷安若教酒務修夫子覺我慚惶也大難道有愧色因出俸修之又李榖為陳州防禦使三日謁夫子廟惟破屋三間中存聖像有伶人李花開進口號曰破落三間屋蕭條一旅人不知負何事生死厄於陳榖驚嘆遽出俸以修之五代學校廢壞如此賴滑稽之言始得復故可為浩歎觀唐明皇過魯謁孔子廟詩居然盛世帝王氣象近聖駕東巡謁闕里聖廟載謁孔林特命户部發金錢十餘萬重修廟貌輪奐一新賜孔氏子孫十餘人為五經博士等官特賜御用曲柄傘於大成殿此又漢唐宋明已來所未有者故觀於文教之興廢盛衰而世之治亂可知矣周郭威親征慕容彥超至兖州夢文宣王明日攻其城入之過夫子廟叩首再拜且諭近臣曰夫子聖人百王取則焉安可不拜且命孔氏襲文宣王者長為本縣令五代之世乃亦有此自明代至本朝曲阜縣知縣皆以孔氏子孫為之而不知始於後周也越處女對勾踐曰見之如好婦奪之似懼虎杳之如日偏如滕兔此即處女脫兔之喻而語益竒凡溺水及服金屑用鴨血灌之即瘥耳暴聾用全蝎去毒為末酒調滴耳中聞水聲即愈枸杞子榨油㸃燈觀書能益目力金瘡傷用獨殼大栗研乾末敷之立愈治喉痺乳鵝用蝦蟆衣鳯尾草擂細入鹽霜梅肉煮酒各少許調和再研細布絞汁以鵝毛刷患處吐痰即消惡瘡腫毒初起當歸黃蘗皮羌活為細末生鷺鷥膝搗汁調傅瘡之四圍自然收毒聚作小頭即破切不可併瘡頭傅之骨鯁用犬涎榖芒用鵝涎灌之即愈宋孝宗食蟹過多患痢有嚴防禦者用新采藕節研細熱酒調服果愈治病眼生赤障者用白螺一枚去掩以黃連末糝之置露中一夜曉取肉化為水滴目則障自消治嗽驗方香櫞去核薄切作細片以清酒同研入砂罐內煮令熟爛自黃昏至五更為度用蜜拌勻當睡中喚起用匙挑服甚效又方向南柔桑條一束每條寸折納鍋中用水五碗煎至一碗渴即飲之治水腫方用田螺大蒜車前草和研為膏作大餅覆臍上水從便出即愈已上俱出養疴漫筆豫平生為詩不喜次韻不喜集句不喜數疊前韻惟少時有集黃山谷詩一絶云謝人送梅榨頭夜雨排簷滴誰與愁睂唱一杯瘦盡腰圍怯風景城南名士遣春來如此集句恐非李西涯所知西涯有集句詩一卷李西涯集第六卷主一齊為徐公肅都憲作又徐亞卿原一六十二得雙生子戲贈原一與崑山徐健菴司寇初字同公肅與其弟立齊相國初字同立齊亦為都憲健菴亦為亞卿何其吻合至此但前之二徐未悉其名耳宋陳輔輔之丹陽人有詩云北山松粉未飄花白下風輕麥腳斜身似舊時王謝燕一年一度到君家為王介甫所知而與蘇公尤厚善黃是師是章惇之甥也以二女妻潁濱子適遜哲宗時欲召用林希以是沮之後知定州卒東坡皆有尺牘與之元人吳師道跋云二人出處不同而尚德守義不為勢利回邪變易其賢則一豫撰古歡録取師是而遺輔之此詩尤為可愛特書之吳師道禮部集有云江隂趙彥衛作西漢定安公補紀首書元年四年書䇿命孺子為定安公五年至十八年每年書公在定安法春秋公在乾侯之義意亦美矣按孺子嬰宣帝元孫楚孝王孫廣戚侯顯子漢之近親非若吕后取他姓子比矣太后臨朝稱制莽居攝踐阼改元居攝又改元初始則孺子雖未正帝位固已儼然為天下之君矣莽篡而猶存莽滅而復為漢若之何絶之哉又考序例云正統雖絶而故君尚存則追系正統之年而注其下如唐武氏例是趙氏補紀殆類此但其書法猶有可議者不稱居攝初始直云元年三年則失其實矣莽以平原安德漯隂鬲重丘萬户為定安國而以大鴻臚府為公第居之則書公在定安亦為失實定安公乃莽所加豈得仍其僞號竊謂宜自初始二年下注新莽始建國元年初始三年以後下注莽年如前遞數而書孺子在京師存其故稱紀其實地庶幾得之或曰其後方望立嬰為帝而元滅之當若何按方望事在光武建元元年書法當云方望以前孺子嬰稱帝於臨涇元更始遣兵擊斬望嬰并遇害釋典羅云出家即羅睺羅佛命舍利弗為其和尚大目犍連作阿闍黎故沙門以和尚為尊貴之稱佛姨母瞿曇彌欲出家如來不許謂阿難言若聽女人出家乃令佛法清淨梵行不得久住譬如莠生稻田善榖復敗又言我之正法千歲興盛以度女人故至五百歲而漸衰微所以者何女人有五處不能得作一不得作如來二不得作轉輪聖王三不得作第二忉利天王四不得作第六天魔王五不得作第七梵天王瞿一作憍按此乃比丘尼之始夫如來既受姨母乳哺深恩及五百除饉女皆長老久修梵行而如來難之且如此後之人談何容易耶又如唐武后乃真天魔王以釋氏因果論之不知往劫是何福德也南渡時東平伯劉澤清者字鶴洲曹州人天啓中户書郭允厚家奴也後充本州捕盜弓手少無賴為鄉里所惡徙居曹縣遭離亂從軍積功至總兵官金陵立福王遂為藩伯開府淮隂其兄忘其名字鳯洲崇禎時亦至總兵官禦敵歿於王事稱名將非澤清比也澤清為人隂狠慘毒睚眦必報曹縣士大夫罹其禍者甚衆澤清在江淮縣有故居空無人一日諸生十數輩僦飲其宅或拾一錦鞋於內閣中傳玩之座中有謔者澤清知之使健兒名捕至淮盡殺之中表兄某夙有違言遣人召之中表懼祈哀於澤清之母為婉轉申救澤清佯許諾禮待頗厚既辭歸立遣健兒途中拉殺之已而大兵渡淮澤清迎降歸於京師以叛案有連至盧溝橋伏法行路快之不數年子姓無孑遺故居為墟唐書言孟浩然與給事中王維善維私邀入內直會明皇至浩然倉卒避匿牀下帝問知之喜曰朕聞其名久恨未見耳立召見問所為詩云云而北夢瑣言以為李白誤盧沆為舉子於滻水遇宣宗微行意其貴人斂身回避緣此受知擢第賈島溫飛卿亦以微行傲忽致長江方城之謫此可為輕薄之戒又孟宏微郎中者性誕妄因次對奏曰陛下何以不知有臣不以文字召用宣宗怒曰卿何人朕耳中全不知有卿亦坐貶丹青樹出終南山丹青竹出熊耳山唐宋啓事用門狀即今士大夫彼此拜謁之名刺也上書某官謹祇候某官陸務觀老學菴筆記云見東都時蘇王諸名公門狀一卷率皆手書古人鄭重不苟如此今則小胥之事耳又翰林故事坊局已上乃得用紅柬為刺史官庶常止用白雖元旦賀夀等吉禮亦不用紅不喻其義故事有最可笑者唐御史臺惟南牀最尊重每會集南牀不笑南牀笑則皆大笑謂之鬨堂唐相國段文昌史云西河人褒國公志𤣥之後志𤣥本臨淄人文昌徙居荆南又云荆蜀皆有先祖故第又云先人墳墓在荆州其稱臨淄人以先世本籍故而與鄒平無涉不知何以封鄒平公今鄒平縣西北地名段家橋謂是文昌故居傅會不足信也子成式柯古罷江州刺史居襄陽與李商隱溫飛卿倡和故號漢上題襟集然柯古著酉陽雜俎多言齊州事如長白山沙彌二桃之類皆在鄒平唐華原栁氏家法為士族之冠公綽公權已下至玭皆然玭家鬻婢猶不屑奉侍賣絹牙郎其家法可知而負國賊桞璨乃生其族卒與張廷範輩同誅死未足酬衣冠之禍故知蓬生麻中不扶自直之論未必盡然若桓􅉓為晉忠臣而溫與宏繼世為逆郗鍳郗愔之生超盧懷慎盧奕之生杞皆其類歟每讀史輒為三嘆金陵胡宗仁字彭舉以畫名亦工詩與竟陵鍾伯敬為友嘗有與鍾書云兄弟子姪皆耽作畫蓬門晝掩茗碗罏香閣筆盈案妄擬堆笏滿牀昔人一門五貴七葉蟬連寧復過之其子玉昆字元潤亦工畫嘗寫杭州宋宫古梅豫題絶句云風雨崖山事渺然故宫疏影自年年何人寄恨丹青裏留伴冬青哭杜鵑故友合肥李文定容齊天馥極愛此詩常諷詠之昔人謂沈石田相城喬木代禪吟寫此後惟金陵胡氏足以繼之張遺瑤星題程青溪侍郎正揆畫云唐六如畫學周東村不啻過之只為胸中多數百卷書耳豫評陳户部子文奕禧書品亦如此姚翼字伯右工畫梅又取鍾山梅瓣粘於便面以筆添枝幹其上極有生韻時號姚梅人多效為之渠丘張杞園貞孔目仿作甚工白樂天詩吳娘暮雨瀟瀟曲自别江南久不聞極是佳句可吟誦又近人詩云東風誰唱吳娘曲暮雨瀟瀟暗禁城豫亦有二絶句云波繞雷塘一帶流至今水調怨揚州年來慣聽吳娘曲暮雨瀟瀟水閣頭七載離筵喚奈何玊壺紅淚斂青蛾瀟瀟暮雨南陽驛重聽吳娘一曲歌鷗字列子作漚蓋古通用色皆白獨莆田九鯉湖鷗作粉紅色隋宦者劉繼詮獻芙蓉鷗二十四隻色如芙蓉疑即此種唐宋外任官到任皆有謝表高常侍集有謝封丘縣尉表則縣尉亦得上表矣燕窩從海舶來有烏白紅三種惟紅者最難得白者能愈痰疾紅者有益小兒痘疹人參益人沙參元參性雖寒凉亦兼補海參得名亦以能溫補故也生於土為人參生於水為海參故海參以遼海者為良先兄西樵先生撰古今閨閣詩文為然脂集多至二百卷詩部不必言文部至五十餘卷自草一史已下瀏觀采托可稱宏博精核而說部尤創獲為古人所未有今略其書目載於此班昭漢書異姓諸侯王已下至古今人表凡十卷班昭漢書天文志一卷班昭補列女傳一卷班昭女誡一卷班昭幽通賦注一卷衛鑠筆陳圖一卷蘇蕙璇璣圖一卷宋若莘女論語一卷侯莫陳邈妻女孝經一卷預浩或作喻浩女木經一卷李清照打馬圖一卷沈俶諧史一卷龍輔女紅餘志一卷管道升墨竹譜一卷鄭氏女教篇一卷明仁孝徐后內訓一卷仁孝徐后勸善嘉言一二三卷仁孝徐后勸善感應一卷章聖蔣太后女訓一卷楊慎妻黃氏錦字書一卷王鳯嫻東歸紀事一卷廬江王夫人燈花占一卷張淑媖刺繡圖一卷邢慈靜邢太僕侗之妹黔途略一卷徐淑英女誡雜論卷一徐德英革除紀一卷筆洞細君花殿最一卷薛素素花瑣事一卷方維儀尼說七惑一卷方維儀宫閨詩評一卷顧若璞往生紀實一卷倪仁吉宫意圖題語一卷陳結璘牡丹亭牌譜一卷胡貞波古牌譜上下卷季嫻學古餘論一卷季嫻前因紀一卷王端淑詩緯序論一卷陶姮儀放生約一卷董白奩艷上中下卷尼超衍密印語録一卷尼濟印仁風語録一卷尼自如語録一卷計五十六卷其全書今藏篋笥無力刻行也上已之已本已字之訛又泊宅編云十干之戊與茂同音今呼為務亦非又稱為武五代史僞梁朱溫時司天監上言日辰內戊字請改為武蓋溫父名誠戊字類成故司天監以此諂之今吳中術士尚有沿之者栁子厚作非國語宋江端禮作非非國語嗣是劉章虞槃皆有非非國語見張合宙載今不盡傳童貫自謂韓魏公出子與梁師成自謂蘇文忠出子正同曹操父子本寺人之後忠獻文忠乃為寺人祖禰乎宙載云書册為水潦所浸可於火甑中蒸而曝之至一二番乃以物鎮平處逮乾色雖微漬而無損壞宙載張鐸僉事言鴿能辟小兒疳氣當多置房養之清晨令兒開房放鴿其氣著面則無疳疾南園漫録云桂有桂樹之桂有桂花之桂桂樹則楚詞桂酒箘桂之類今醫藥所用取其氣味甘辛乃用其皮也桂花之桂則詩詞所言今人家園囿所植取其香氣郁烈乃尚其花也類書所載皆未别白雖白孔六帖亦然溫飛卿以蒼耳子對白頭翁寧陽許襄敏公彬取作一聫云道上鈎衣蒼耳子風前聒客白頭翁蓋其去國之作上句即迷陽迷陽勿傷吾行下句即違山十里蟪蛄之聲尚猶在耳之義碧里雜存云鍾山孝陵即梁寶志公瘞所也傍有八功德水誠意伯奏改葬志公水亦隨往太祖異之為建靈谷寺歲命太常祭焉見只編言陳水南霆以南唐李忭宜繼唐後改馬令書以為唐餘紀傳猶蕭常改三國蜀志為續後漢書也讀吳越備史忭本安吉寨將潘某之子姓實潘也水南特以五代纂祚短促不足繼統不若南唐聲名文物雄擅江左不愧唐後耳云云豫按吳越與南唐世為仇備史之言未可遽信詎可據為實録以駁水南耶漢郙閣銘在寧羌州州陋甚在五丁峽西南豫嘗過之不知有此古物未及訪碑刻所在殊以為憾甲申八月禮部尚書韓菼卒於位公長洲人中康熙癸丑會狀兩元授翰林修撰至今官先是以內閣學士豫假歸乙亥奉召入京有屠西爽者以卜筮名吳中韓問之曰公此行官至尚書然癸未即當南歸過此不能歸矣韓入都纍遷禮部吏部侍郎超拜大宗伯至癸未始嬰疾乞假未允甲申病增劇再疏告老命在任調理至是卒公平素為豫述屠言且云過癸未不歸豈遂死耶王大司空鴻縚時同被召命聞屠語人曰韓公此行不歸矣果驗屠亦以癸未年卒康熙四十一年五月於保和殿頒賜御書大理少卿臣李斯義得臨黃庭堅書一幅其詩云談經草檄鬢華生初擁閩山傳節行江入桐廬青欲斷溪從劔浦碧來迎茶雖户種租宜薄鹽不家煎價賴平要使祈招歌德意君恩豈為逺人輕四十三年十一月李以副都御史遷福建巡撫前詩竟為之䜟云香祖筆記卷八
