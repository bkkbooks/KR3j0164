body:
  text: 香祖筆記卷十刑部尚書王士禎撰昭王南征其君子化為猿鶴小人化為沙蟲疑是誕罔語耳然世頗有此事如望帝化杜宇牛哀李委化虎郗后化蟒李林甫化牛之類清波雜志載章惇化猫泊宅編載馮拯化驢甚異不知盧杞柳璨蔡京秦檜史彌逺嚴嵩之徒又當化何物耳檜墓在金陵城南牧羊亭至今呼為狗葬則其化韓盧必矣玉川子詩春秋三傳束高閣後世乃有故實暗合者可為一笑常秩治春秋學著書數十卷後以王安石薦起安石不喜春秋秩遂諱之時兩河告饑詔青苗錢權行倚閣或戲秩曰君之春秋亦權倚閣乎故豫謂秩與种放皆穿窬小人而無識者猶載之隱逸傳不大謬耶廣東巡撫石文晟疏言番禺縣已故儒士李無械妻何氏年百有一歲例請旌表下禮部議允行李義山對雪詩欲舞定隨曹植馬有情應㸃謝莊衣雖非上乘語然尚不失雅馴墨客揮犀載羅可二句云斜侵潘嶽鬢橫上馬良睂則晚唐五代惡道所謂下劣詩魔者也雅俗之間不可不辨老學菴筆記陳師錫家享儀以冬至前一日為冬住又云唐盧頊傳云是日冬至除夜乃知唐人冬至前一日亦謂之除夜吾鄉三十年前冬至節祀先賀嵗與除夕元旦同近乃不行亦不知其所以然也乙酉夏二東多疫忽有鄉人持齊素者言以五月晦為除夕禳之則疫可除一時村民皆買香燭祀神祗祖先亦妖言也康熙乙酉五月十八日大風從西北來先以黃氣繼以赤氣氣過而風晝晦大樹皆拔蒲臺縣之陳化鎮有三人同行風至伏田間及風息則三人伏處皆成墳如新築者三人皆死其下又人家造屋三間初就忽移置五里外梁柱瓦甓如故此與丁巳五月朔京師之風同後漢書雒陽男子夜龍以弓箭射北闕龍有從兄陽夜姓也放翁筆記謂古所謂揖但舉手而已今所謂喏乃始於江左諸王然則漢汲長孺長揖大將軍當是舉手耳然何以云長揖耶梁園風雅明雍丘趙彥復微生臨清汪元范明生所撰自李獻吉何仲默王子衡高子業以下凡八人義例嚴潔豫嘗勸宋中丞牧仲合劉欽謨中州文表刻之吳中以備河南文獻乙酉六月適寄到風雅新刻本乃嘉定門人陸廷燦較刋者豫笑謂座客曰吾為朋友謀則善矣吾鄉文獻乃聽其放失可乎故嘗欲輯海右六郡前輩作者遺集五十家斷自洪永已來如許襄敏彬黃忠宣福秦襄毅紘馬文簡愈劉文和珝毛文簡紀王叔武宗文靳兩城學顔藍田玉夫殷近夫雲霄穆文簡孔暉邊尚書貢劉希尹天民許尚書成名王文定道殷文莊士儋馮閭山裕子汝强惟健汝行惟敏汝言惟訥李滄溟攀龍李伯承先芳蘇侍郎祐楊太宰巍劉範東隅吳太宰嶽戚少保繼光子子冲淡龔方洲秉德于文定愼行兄厖睂生愼言郭魯川本傅金沙光宅于念東若瀛李愚谷舜臣李中麓開先邢子願侗公文介鼐弟舉人浮來馮文敏琦鍾尚書羽正謝茂秦榛許殿卿邦才從叔祖伯石象艮季木象春高孩之出鄒養浩頤賢先伯父侍御府君與𦙍盧德水世㴶王湘客若之劉節之孔和張元明光啓徐東癡夜董樵谷樵輩擷其菁華都為一集守官京師四十餘載匆匆未暇今歸田矣而髦及之耳目神理非復故吾不知斯志能終遂焉否也聊志此以俟他日乙酉六月草二日西堂書小說演義亦各有所據如水滸傳平妖傳之類豫嘗詳之居易録中又如警世通言有拗相公一篇述王安石罷相歸金陵事極快人意乃因盧多遜謫嶺南事而稍附益之耳故野史傳奇往往存三代之直反勝穢史曲筆者倍蓰前輩謂村中兒童聽說三國事聞昭烈敗則顰蹙曹操敗則歡喜踊躍正此謂也禮失而求之野惟史亦然平妖傳多目神借用呂文靖事指使馬遂乃北寺留守賈魏公所遣借作潞公耳鄭毅夫有馬遂傳嚴三㸃已詳豫居易録靈寶許氏塋在縣東數里背岡阜靣黃河以河北中條山為案襄毅公冡在西莊敏文簡而下諸子孫以次而東形勢極河山之雄壯蔡京葬其父於杭之臨平以錢唐江為水越之秦望山為案尤據江山之勝然京與其子攸絛輩皆不得其死堪輿之說其足恃乎亦存乎其人也筆記言宋時前輩遇通家子弟請設拜既受之則設席望其家遙拜其父祖乃坐又一書記米元章與人書至某再拜則置筆几上正衣冠對書再拜又蘇黃朝張門狀皆手書又前輩與人書言除批答門狀外未嘗自書昔人於酬接書問間古道如此今後輩不知先進遺風者多矣青浦縣有地名孔宅相傳隋蘇州刺史孔子三十四代孫禎葬先聖衣冠處乙酉南巡駐蹕松江府御書聖蹟流徽扁額及二陸祠董其昌家祠芝靈氣扁額頒賜諭其昌孫侯銓州同建中送吏部先用得荆門州皆曠典也余前記梵書薜荔為餓鬼又按酉陽雜俎云人犯五千惡為五獄鬼萬惡乃墮薜荔也華山玉泉院山蓀亭大石旁有無憂樹四酉陽貝編云無憂樹女人觸之花方開亦蘭稱待女花之類荆州街子葛清自項以下遍體刺白居易詩凡三十餘處人呼為白舍人行詩圖此視書團扇繡弓衣者竒矣而出於市井之流尤竒之竒宋靖康間東京織帛及婦人首飾皆備四時如桃杏荷菊梅花之屬謂之一年景豫昔使東粵過贑報謁丁鴈水憲僉留飯園亭時甫過上元數日瓶中插雜花如桃梅桂花佛桑之屬皆盛開豫戲語鴈水君可謂四時之氣具備比過嶺則芭蕉隆冬亦不凋始知摩詰雪中芭蕉未可輕議特粵中雪不易得耳宋士大夫以四六箋啓與手簡駢緘之謂之雙書後益以單紙直叙所請謂之品字封後又變而為劄子多至十幅淳熙末朝士以小紙高四五寸濶尺餘相往來謂之手簡豫家所藏萬厯中先逹名人與諸祖父書劄皆用朱絲闌大副啓雖作家書亦然五十年來乃易為寸楮日趨簡便而古意無復存矣放翁云漢嘉荔子熟時凌雲山安樂園皆盛處余昔過嘉州考圖經明時止有㑹江門一株熟時專供蜀府他即無有獻賊亂蜀後并此一株亦不復存矣宋寫書多用蒲圻縣紙今殊不聞宋人詩至歐梅蘇黃王介甫而波瀾始大前此楊劉錢思公文潞公胡文恭趙清獻輩皆沿西崑體王元之獨宗樂天然豫觀宋景文近體無一字無來歷而對仗精確非讀萬卷者不能迥非南渡以後所及今人耳食譽者毁者皆矮人觀場未之或知也吳江門人徐翰林電發釚寄西村集集凡二十八卷其鄉先輩史鑑明古著也明古成化間高士與沈啓南齊名而與吳原博王濟之李貞伯友善為三原端毅公所知按集中有曽祖文質府君行狀祇言洪武中縛貪吏詣闕事無一語及靖難而吳文定為明古表墓止云曽祖彬亦無一語及遜國則致身録之作果不足信然當時胡為而有此說遂傳千古之疑此集是陳仲醇繼儒選後漢嚴光傳齊國上言有一男子披羊裘釣澤中今臨淄縣南十里淄水上有釣臺傳是子陵故蹟而與七里瀨釣臺隱顯迥别此水一號龍女水又名裙帶水澠水燕談記王黃州題孫僅文編云明年再就堯階試應被人呼小狀元僅果繼兄何復第一世以元之為知人豫昔在京師丙辰榜後常熟歸少詹孝儀允肅以舉子下第留京師每徒步造豫寓舍以詩卷相質豫語之曰君書法既工而新詩無一怨尤憔悴之語將來必狀元及第己未臚傳果第一又丁丑常熟嚴寶成虞惇癸未閩縣趙書山晉豫皆决其必登鼎甲巳而二君先後榜眼及第二君皆豫門生也慶厯中蘇子美進奏院祠神事起無敢救解者韓魏公從容言於仁宗曰舜欽一醉飽之過止可薄治之何至如此帝悔之歐陽兖公作蘇氏集序云嗟吾子美以一酒食之過至流落以死正用韓公語而志中不載其事田告字象宜篤學有文少學詩於陳希夷東遊過濮客於王元之㑹河决著禹元經三卷已而得水樹於濟南明水將隱居焉貽書徐常侍鉉鉉答曰負鼎叩角顧廬築岩各由其時不失其道在我而已何常之有遂决高蹈筮易遇暌因自號暌叟從學者常數百人淳化中韓丕言於天子召赴闕詔書及門而卒皇祐中濟南翟書裒其文四十八篇析為三卷又次其出處作暌叟别傳今明水在章丘城南土鼓縣故城西亭山縣東北曰淨明泉在百脉泉西北即繡江之源也齊乘云朗公谷諸水東西伏流西發趵突東發百脉所謂金霏碧渟韻琴筑而味肪醴者也此吾鄉高逸第一流昔撰古歡録遺之夏日雨過讀澠水燕談得告事因略述水經注元和郡縣志齊乘而著於篇皇祐五年王汾擢進士甲科唱名日左右奏免解進士例當降甲仁宗覽家狀曰汾先朝學士禹稱曽孫遂不降甲後又以元之孫超升朝籍元之以直道不容於太宗而仁宗特擢其孫與蘇黃黨禁於徽宗而其孫與甥皆見擢於高宗事同直道固不終泯而仁宗高宗之憐才亦古今所罕覯也汾本名元宗字彥祖以夢改名唐開元二十七年詔追諡孔子文宣王命其後嗣褒聖侯改封嗣文宣公宋初孔氏子孫襲封仍唐之舊仁宗納祖擇之言改封衍聖公至今因之左必蕃廣州順德人由監察御史出知揚州府乙酉上南巡嘉其清節持擢太常寺少卿以難其代仍命知府事宋初文士稱高梁柳范謂高辨梁周翰柳開范果也在楊劉之前而人多不知祥符中劉稱為陜州司法參軍亷慎至貧官罷無以辦裝賣所乘馬跨驢以歸魏野以詩送之云誰似甘棠劉法掾來時乘馬去騎驢真宗祀汾陰見野詩嘆賞久之時稱為江南幕官召至以為京官知青州博興縣後有差除上曰得如劉稱者可矣不數年亟遷主客郎中今博興名宦不知祀稱否録之以備遺闕云右見澠水燕談録乙酉自濟南至青州諸郡縣皆有狼災李石續博物志言劉亮合仙丹得白蟾蜍白蝙蝠服之立死又陳子真得蝙蝠大如鴉食之一夕大泄而死又云丹水有石穴蝙蝠百歲者倒懸得而服之使人神仙其自相矛盾如此薏苡一名簳珠續博物志言文帝撰五經尚書大傳使掌故歐陽生等受尚書於伏生按漢書詔太常使掌故朝錯往受之非歐陽生歐陽生字和伯千乘人今樂安縣事伏生授兒寬寬又授孔安國其源流如此非以掌故往受經者也志又云漯水有伏生墓亦非漯乃獺之訛磻溪在郿而李石云磻溪在汲郡有太公泉太公廟附會可笑人死為鬼鬼死為聻李石以聻為滄耳虎音積又有你音指物貌禪家有此語飛廉紂時諸侯或以為惡獸頭似羊又以為神禽頭似鹿此亦以檮杌為鯀之類又方書之漏蘆一名飛廉高麗人參贊三丫五葉背陽向隂欲來求我椴樹相尋椴木葉似桐甚大而陰多人參生其陰人參譜上金謂之紫磨金劉迎詩紫磨金餅暾扶桑迎字無黨萊州人湘州記蔡子池南有蔡倫舂紙臼今成都萬里橋西江岸有薛濤造箋石臼或云是蜀府造箋處楊汝士於楊於陵座上賦詩云文章舊價留鸞掖桃李新陰在鯉庭元白嘆伏汝士歸謂子弟曰今日壓倒元白又在洛中裴晉公夜宴汝士詩云昔日蘭亭無艷質此時金谷有高人元白失色此本一事而重復誤書之耳按裴白在洛與劉夢得多倡和聨句裴詩所謂成周文酒㑹吾友勝鄒枚唯憶劉夫子而今又到來是其事也是時文宗太和七年癸丑白罷河南尹再授賔客分司八年甲寅裴為東都留守開成元年丙辰劉分司東都楊汝士東川節度使二年丁巳留守裴侍中修褉於洛合宴舟中先是太和五年元已薨於武昌安得與樂天汝士同在洛中飲宴賦詩耶小說之不考而妄語如此可笑也癸辛雜識記宋十五帝御押太祖盈立元押太宗安乍元押真宗闕仁宗白今益都孫相國沚亭廷銓顔山雜記所録鳳凰嶺玉皇宮石刻宋四聖御押殊不同太祖太宗真宗仁宗泐闕竝載之以備參考白氏文集記云家藏之外别録三本一置東京聖善寺鉢塔院一置廬山東林寺經藏一置蘇州南禪寺千佛院澠水燕談云廬山寺白集七十卷廣明初為高駢强取去後四十年有王長史者遍求善本較正而藏之尋又易去頗多舛謬真宗詔取至都下命侍臣以諸本參訂繕寫付寺僧謹藏之真宗可謂右文之主也鄰幾雜志雄霸間塘泊冬月載蒲葦皆用凌牀雖官員亦乘之今京師之俗猶然謂之氷車太倉崔華字不雕子門人也工詩畫嘗有句云丹楓江冷人初去黃葉聲多酒不辭豫極愛之呼為崔黃葉歷城族子蘋字秋史壬午舉人有句云亂泉聲裏才通屐黃葉林間自著書豫亦呼為王黃葉初豫少年和李清照漱玉詞云郎似桐花妾似桐花鳳劉公㦷體仁戲呼王桐花鄒程村祇謨云崔黃葉自合作王桐花門生耳同年祁工部珊洲文友官廬江令有絶句云昨夜東風吹雨過滿江春水長魚蝦豫戲之曰古人警句例標美名欲呼兄作祁魚蝦必不樂受奈何因憶宋人有呼梅聖俞為梅河豚者敢援此例一座皆笑鄰幾雜志云審刑奏案貼黃上更加撮白撮白上復有貼黃今不知撮白為何語石林燕語又謂之引黃鰒魚産青萊海上珍異為海族之冠南史有餉三十枚者一枚直千錢今京師以此物餽遺率作鮑魚則訛作秦始輼輬中物可笑又一郎官餽歲單有燒鴉見之愕然徐問之乃鴨之訛耳李贄極稱武曌馮道亦猶丁謂以曹操司馬懿為聖人夏竦美李林甫相業君子小人各從其類如此周密記德壽宮中秋賞月之所橋用白石甃之瑩徹如玉以金釘鉸橋下皆千葉白蓮花御几御榻瓶爐酒器皆以水精為之水南皆宮女奏清樂水北皆樂工吹笛此視明皇月宮之遊豈有人間天上之異又桯史云德壽在北內孝宗將以元旦舉慶典有北賈攜通天犀帶一進於內帶十三銙銙皆正透有一壽星扶扙立云云亦竒物也東坡十歲讀范滂傳慨然太息願效之山谷晚謫宜州為宜倅余某之子滋滸默書范滂傳才忘二三字孟博一傳櫽括蘇黃始終乃爾志士仁人千載而下猶為感憤山谷書范滂傳後藏趙忠定家事見桯史癸辛雜志云治喉閉用帳帶散惟白礬一味或不盡驗南浦有老醫教以用鴨嘴膽礬研細以釅醋調灌有鈴下一老兵妻患此垂殆如法用之藥甫下咽即大吐去膠痰數升立差又治眼障用熊膽少許以淨水略調盡去筋膜塵土用氷腦一二片癢則加生薑粉㱔少時以銀筯㸃之竒驗赤眼亦可用陸務觀作姚平仲傳言隱蜀青城山時出至丈人觀紫髯郁然走及奔馬癸辛雜識又云李次仲遇姚平仲於廬山豈晚又出蜀逺遊乃至吳楚耶周公謹述括蒼陳坡言治痘瘡色黑倒靨唇口氷冷方用狗蠅七枚擂碎和醅酒少許調服移時即紅潤如舊冬月蠅藏狗耳中又治痘毒上攻內障方用蛇蛻一具淨洗焙燥再用天花粉等分細末之取羊肝破開入藥末於內麻皮縛定泔水煮熟切食之旬日即愈古人作墓志行狀多用皇祖皇考余嘗疑之未逹其義周密云詩思皇多士詩記引顔注漢書云美也急就章注云正也大也泰誓孔傳訓皇為前宋人書感激曰感磯取孟子是不可磯也注云磯激也義與激同然亦鑿矣荆楚歲時記河鼓謂之牽牛黃姑即河鼓也古詩云黃姑織女時相見李後主詩云迢迢牽牛星渺在河之陽粲粲黃姑女耿耿遙相望則又以黃姑為織女不知何據大唐新語謂梁簡文好作艷詩江左化之謂之宮體晚年改作追之不及乃令徐陵撰玉臺集以大其體今觀玉臺新詠所録皆靡靡之音正足推波助瀾何區雅鄭此集豫在京師曾見宋刻今吳中寒山趙氏翻刻本可謂逼真唐初御史裏行之名自馬周始又云武后革命恐人心不附供奉官正員之外又置裏行御史遺補有車載斗量之謠大唐新語李襲譽性儉約好讀書寫書數萬卷謂子弟曰吾不好貨財以至貧乏京城有賜田十頃可以充食河南有桑千株可以充衣寫得書萬卷可以求官汝曹第勤此三事何求於人右數語可作家訓故録之以示子孫隋時天子及貴臣多著黃紋綾袍烏紗帽百官皆著黃袍及衫出入殿省見大唐新語臣下得著黃亦太凌僭矣至唐始有紫緋青緑之别莊子與釋氏不甚相逺唐傅奕精於莊老而力詆佛教殆不可解握拳透瓜世但知顔魯公獨異志云晉中書令卞忠貞殉蘇峻之難後盜發其墓靣色如生兩手皆拳爪甲穿於手背與魯公同唐文皇病痢諸醫不效金吾長史張寶藏進方以乳煎蓽茇服之立差唐𤣥奘法師摩頂松在齊州靈岩寺師取經西域歸始住長安洪福大慈恩二寺及宜君玉華宮譯經耳靈岩屬今長清縣圖經但以為佛圖澄卓錫之地而不知𤣥奘故著之後漢馬略閉户讀書十年不出三日一食鄉里謂之潛龍此在卧龍之前宋宇文伯修藏一古鼎欵識曰輦酌宮按班書宣帝紀常困蓮勺鹵中如淳注蓮音輦勻音灼縣名雍録曰漢蓮勺縣唐之下邽縣也元和志曰下邽東二十三里有蓮勺故城然三輔黃圖雍録所載漢宫殿名甚詳無所謂輦酌宮者蓮勺諸書皆言縣名亦不言有宮著之以俟博雅如劉原父者孫思邈千金方人參湯須用流水煮用止水則不驗人參譖沈存中筆談補云前世風俗卑幼致書尊者但批紙尾答之謂之批反如詔書批答之義故紙尾多作敬空字謂空紙尾以侯批反耳按昔人謂謹空之空乃九􅉔之工首􅉔也二說互異周禮春官大祝辨九􅉔一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰褒􅉔九曰肅􅉔新唐書如近日許道寧輩畫山水是真畫也史記如郭忠恕畫天外數峯略有筆墨然而使人見而心服者在筆墨之外也右王楙野客叢書中語得詩文三昧司空表聖所謂不著一字盡得風流者也郭忠恕著佩觽汗簡二書竝載宋史萟文志而汗簡不傳於世今秀水朱氏有鈔本六卷吳門新刻逼古可寶也首有李建中題云汗簡元闕著撰名氏因請見東海徐騎省鉉云是郭忠恕製復舊臼字部末字注腳趙字下俱有臣忠恕字驗之明矣後有天禧二年七月十七日開封府判官虞部員外郎李直方序又庚寅六月所南鄭思肖為山澗葉君題汗簡後是書所援据自古文尚書以下凡七十一家多今世未見者嘗見人家竈側多促織竊疑之偶讀酉陽雜俎云竈馬狀如促織而稍大好穴竈側竈有馬足食之兆濟南明湖蛙不鳴濰縣無蟬或閲數年間聞其聲則置酒競往賞之以為異事段柯古云竹譜竹類三十九按戴凱之竹譜乃七十餘種宋英宗守文令主然其知人之哲尤不可及舊制御史闕令中丞及翰林學士知雜迭舉英宗內批自除二人范堯夫以江東轉運判官為殿中侍御史呂微仲以三司鹽鐵判官為監察御史裏行如此用人雖唐虞三代盛際何以加之使神宗能守家法何至王呂輩紛紛亂天下耶御史裏行始於唐初迄宋尚仍之不改政和間以詩為元祐學術御史李彥章遂上疏論淵明李杜以下皆貶之因詆魯直少游無咎文潛請為科禁至著於律令云諸士庶傳習詩賦者杖一百其紕陋一至於此是時大臣朝士皆安石之餘孽然安石惟欲廢春秋耳其詩實於歐蘇間自成一家亦可槩謂元祐學術乎此古今風雅一大厄也葉石林云晉宋間佛教初行未有僧稱通曰道人宣和崇道教改沙門曰德士道人德士正是絶對避暑録言呂文穆蒙正為父龜圖所逐衣食不給龍門寺僧識其貴人延致寺中鑿山岩為龕以居之凡九年後諸子即石龕為祠堂名曰肄業富文忠為之記今人以傳竒有破窰之說志書亦㳂俗論但言窰而不知有龕并龍門僧亦湮沒不傳可惜也勞山多耐冬花花色殷紅冬月始盛開雪中照曜山谷彌望皆是說者謂即南中之山茶然花不甚大所云海紅花是也趙俊字德進歸德人宋為南京僞齊劉豫起為虞部員外郎者三以告强畀其家卒力却之凡家書文字一不用豫僭號但書甲子此亦一陶淵明也又南唐自顯德五年用中原正朔士大夫以為恥碑文但書甲子見懶真子古來如謝康樂宗少文輩癖好山水者多矣明臨海王恆叔士性宦遊所至輒登臨山水間窮極幽奧作遊記數十篇江陰徐霞客終身於遊至歷絶域徼外無不窮其奧可謂好事者矣豫同年吳君順治末進士嘗遊武林宿留數月始歸豫詢以西湖西溪諸名勝曰皆不知也詢其未往遊之故則大笑曰吾跋涉水陸二千餘里豈為山水往耶豫為先兄西樵言之以為人嗜好徑庭乃如此石林避暑録述景修言往以九月望夜道錢唐與詩僧可久泛西湖至孤山時已夜分月色正中湖靣渺然如鎔銀傍山松檜參天露下葉間薿薿皆有光微風動湖水晃漾與林葉相射可久清癯苦吟坐中不勝寒索衣無所有空米囊覆其背以為平生得此無幾此一段文字非東坡不能道景修姓張字敏叔常州人也唐望江令麴信陵詩豫向從萬首絶句得三首録之頃又從王楙叢書見一聨云臺笠看山雨渚田耕荇花語最工而不得全篇晉簡文帝鄭后諱阿春故晉人謂皮裏陽秋孫盛晉春秋為陽秋梁武帝小名阿練改練為絹今絹布之絹俗罕知其為練矣鴟夷河豚也摴蒲海蜇也西施舌海燕所化久則復化為燕鮸三腮鱸四腮富文忠公不以文章見長康節外紀載其過堯夫一詩云先生自衛客西畿樂道安閒絶世機再命初筵終不起獨身窮巷寂無依貫串百代嘗探古吟詠千篇亦造微珍重相知忽相訪醉和風雨夜深歸頗可誦馮元成雨航雜録云皇甫百泉與王弇州名相埒時人謂百泉如齊魯變可知道弇州如秦楚强遂稱王此二語最是確論香祖筆記卷十
