body:
  text: 香祖筆記卷一刑部尚書王士禎撰康熙四十一年壬午三月初五日文華殿經筵臣士禎以經筵講官刑部尚書侍文淵閣大學士吏部尚書熊賜履禮部侍郎羅察進講四書樊遲問仁子曰愛人一節禮部尚書韓菼工部侍郎舒輅進講易經繫辭居則觀其象而玩其辭四句講畢賜宴太和門江南道監察御史張瑗題為逆惡之罪既已正典於前朝私豎之碑豈宜𫝊流於後世亟請乾綱敕毁以警奸邪以垂鑒戒事恭聞我皇上前嵗翠華南幸命修嶽飛之墓賜題于謙之碑誠以此二臣者忠貫日月義壯山河故特表而揚之以風示天下夫善在必彰者則惡在所必疸臣奉命巡視西城前往西山一帶查閲至香山碧雲寺寺後峻宇繚墻覆壓數里鬱蔥綿亘金碧輝煌疑是前代王侯寢宫詢之土人乃知為故明罪惡滔天磔尸身後逆璫魏忠賢之墓墓上有穹碑二屹然並立合書欽差總督東厰官旗辦事掌惜薪司內府供用庫尚膳監印務司禮監秉筆總督南海子提督保和等殿完吾魏公忠賢之墓臣觀覽之下不禁髮指夫魏忠賢者在故明天啓時竊操國柄屠毒忠良惡貫滿盈一時羣小皆出其門德碑生祠幾遍天下神人共憤道路以目至崇禎初年罪狀發露押往祖陵潛行自盡磔尸河間迄今公論在人尚恨戮尸不足以蔽厥辜乃畿輔近地尚留此穢惡之蹟僭越之制何以懲巨憝昭大法哉况當奉㫖纂修明史之時凡明季忠良被禍諸臣無不立𫝊表揚以彰公道光天化日之下豈容奸孽餘黨膽大潑天目無三尺仰祈天威乾斷敕地方有司立仆其碑剗平其墓俾天下後世知凶惡之徒不能逭憲典於身前并不能保墳墓於身後其於聖明疸惡之義不啻炳如日星嚴如斧鉞矣云云奉㫖魏忠賢碑墓著交與該城官員仆毁剗平該部知道瑗賦詩記事云彰疸表天道誅賞昭王綱伊誰實職之蘭臺凛秋霜道惟鉏姦宄庶以全善良攬轡出都門陟睇西山岡廬舍匝阡陌各各營農桑厥俗一以朴民氣尤悅康榛莽化蘭蕙無復嘷豺狼尋憩古佛剎紺碧何輝煌背負諸墓碣封樹皆貂璫逆閹塜踰制陵園相頡頏穹碑矗霄漢長松繞垣墻以彼稔凶惡萬死奚足償搏噬縱鷹犬湯鑊烹鸞凰天地盡暝晦白日無晶光古多寺人禍兹禍踰漢唐國步倐臲卼社稷旋淪亡彼身已寸磔墓胡留山陽我見髮上指衝冠心激昻及此不鏟剃無乃忤蒼蒼拜疏請明㫖聖德奮乾綱碑仆墓亦毁狐兔將安藏堯舜除四凶海宇稱平章誅惡及勝國來者心自臧岩壑湔穢濁草木回芬芳聊以佐史筆憲紀於焉張瑗字蘧若祁門人豫辛未科所取㑹元也以編修改御史一時賦詩紀者甚衆禎按工部郎中萬公燝疏云臣於三月詣陵開工過香山碧雲寺見魏忠賢所營墳墓碑石峥嶸隧道深閟翁仲簪朝冠而環列羊虎接駝馬以森羅制作規模髣佛陵寢云云則閹擅國柄時自營生壙已久特既誅之後未有建議毁之者故幸存至今耳羽紗羽縀出海外荷蘭暹羅諸國康熙初八貢止一二匹今閩廣多有之蓋緝百鳥氄毛織成豫按異物彚苑唐安樂公主使尚方合百鳥毛織為裙正視旁視各為一色日中影中各為一色而百鳥之形狀皆見然則古亦有之矣又南史齊文惠太子織孔雀毛為裘華貴無比武后有集翠裘以賜幸臣皆其類也又滿剌加哈烈出鎖袱一名梭服鳥毳為之紋如紈綺今閩中最多價不甚髙非羽紗羽縀比浙江巡撫某疏明紹興府知府湯紹恩於三江海口築塘建閘旱潦無害逮我朝定鼎以來泄水驅沙靈異尤著禦灾捍患利益宏多伏祈敕賜褒封祀典云云下禮部議允行京師粥花者以豐臺芍藥為最南中所産惟梅桂建蘭茉莉梔子之屬近日亦有佛桑榕樹榕在閩廣其大有䕃一畝者今乃小株僅供盆盎之玩佛桑重臺者永昌名花上花見萟林伐山鄞處士萬斯同字季野與其兄斯大字充宗同游黃太冲之門充宗研精經學而季野貫穿史事于明代三百年典故如指諸掌史官總裁諸公聘入京師一切皆取衷焉初先伯祖太師公諱象乾列傳汪編修琬倪檢討粲各有撰述季野從實録搜采十許事補入視二君為詳其所撰宋季忠義録十二卷一卷載恭帝端宗末帝本紀陳仲微二王始末二卷迄末自江萬里文天祥而下逮劉辰翁凡四百六人皆向來紀載所未備也所著又有南宋六陵遺事一卷庚申君遺事一卷補厯代史表六十卷厯代宰輔彚表八卷廟制圖考四卷河渠考十二卷崑崙河源考二卷儒林宗派八卷羣書疑辨十二卷書學彚編二十四卷可謂通儒壬午四月歿於京邸甚可惜也自己卯順天鄉闈乾清門覆試舉人後直省考試官自侍郎以下槩行開列恭候欽㸃壬午鄉試以副都御史張睿主考陜西御史吳甫生副之吏部文選郎中陳汝弼主考江南工科給事中黃鼎楫副之御史劉子章主考江西御史傅作楫主考浙江翰林滿洲阿爾賽副之湖廣巴海天理評事豫門人山東滿保河南傅森皆翰林滿洲人山西孫致彌戊辰庶吉士副都御史御史庶吉士典鄉試自是科始二十年來京師士大夫不復用金扇初則尚金陵仰氏伊氏素紙扇繼又尚青陽扇武林各色夾紗扇未幾廢而不行獨尚曺氏靴扇溧陽歌扇一時風㑹雖小物亦然殆不可曉也壬午七月浙江巡撫趙申喬疏言浙省每科試卷一萬二千有竒舊例同考官僅十三人不能遍閲請增三員禮部覆允併通行各直省如有試卷數多房考不足者題明量行增加得俞㫖是科浙闈解額視江南之數并著為例丙子豫奉命祭西嶽西鎮登鳯翔靈山靈鷲寺見如來泥洹像諸弟子有悲泣者竊以為疑適觀世說顧敷七嵗言當由忘情故不泣未能忘情故泣尋味二語大有解㑹康熙庚辰夏六月二十八日蒙恩賜御書帶經堂扁額謹紀述于居易録末卷今年壬午四月六日再蒙恩賜御書信古齊扁額回憶戊午夏初蒙恩賜存誠格物二扁已二十五年矣二十五年中三蒙御筆題賜堂額榮寵踰涯宋學士蘇易簡獲賜飛白玉堂之署四字一時輒侈為盛事臣之蒙恩何啻什倍恭為摹刻懸於蓬蓽之居而什襲御墨於寶櫝謹紀頒賜年月以示世世子孫勿忘報稱云壬午六月初九日召集內閣九卿及翰詹卿寺科道各部郎中四品以上官於保和殿傳上諭云尋章摘句華麗詞藻非帝王之本朕四十餘年惟日兢兢未嘗少釋萬幾自警有始無終之誚念兹在兹也政事之暇頗好書射厯年以來所積臨摹字幅賜卿等觀之臣士禎得絹素大字一幅共二十七字云惟正是視𤣥黃匪惑非禮不觀儀型是則慎爾所覿無愆斯德臨米芾首尾凡小璽三曰淵鑒齊長寸餘濶八分白文康熙宸翰方一寸三分白文敕幾清晏方一寸田分朱文是年七月二十三日恭紀浙江鄉試廣額既奉特㫖允行順天府府尹錢晉錫上疏以京畿國學首善之地請照浙江例增廣解額禮部覆准順天等府廣額十人國學八人奉天府一人宣化府一人八旗滿洲蒙古三人漢軍一人共廣額二十人湖廣總督郭琇亦以湖南北地大人衆援例疏請部覆准照浙江例廣十三人可謂一時右文盛事然止順天國學浙湖三直省而他省督撫未及疏請部議遂未之及未免向隅矣至豫鄉為孔子闕里所在解額六十名而至聖裔四氏學二人即在解額之內則視他省尤為未均惜無言之者梵言薜荔猶此言餓鬼出大藏服字函盤山拙菴智朴和尚自江南還山以滄浪髙唱畫册來索題蓋師訪宋牧仲開府於吳門適朱竹垞彛尊太史自禾中來㑹於滄浪亭共賦詩見懷而畫史髙簡圖之者也宋詩云青溝闢就老煙霞瓢笠相過道路賖㩗得一瓶豆苗菜菜名出盤山來看三月牡丹花因緣大事公能了潦倒粗官我自嗟好向滄浪亭子上栴檀香裏奉袈裟經行斜日且觀魚黃鳥緡蠻入耳初接席金風舊亭長竹垞懷人蠶尾老尚書阮亭春深玉版容參悟嵗晚花宫待掃除拂子一揮仍小住空林明月暮鐘餘提督山西學政翰林院侍讀汪灝以大同府人文勝前疏請撤去門字號照福浙總督侍郎郭世隆三十六年題請臺灣一府撤去至字號與通省一體勻中之例部覆得㫖允行河南巡撫侍郎徐潮疏言二程子後裔五經博士程佳璠病廢請以其子程舉承襲明宏治中京口人錢寶者善醫嘗遊齊魯間遇一老僧能卧大雪中雪為不積問其年數百嵗矣後至金陵居天界寺撫摩能療諸疾後尹蓬頭客於錢氏錢偶言僧狀尹曰吾師祖也别來久尚亡恙耶已而尹去老僧復至京口錢為述尹語僧曰是吾孫也徐出度牒示錢則唐大中四年所給已八百年矣僧秦人不知名字見外史唐時升叔逹三易集有南翔八老人詩序云南翔里有八老人為社徐爵九十六趙陸九十四陸淙八十五徐勳張樂俱八十四董儒八十三朱梓八十二陸球八十一居止不一二里而耄耋相望日杯酒談笑相娛樂誠太平盛事也詩云白鶴村頭春日曉香霧濛濛百花好蒼顔素髮八老人花前置酒相傾倒笑說鄰翁學語時追談邑子知名早不知主客更勸酬爭引曽𤣥互提抱今年孟春甲子晴占云麻麥俱豐成坐中祭酒九十六敬酹社翁㫖且清其間迭起拜更祝但願腳健雙眸明桂林從事八十一只聞喚弟無呼兄南村翳翳桑榆日出且持杯歸散帙但課兒孫種黍苗何知道士餐芝术香山居士有遺篇九十不衰真地仙公等康健逢聖世能無旦莫歌皇天願炊香飯釀秫酒日奉杖履長周旋正嘉遺事多訛謬欲聞鑾輿南幸年魏學禮長林片葉集有九峰青崖先生年一百二十一嵗詩尤竒樂府碧玉破瓜時而談苑載呂洞賓謁張洎贈詩云功成應在破瓜年洎後以六十四卒破瓜者二八也老少男女皆可稱破瓜亦竒山海經云北號之山有木狀如楊赤華其實如棗而無核其味酸甘食之不瘧此即吾鄉之虛中棗也出青城縣漢上林苑有枵棗見西京雜記又東坡有與蒲𫝊正覓柿霜無核棗帖元遺山有跋見玉堂嘉話異物彚苑巴旦杏出哈烈國今北方皆有之京師者實大而甘山東者實小肉薄少津液土人賤之不食獨其仁甘可以佐葅漢上林令所記桃十種有櫻桃含桃含桃即櫻桃且非桃類金剛鑽形如鼠糞色青黑如鐡石産西域諸國在鷙鳥海東青所遺糞中以之鐫鏤無堅不破右齊東野語所記或云扶南國剛金能切玉扣以羖角則判張洪使緬録云緬蠻地有木曰金剛纂狀如棕櫚枝幹屈曲無葉銼以漬水暴牛馬令渴極而飲之食其肉必死此又草木之毒者而名同京官舊例各衙門稱謂有一定儀注不可那移如翰詹稱老先生吏部稱選君印君員外以下稱長官科稱掌科道稱道長是也自康熙丙子祭告回京見聞頓異各部司及中行評博無不稱老先生者矣此亦觚不觚之一也考工記韗人音運為臯陶鄭司農注臯陶古木也徐渭路史一條云唐時髙麗貢松煙墨和糜鹿膠造墨名隃糜此說杜選陋甚按隃糜漢縣名地出石墨即今隴州之汧陽見於漢官儀其來舊矣非始於唐且與髙麗無涉青藤山人路史云中山酒中山兔毫竝是應天府之溧水縣非古中山也不知何据亦出杜撰髙季迪明三百年詩人之冠冕然其明妃曲云君王莫殺毛延夀留畫商岩夢裏賢此三家村學究語所謂下劣詩魔不知季迪何以墮落如此而盲者反以為警策其後有彭三吾者又云畫師休盡殺夢弼要人圖轉入魔道矣又胡虛白詠緑珠云枉費明珠三百斛荆叉那及嫁梁鴻郎瑛稱之皆所云癡人前不得說夢也若永叔耳目所及尚如此萬里安能制夷狄所謂詩論亦自近腐以詹事府詹事兼侍讀學士徐秉義前吏部右侍郎原任翰林院侍講徐元夢滿洲人為順天考試官二君皆癸丑科進士郎瑛七修類纂舉東坡跋林和靖詩詩如東野不言寒書似西臺差少骨以西臺為南唐李建中謬甚南唐太弟太傅李建勳非建中也建中宋初人為西京御史故稱西臺其書與楊風子先後齊名蘇黃常稱之郎未知耶剛卯或曰嚴卯見王莽傳或曰㱾音開以見說文玉篇以正月卯日作而佩之服䖍云長三寸廣一寸四分晉灼曰長一寸廣五分或用玉或用金豫於慈仁寺市中曽見一枚乃以象牙為之八分書六十六字又按後漢輿服志長寸二分方六分諸侯王列侯以白玉中二千石以下黑犀三百石已下以象牙類纂載武林女子金麗卿詩家住錢塘山水圖梅邉栁外識林蘇郎瑛謂其不能守禮出則擁蔽其面時方食不覺噴飯滿案又謂謝無逸以胡蝶詩得名號謝胡蝶後李商隱襲其語云云則是以唐人蹈襲宋人矣更可一笑己卯十一月熊青嶽太宰拜相時宛平胥庭王公為首揆沁州吳公銅川次之而孝感乃故相再入內閣或疑其位次王公云若熊公徑以大學士召還自當為首揆今以禮書召遷吏書而始大拜是由尚書大拜非以大學士召還也不當讓熊遂次吳而桐城張公敦復又次熊及王公引疾則丹徒張公素存為首揆桐城請告歸矣熊乃王教習門生也御史劉子章條奏外官禁止多帶家口下吏部議督撫止許五十人藩臬四十人道府三十人州縣十五人違例者革職下九卿詹事科道集議豫謂自督撫已下皆遞減十人胡為州縣之於道府頓減其半也衆韙之乃定為二十人而女口不與此數違例者止於降級再奉㫖以旗員差多許倍之辛巳冬杪得倪雲林喬柯竹石小幅淡逸絶塵題字尤古徑真蹟也詩云隱士江隂許士雍鈿山湖裏泊煙篷秋來鱸鱠蓴羮美亦欲東乘萬里風後署甲辰八月倪瓚雲林故居在厚山地名厚陽庚辰三月朝陽門外東嶽廟火殿廡皆燼獨左右道院無恙特發內帑并令在京在外大小官員捐助仍以裕親王監視之閲嵗始畢工親臨幸焉廟中仁聖帝炳靈公司命君四丞相像皆元昭文館大學士正奉大夫祕書監卿劉元所塑元最善摶換之法天下無與比至是皆燬於火羅泌路史云巢父友許繇樊竪繇居沛澤其道日光堯朝焉而逭之父適聞之洗耳於潁竪方飲其牛乃驅而還子蘋注竪字仲父然則洗耳者巢父飲牛者則樊竪又别自一人妄說紛紛諸子䜟緯之書杜撰大抵如此可發一笑蟲牢地名見春秋其地在今河南之封丘縣然路史雜國名又有蟲氏牢氏蟲氏條下曰邾地後有蟲氏牢下曰古牢子國後有牢氏武㑹試舊無廷對臚傳之例有之自明末崇禎辛未科始從考試官方逢年之請也王孟端仿雲林古木叢篁自跋云幽篁古樹玉森森白石仙人翠作襟夜月幾驚龍虎立秋風時聽鳯凰吟畫圖入思曽飛筆山水留情獨撫琴不是逺尋髙士宅何能愜我出塵心又季迪和東山逸叟和青箬溪道人四言一首壬午順天鄉試五經監生二人一莊令輿江南武進人一俞長策浙江桐鄉人初以違例貼出仍具題請㫖奉㫖俱著授為舉人准㑹試嗣後願做五經者不必禁止作何定例九卿等詳議具奏九月初六日辰刻文華殿經筵講官禮部尚書韓菼吏部左侍郎傅繼祖進講四書子路問政子曰先之勞之一節臣刑部尚書王士禎兵部右侍郎兼翰林院掌院學士法良進講易經觀乎人文以化成天下一句講畢賜宴太和門翰林掌院舊皆以學士兼禮部侍郎滿官漢官皆然自崑山徐相國以大學士兼掌桐城張相國以禮部尚書兼掌與往例不同然凡啓奏講書等事仍滿前漢後不論所居之本官也今長洲韓宗伯兼掌院事亦然唐國史補謂漠漠水田飛白鷺隂隂夏木囀黃鸝乃右丞竊取李嘉祐語論者或為王諱以為增漠漠四字便是㸃鐡成金手假此亦囈語然此事往往有之豫門人太倉崔舉人華字不雕貧而工詩嘗有句云溪水碧于前渡日桃花紅似去年時豫在廣陵作論詩絶句四十首舉此二句云江南腸斷何人㑹只有崔郎七字詩後汪鈍翁在京師亦有句云溪水碧於前渡日桃花紅似去年人謂非取崔前語乎汪於崔亦前輩也談輅云劉季緒好詆訶文章掎托利病徐陵為一代文宗未嘗詆訶作者昔豫與故友汪鈍翁在京師鈍翁好詆訶人前輩名宿自某某而下無得免者後進以詩文請質亦無恕詞豫每勸之故友計甫草東嘗序豫門人汪蛟門懋麟集云鈍翁性悁急不能容物意所不可雖百賁育不能掩其口也其所稱述於當世人物之衆不能數人焉阮亭性和易寬簡好奬引氣類然以詩文投謁者必與盡言其得失不少寬假此數語頗得豫二人梗槩顧施愚山又嘗謂豫公好奬引人物自是盛德然後進之士學未有成得公一言便自詡名士不復虛懷請益非公誤之耶豫思其言亦極有理門人李少京兆子來先復言曩過漢中聞南鄭縣之東有民家老嫗年百二十嵗矣尚強健無恙李自往訪之云晨出往田間栽種未及見廣州府佛山有諸生黃章者年一百二嵗康熙己卯尚入省闈自言吾今科且未中來科百五嵗亦未中至百八嵗始當獲雋尚有許多事業出為國家效力耳聞近嵗已死其言無驗九月二十五日車駕南巡視河工十月初九日夜再雪竟夜積素滿庭晚菊尚敷腴可玩晨起忍寒坐信古堂對雪看菊忽梁溪琴僧嶽蓮見過彈平沙落鴈漢宫秋二曲古音蕭寥忘其身在長安官是秋曺之長也作二詩紀事臺灣古荒服在福建東南大海中西界於漳南鄰於粵北與閩安相直其水道則東連日本南鄰琉球暹羅呂宋荷蘭諸國其沿革莫得而詳也明嘉靖四十二年流寇林道乾作亂都督俞大猷勦之追及澎湖道乾遁入臺灣大猷不敢逼留偏師駐澎湖島時哨鹿耳門外徐俟其敝道乾遁往占城道乾既去澎湖駐師亦罷天啓改元有顔思齊者為日本國甲螺猶頭目也引倭酋歸一王屯臺灣閩人鄭芝龍附之始建平安鎮城既而荷蘭國人舟遭颶風至此愛其地借居之遂與倭約盡有臺灣之地而嵗輸鹿皮三萬荷蘭國人善火器其居臺灣也以夾板船為犄角雖兵不滿千南北土酋咸畏之又建赤嵌城以居順治庚寅日本甲螺郭懷一謀逐荷蘭人事覺懷一被殺於歐汪在今鳯山縣界辛丑鄭成功自江南敗歸勢日蹙頓軍厦門適日本甲螺何斌與荷蘭酋長隙潛誘成功進取臺灣鹿耳門詰屈回旋沙浮水淺猝難飛渡成功舟至水忽漲十餘丈巨艦縱橫畢濟遂克臺灣荷蘭國人與成功戰不利退保安平鎮城其酋歸一王以死拒之成功力攻不克乃還山列營以困之荷蘭人勢窮以十餘艘决戰成功用火攻盡焚之荷蘭人遁歸其國成功既有臺灣以赤嵌城為承天府改臺灣土城為安平鎮總名曰東都未幾成功死其子經居鷺江即今厦門成功弟世襲隂有竊據意經攻逐之世襲渡海來歸經僭立改東都曰東寧改縣曰州設安撫司三南北路澎湖各一辛酉經死子克塽嗣康熙二十一年壬戌福建總督姚啓聖用間諜隂結傅為霖為內應事泄為霖遇害明年癸亥靖海將軍施烺奉命率舟師進討六月自銅山抵澎湖入罩灣連克虎井桶盤諸嶼誓師戒嚴鄭克塽奉表降詔赴京師隸旗下于其地設臺灣府統臺灣鳯山諸羅三縣隸福建布政使司云十月二十七日車駕回宫御賜內直吏部尚書陳廷敬副都御史勵杜訥右諭德查升各松花江石小研一方色淡緑如洮石腹有御書研銘八字云以靜為用是以永年繼又賜大學士張玉書吳琠熊賜履工部尚書王鴻緒各一方鴻緒所得有倭漆研匣匣中有御用墨四笏時十一月偶召張及王入南書房編次御書得賜因及吳熊二公云駕在德州賜致仕在籍户部左侍郎田雯寒緑堂扁額原任翰林侍讀蕭惟豫編修田需亦蒙賜御書各一幅召户部郎中陳奕禧入南書房命書大小字各三幅賜御書御製塞上詩一幅詩云半嶺黃雲合風悲鼓角聞野羱沙草外落日自成羣御製宋髙宗父母之仇終身不報論命大學士熊賜履禮部尚書韓菼內直吏部尚書陳廷敬右諭德查升同作又命浙江舉人查慎行原名嗣璉等同作進呈詔蠲甘肅等處地方四十一年四十二年錢糧江南上江下江四十二年錢糧十二月諸王內閣九卿翰詹卿寺科道請上尊號奉㫖朕即位四十餘年未嘗少刻不以民生休戚為念逺邇安靜為本雖或慶雲景星嘉禾瑞草天書麟鳯之竒總無關於黔黎亦無關於朕心反為史書之譏朕以實心為民天視天聽故有其道難免後人公論若耀功德取一時之虛名朕之不悅甚矣毋煩數陳上召海寧舉人查慎行武進舉人錢名世長洲監生何焯休寧監生汪灝於南書房屢試詩及制舉文特賜焯灝舉人明年一體㑹試考試新差提督各省學政翰林侍讀學士張廷樞等郎中翁嵩年等十一人於南書房稱㫖人賜御書一幅八股題夫子循循然善誘人一節詩題和御製考試嘆壬午冬駕歸自德州考試內直諸詞林官至二十二日封印後一日始畢定一等十人侍讀學士陳元龍等二等若干人其三等五人調知縣用諭德王化鶴中允吳晟修撰戴有祺辛未狀元檢討趙爾孫吳文炎命吏部右侍郎吳涵兼掌翰林院事山行慮迷握嚮蟲一枚於手中則不迷見物類相感志近時有人作嚮言取此明文士如桑悅祝允明皆肆口橫議略無忌憚悅對丘文莊言舉天下文章惟悅其次祝允明世但嗤其妄人耳允明作罪知録厯詆韓歐蘇曽六家之文湥文周內不遺餘力謂韓傷易而近儇形粗而情霸其氣輕其口誇其發疏躁歐陽如人畢生持喪終身不被衮繡東坡更作儇浮的為利口譁獷之氣肆溢舌表使人奔迸狂顛而不息曽王既脫衣裳並除爪髮譬之獸齧臘骨至於老泉潁濵秦黃朝張則謂不足盡及惟栁如冕裳珮玉猶先王之法服乃其大㫖則在主六代之比偶故實吁亦鄙而倍矣論唐詩人則尊太白為冠而力斥子美謂其以村野為蒼古椎魯為典雅粗獷為豪雄而總評之曰外道李則鳯凰臺一篇亦推絶唱狂悖至於如此醉人罵坐令人掩耳不欲聞論詩餘則専祖太白飛卿稍許歐晏周栁以為綴旒謂東坡木強疏脫少遊魯直特市廛小家之子略舉大端如右所謂無忌憚者不足置辨也西園雜記記明大臣夀考者自王端毅公魏文靖公而下十三人而不及雒陽劉文靖公晦菴文靖夀九十餘近百嵗又𢎞正名相也何獨遺之釋氏言羚羊挂角無跡可求古言云羚羊無些子氣味虎豹再尋他不著九淵潛龍千仞翔鳯乎此是前言注腳不獨喻詩亦可為士君子居身涉世之法大竹破山和尚天童密弟子也蜀亂後居萬峰賊李鷂子者殘忍嗜殺延師供養請肉食師曰公不殺人我便食肉李笑而從之全活無算師蹇姓忠定公之裔孫也鄭端簡云十哲陳蔡一時與難之賢非孔門定論自開元至今無敢議者夫有若之言四見於論語大類聖人公西赤志於禮樂有為邦之才不逺優於宰我冉求乎求我言行不必徴諸史𫝊論語中多有之矣其視二子優劣何如宜進祀二子於殿上改求我於廡中右與豫官祭酒時具疏大意略同惜為友人中阻疏不果上即當時禮部未必果行要當存此一假公論於天下後世耳豫至今悔之皮日休本字逸少後字襲美見北夢瑣言康熙乙丑夏豫使粵東還便道遊廬山宿開先寺觀陽明先生石壁大書紀功碑末云嘉靖我邦國若前知世宗入繼大統者按碧里雜存陽明既平田州之亂先是州有巨石側卧江滸舊有童謡云田石傾田州兵田石平田州寧岑猛惡之夜遣人平之明復如故先生定亂後其石即平先生自往觀之洗剔苔蘚有古刻新建伯三大字異之遂續加八字併刻於石云嘉靖嵗戊子新建伯王守仁又記先生習靜陽明洞預知門人朱白浦蔡我齊入山事中庸云至誠之道可以前知陽明其庶幾乎樂郊私語云海鹽少年多善歌蓋出於澉川楊氏其先人康惠公梓與貫雲石交善得其樂府之𫝊今雜劇中豫讓吞炭霍光鬼諫敬德不伏老皆康惠自製家僮千指皆善南北歌調海鹽遂以善歌名浙西今世俗所謂海鹽腔者實發於貫酸齊源流逺矣香祖筆記卷一
