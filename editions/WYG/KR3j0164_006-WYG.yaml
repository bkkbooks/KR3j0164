body:
  text: 香祖筆記卷六刑部尚書王士禎撰康熙四十三年三月西城外有盗發古冢視其誌銘乃明特進榮禄大夫柱國食禄一千一百石修武伯沈清墓也清字永清滁州人洪武壬申嗣其父為燕山前衞百户守禦開平永樂間五從車駕北征有功累陞本衞世襲指揮同知洪熙中陞後軍都督府僉事賜蟒龍衣充叅將鎮守大同尋命為總兵官鎮居庸宣徳中征樂安州破烏良哈北狩洗馬嶺皆扈從陞都督同知總督官軍匠作修造京師城垣濠塹橋道正統中陞左都督勅諭提督營建奉天華葢謹身三殿乾清坤寧二宫正統辛酉告成特陞今爵錫誥劵子孫世襲以八年夏四月戊戌薨年六十七𦵏阜城關北原子榮孫煜留守中衞指揮王淳撰文卞聚書龔善同篆予考弇州仁宣以後功臣伯表無清名故具録之李龍眠五馬圖一卷後題云右一匹元祐元年十二月十六日左騏驥院收于闐國進到鳳頭驄八歲五尺四寸右一匹元祐元年四月初三日左騏驥院收董氊進到錦膊驄八歲四尺六寸右一匹元祐二年十二月廿三日於左天駟監揀中秦馬好頭赤九歲四尺六寸元祐三年閏月十九日温溪心進照夜白右止有四馬闕一余嘗評伯時人物似南朝諸謝中有邉幅者然中朝士大夫多嘆息伯時當在臺閣僅為善畫所累余告之曰伯時丘壑中人蹔熱之聲名儻來之軒冕殊不汲汲也此馬駔駿頗似吾友張文潛筆力瞿曇所為識鞭影者也黃魯直書余元祐庚午歲以方聞科應詔來京師見魯直九丈于鬴池寺魯直方為張仲謨箋題李伯時天馬圖魯直顧余曰異哉伯時貎天廏滿川花放筆而馬殂矣葢神魄皆為伯時筆端取之而去實古今異事當作數語記之後十四年當崇寧癸未余以黨人貶零陵魯直亦除籍徙宜州過予瀟湘江上與徐靖國朱彦明道伯時畫殺滿川花事云此公卷所親見余曰九丈當踐前言記之魯直云只少此一件罪過後二年魯直死貶所义二十七年余將漕二浙當紹興辛亥至嘉禾與梁仲謨呉徳素張元覽汎舟訪劉延仲于眞如寺延仲遽出是圖開卷錯愕宛然疇昔撫時念往逾四十年憂患餘生巋然獨在徬徨弔影殆若異身也因詳叙本末且以玊軸遺延仲使重加裝飾云空青曾紆公卷書右為毘陵莊氏家藏毘陵大姓朱氏蓄一古大盤盤中凹處有鴨形或漁於湖得一銅鴨朱以賤直購之以合盤中鴨影不爽銖黍注水於盤鴨輒浮起游泳而浴始知寶之右見庚巳編王介甫唐詩百家選全本近牧仲開府寄來新刻乃常熟毛扆所得江隂某氏藏本計百有四人有乾道己丑蘭臯倪仲傅序畧云予自弱冠肄業於香溪之門嘗見是書頃有親戚宦南昌得之臨川以歸惜其道逺難致且字畫漫㓕故鏤版以新其傳云余按其去取多不可曉者如李杜韓三大家不入選尚自有說然沈宋陳子昻張曲江王右丞韋蘇州劉眘虛劉文房栁子厚劉夢得孟東野槩不入選下及元白温李諸家不存一字而高岑皇甫冉王建數子毎人所録幾餘百篇介甫目序謂欲觀唐詩者觀此足矣然乎否耶世謂介甫不近人情於此可見故物自可寶惜然謂為佳選則未敢謂然請以質諸後之善言詩者當知予言不妄白醉璅言王兆雲著載孟中丞者好藏墨有一挺為朱紫陽欵是南宋故物又云羅文龍墨如空青水碧珊瑚木難兩山墨談陳霆著云長淮為南北大限自淮以北為北條凡水皆宗大河未有以江名者自淮以南為南條凡水皆宗大江未有以河名者二條之外北之在高麗者曰混同江曰鴨緑江南之在蠻詔者曰大渡河皆在荒徼外禹跡之所畧也又云朋黨二字為萬世之禍始見於漢書蕭望之周堪劉更生同心謀議宏恭石顯奏三人朋黨此王伯厚之言也按逸周書載穆王作史記以自警云昔有果氏好以新易故新故不和内爭朋黨隂事外權有果氏以亡則朋黨之說其來尚矣又云晏子鼯吟而鼬啼蒼莽踟蹰四顧而無人聲流光馳景却顧於斷蹊絶壑之下雲雨之所出入也壠耕溪飲為力也佚而坐嘯行歌可以卒歲春秋之世豈有如此語言必晉宋間文人偽作余謂此段文字不甚類晉宋間人絶似唐栁子厚劉夢得孫樵輩造語周􅇪到難一篇亦庶幾爾唐人作集序例叙其人之道徳功業如碑版之體後則歷舉其文某篇某篇如何如何不勝更僕如獨孤及權徳輿諸序及英華文稡所載皆然千篇一律殊厭觀聼至昌黎始一洗之若皇甫湜作顧况集序亦能不落窠臼可以為法文選而下惟姚鉉唐文稡卓然可觀非他選所及其録詩皆樂府古調不取近體尤為有見余嘗取而刪之與英靈間氣諸集刪本都為十種竝行於世亡友姜編修西溟宸英又嘗刪其賦頌碑誌序記等雜文為一編西溟歿此書不知流落何處其從弟宸蕚字友棠余門人也當訪之王逢原吉梧溪集有過廣浦聰上人觀湖廣郎中余闕撰書濴河化成寺碑記淮西憲僉王士㸃篆額詩士㸃吾郷東平人士熙懋學之弟常輯禁扁若干卷余家有鈔本又有陳架閣録示至正十一年死節臣屬圖鞏以下十三人王侯以下九人徴詩首云是年二月山東副都元帥圖戩哩師出鄒平縣中流矢死今鄒平誌不及載當補入之梧溪集七卷乃景泰七年丙子南康府知府陳敏政重刻陳作後序述原吉家世甚詳原吉有子掖洪武初任通事司令轉翰林博士兼文華殿經筵事卒官掖子徠嘗以才徳薦至京師未官而卒子輅宣徳中以秀才舉授南康府照磨未幾卒二子曰顔曰孟不能歸遂僑居星子之東澗祖母黃母徐躬紡績以教二子俱有成云集首有至正間周伯琦汪澤民二序序言原吉初學詩於延陵陳虞卿虞卿與柯敬仲俱事虞邵菴得其傳與有元盛時楊范諸公齊驅惜未著其名俟載考之虞卿官東流尹亦序云甲申夏不雨暑酷甚偶讀鍾退谷集雜文有扇篋銘云藏汝逸女女曰棄捐吾烏見夫僕僕懷袖者之能終其天年哉余感嘆其言因注其旁云殺君馬者路旁兒當下此一轉語廣陵陸弼字無從隆萬間有詩名江都友人貽其集末有張君某為作小傳云無從少游京師譏李西涯伴食中書投詩云囘首湘江春草緑鷓鴣啼罷子規啼云云按陸上距宏治之世逺不相及安得以此詩屬之誤矣鍾恮初名恬字叔靜竟陵人惺之弟也以諸生終其詩絶有風骨不肯染竟陵習氣古詩如大將雖自貴少小為奴隸男兒不殺賊自應死邉城夢想通侯貴意氣始得雄近體如桐新春後葉竹正午時隂皆佳境有半蔬園集惜不傳余於唐人之文最喜杜牧孫樵二家皮日休文藪陸龜蒙笠澤叢書抑其次焉一日偶讀震澤集其䟦樵集後云昌黎海也不可以徒涉涉必用巨筏焉則可之是也又書日休集後云予觀襲美與陸魯望唱和跌宕怪偉所謂兩雄力相當者及讀文藪多感慨激昻文中子碑配饗昌黎請孟子為學科又幾於知道者益嘆前輩鑒識之允議論之公固先得我心之所同然而余一知半解亦自有與古人暗合者録其言以自信余嘗欲取唐人陸宣公李衞公劉賓客皇甫湜杜牧孫樵皮日休陸龜蒙之文遴而次之為八家以傳恨敓於吏事不遑卒業俟乞骸骨歸田後當畢斯志聊書此以當息壤湖廣土司彭九霄之母有玉跳脫一隻中有一蟻歷歷分明自能蠕動又武林金編修家有猫眼寶石一枚其睛正午則如一線過午即圓陸延枝說聽云韻語陽秋記宋大觀中呉興人邵宗益剖蚌中有珠現阿羅漢相偏袒右肩矯首左顧衣紋畢具遂奉歸慈感寺供養寺臨溪流建炎中憲使楊應誠者與客傳玩忽越檻躍入水中禱佛求之一索而獲右與唐文宗食蛤事相類誠不可以儒家拘墟之見求之如余池北偶談所記廣陵銀杏樹中觀音大士像則又所目擊也余嘗觀荆浩論山水而悟詩家三昧曰逺人無目逺水無波逺山無皴又王㮊野客叢書太史公如郭忠恕畫天外數峯畧有筆墨意在筆墨之外也嘉靖中陸浚明粲為給事中疏紏張孚敬桂蕚上為罷二相旋以霍韜言召還陸坐是謫都勻驛驛丞林居十八年韜復有疏尉薦陸笑曰天下事壞於此輩僉人之手乃復欲以餘波汚我耶余嘗論韜平生真小人之尤黃宗羲輯明儒學案不當闌入觀浚明之言韜在當時物論可知矣洪洞范進士彪西鄗鼎撰理學備考亦頗以余言為然古今傳記如拾遺記東方朔外傳之類悉誕謾不經然未有如諾臯記之妄者一事尤可捧腹云天翁姓張名堅字刺渇漁陽人少不羈嘗羅得一白雀愛而養之夢天劉翁責怒每欲殺之白雀輒以報堅堅設諸方待之終莫能害天翁遂下觀之堅盛設賓主乃竊乗天翁車騎白龍振策登天天翁追之不及堅既到天宫易百官杜塞北門封白雀為上卿劉翁失治徘徊五嶽作災堅患之以劉翁為太山太守主生死之籍鄙倍至此不可以欺三歲小兒而公然筆之於書豈病狂耶段柯古唐之文人何至乃爾諾臯又載妬婦津乃劉伯玉妻段氏字明光聞伯玉誦洛神賦自沉死武明空嘗過此津不敢渡先兄西樵過之有詩云解使金輪開道避斯人何減駱賓王亦快心語也唐張祜詩内人已唱春鶯囀花下傞傞軟舞來按教坊記伎女入宜春院謂之内人亦曰前頭人凡出戲日所司先進曲名上以墨㸃者即舞謂之進㸃教坊人惟得舞伊州餘悉讓内人如垂手羅囘波樂蘭陵王春鶯囀烏夜啼之屬謂之軟舞又有緑腰蘇合香屈柘凉州甘州柘枝黃麞拂菻胡渭州達摩支之屬謂之健舞又有劔器胡旋胡騰等按記中所列曲名如小秦王武媚孃皆李唐本朝事與吕太后並列不避忌竹枝本名竹枝子與采蓮子漁歌子山花子水仙子南鄉子赤棗子生查子等並列今獨去子字但云竹枝若楊栁枝則其本名又有字舞花舞馬舞倦游録載辛稼軒患疝疾一道人教以薏苡米用東壁黃土炒過水煑為膏服數服即消程沙隨病此稼軒以方授之亦效予苦疝十七年矣一日陳悅巖相國讀倦游録鈔以見示明日往暢春苑相遇予曰承公惠妙方當愈宿疴又以自負相國問何故予曰此疝辛稼軒程沙隨都曾害過正自不惡與二公同病相憐豈復尋常人哉聞者皆為絶倒廣州城南長壽菴有大池水通珠江潮汐日至池南有高閣甚麗可以望海其下曰離六堂主僧某乞一聯予為題云紅樓映海三更日石瀃通江兩渡潮唐詩人楊憑有中表竊其詩卷登第憑知之怒甚且詰之曰一一鶴聲飛上天在否中表答曰知兄最愛惜此句不敢奉偷憑意稍解曰猶可恕也宋初朝士競尚西崑體伶人有為李義山者衣衫襤褸旁有人問君何為爾答曰近日為諸館職撏撦故至此二事古今笑柄予四十年來所為詩人間多有其本其為人撏撦不少矣恐一一鶴聲飛上天亦非已有偶書之發一笑粲王勉夫紀聞載東坡一日與歐陽公論五代史公曰修於此竊有善善惡惡之志坡曰韓通無傳烏得為善善惡惡公黙然千秋公議當時坡公固已發之是謂諍子然劉壯輿作五代史紏謬以示東坡坡答以王介甫嘗謂某當修三國志某不敢當正畏如公之徒摭拾其後耳東坡詩筆妙天下外國皆知仰之子由使北詩云莫把文章動蠻貊恐妨談笑卧江湖其盛名如此然當時尚有指擿其用事之誤者予居易録中已言之王㮊紀聞又云呉人方惟深子通絶不喜子瞻詩文胡文仲連因語及蘇詩清寒入山骨草木盡堅瘦方曰做多自然有一句半句道著也其狂僭至此譬􅎙螂轉糞語以蘇合之香豈肻顧哉嚴滄浪云王荆公百家詩選葢本於唐人英靈間氣集其初明皇徳宗薛稷劉希夷韋述之流無少增損次序亦同儲光羲而下方是荆公自去取大厯以後其去取深不滿人意况如沈宋王楊盧駱陳拾遺張燕公張曲江王右丞賈至韋應物孫逖祖詠劉眘虛綦母潛劉長卿李賀諸公皆大名家而集皆無之其序乃言觀唐詩者觀此足矣豈不誣哉今人但以荆公所選歛袵而莫敢議可嘆也與予前論暗合若符節益信予所見非謬然予實不記憶滄浪先有此論也户部覆江西䕶廵撫印南贑道徐某覆商民蕭宗章等開採鉛錫疏畧云南源山係附近名山之總名􅁃崇二縣接壤雖山間石土產有鉛錫然地處荒僻民居寥落兼之米價騰貴有無生事地方難必其無云云奉㫖開礦事情甚無益於地方嗣後有請開採者俱不准行大哉王言洞見萬里矣浙江廵撫副都御史張泰交疏言黃巖縣民葉中吉年一百三歲請賜金建坊禮部覆准允行朱昻梁周翰與楊億同為翰林學士時梁朱二公年老而楊甚少每輕侮之然考二公皆宋初最有文譽者而楊以後進乃敢輕侮杜詩晚將末契託年少當面輸心背面笑則子美亦嘗受惡少年之侮矣韓翃中唐詩人睂目兩邀人主特達之知晚在藩鎮幕後生至目為惡詩詎文章耆宿例宜取侮後進小生耶顧楊大年正人亦爾則不可也僧文瑩玉壺清話云開寶塔成太宗特詔朱昻撰記文成敦崇嚴重上深加嘆奬與宗人朱遵度號大小朱萬卷與弟協稱渚宫二疎又詔舉賢良昻舉陳彭年杜鎬刁衎列章奏曰朱昻端介厚重不妄舉人况彭年實有才譽乞免召試備清問遂命以本官直史館則朱在當時物望可知又後苑宴侍臣賦詩梁得春字曰百花將盡牡丹坼十雨初晴太液春上特稱賞嘗請修時政記從之二公本末如此予往見周翰所撰石敬瑭家廟碑石刻惜未購得耳後大年竟夭死石介至詆為文妖或亦少時輕薄之報耶龎文英文昌雜録言時政記始於唐文昌左丞姚璹至宋則周翰踵之有此請也文昌雜録云鼎州通判栁應辰傳治魚鯁法以倒流水半盞先問其人使之應吸其氣入口中面東誦元亨利貞七遍吸氣入水飲少許即差按應辰官都官員外郎嘗書夬字符於浯溪磨厓碑旁即其人也唐宋京朝官遇令節即放假休沐又有旬休之例文昌雜録休假歲凡七十六日元日寒食冬至各七日天慶節上元節同天聖節夏至先天節中元節下元節降聖節臘日各三日立春人日中和節春分社日清明上已天祺節立夏端午天貺節初伏中伏立秋七夕末伏秋社授衣重陽立冬各二日上中下旬又各一日包拯奏言每節假七日廢事頗多請令後祇給假五日當時京朝官優游如此此風至明不復有矣然宋人猶謂每春花時祇於擔上見桃李何也越中筍脯俗名素火腿食之有肉味甚腴京師極難致偶閱安老懷幼方載製芭蕉脯蓮子脯牛蒡脯法與製筍脯法畧同録之蕉根有兩種一種粘者為糯蕉可食取作手大片灰汁煑熟去汁再以清水煑易水令灰味盡取壓乾乃以鹽醬蕪荑乾薑熟油胡椒等研浥一兩宿取出焙乾畧搥令軟食之全類肥肉之味取嫰蓮房去蒂去皮用新汲井水入灰煑浥如蕉脯法焙乾以石壓令扁作片收之十月以後取牛蒡根洗乾去皮用慢火少煑勿太爛硬者熟煑并搥令軟下雜料物如蕉脯法浥焙取乾薝蔔鮓方薝蔔即梔子也采嫩花釀作鮓最為香美昔劉賓客饋白太傅菊苖虀蘆菔鮓換取樂天六班茶二囊有詩載集中宋長安隱士高繹有古人絶行慶厯中召至京師欲命以官固辭還山特賜安素處士家甚貧妻子凍餒終不以困故受人餽遺閉門讀書而已右見龎文英文昌雜録末引處士譏种放詩且云志意修則驕富貴道徳重則輕王公惟安素無慚矣予撰古懽録偶遺之遂録於此雜録言唐徳宗貞元十年七月賜故唐安公主諡莊穆此公主賜諡之始予撰諡法考未遑考證及此并録之唐宫殿皆植花栁宋植楸槐明代皆無之本朝沿明之舊宋初諸公競尚西崑體世但知楊劉錢思公耳如文忠烈趙清獻詩最工此體人多不知予既著之池北偶談居易録二書觀李于田蔉萟圃集載胡文恭武平宿詩二十八首亦崑體之工麗者惜未見其全聊摘録數聯於左函谷關漫持白馬先生論未抵鳴鷄下客功次韻朱况雨石牀潤極琴絲緩水閣寒多酒力微淮南王長生不待爐中藥鴻寶誰收篋内書南城蕩槳逺從芳草渡墊巾還傍緑楊堤冲虛觀桐井曉寒千乳歛茗園春嫰一旗開趙宗道歸輦下江浦嘔啞風送㯭河橋勃窣栁垂隄自注司馬相如賦云媻姍勃窣上金隄感舊粉壁已沉題鳯字酒壚猶記姓黃人塞上頡利請盟金匕酒將軍歸臥玉門關殘花長樂夢囘春寂寂武陵人去水迢迢侯家彩雲按曲青岑醴沉水薰衣白璧堂前檻蘭苕依玊樹後園桐葉䕶銀牀津亭西北浮雲連魏闕東南初日照秦樓古别離佳人挾瑟漳河曉壯士悲歌易水秋雪色欺曹國麻衣淺寒入荆王翠被深次韻徐奭見寄侏儒自是長三尺澼絖都來直數金早夏睡驚鷰語頻移枕病起蛛絲半在琴風調與二公可相伯仲起結尤多得義山神理不具録杜詩户外昭容紫袖垂葢唐制天子臨朝則用宫人引至殿上至天祐二年始詔罷之是全盛之時反不如衰亂之朝為合禮也故中宗時皇后公主及上官昭容往往與羣臣雜坐賦詩優伶至有裴談李老之謔可謂無禮之甚者而郎官直宿亦有侍女新添五夜香之句不曉侍女當是何色人也宋明已來乃為嚴重矣本朝朝儀大朝日駕出乾清門至保和殿稍駐大學士學士都察院左都御史以下堂上官翰林起居注官於保和殿門外行三跪九叩頭禮先行自甬道入太和殿後門出立簷下内閣東立西向都察院西立東向然後駕至太和殿陞座惟起居注班殿内在諸王之後亦儒臣之極榮也宋宰相班諸王之上樞密使班諸王下至明諸王始不與羣臣齒列為得大體若唐宋以來皇子諸王尹京遙領節度使之類一切罷去尤為得體迨本朝亦然凡大朝日諸王貝勒子謝恩者皆拜於殿陛上與羣臣逈絶矣吕正獻公喜釋氏之學及為相務簡靜士大夫罕接見惟談禪者稍得從容好進之徒往往幅巾道袍日遊僧寺隨僧齋粥覬以自售時人謂之禪鑽此真可一笑也宋故事進士唱名宰執從官侍立左右有子弟與選者唱名之後必降階謝康熙庚辰科館選庶吉士大學士王文靖公之孫桐城張公敦復禮部尚書兼掌翰林院事韓公慕廬之子皆中式及唱名皆自陳奏皆得邀恩入翰林然不降階謝也本朝京官三品已上陞遷命下宣㫖後即赴後左門啟奏謝恩仍於鴻臚寺報名候大朝日於太和殿謝恩己夘十一月上傳户部尚書馬公齊禮部尚書佛公倫吏部尚書熊公賜履禮部尚書張公英皆拜相户部尚書陳公廷敬轉吏書兵部尚書杜公臻轉禮書刑部尚書李公振裕轉户書予以左都御史遷刑書同日命下大學士伊桑阿公王公熙等於一統志館宣㫖訖隨同赴乾清門啟奏謝恩此亦向時所未有也後旬日始以吏部左侍郎王公澤𢎞為左都御史則由吏部開列疏請云徐度卻掃編云嘗見杜祁公少時手書所節史記一編字如繩頭筆筆端楷首尾如一且極詳備如禹本紀九州所貢名品畧具焉是時刻本書尚未盛行前輩之苦心為學如此豈後人所及宋時士大夫為王氏之學者務為穿鑿有稱杜子美禹廟詩空庭垂橘柚謂厥包橘柚錫貢也古屋畫龍蛇謂驅龍蛇而放之菹也予童時見此說即知笑之語諸兄曰信如此則杜公之詩何殊今佛寺壁畫觀音救八難善財五十三叅關侯廟壁畫五關斬將水淹七軍耶諸兄為之軒渠徐敦立云唐人詩集行於世者無慮數百家宋次道家藏最備嘗以示王介甫俾擇其尤者今百家詩選是也然則予前所云陳伯玉張道濟張曲江王右丞韋左司諸公之集次道家盡無之耶抑有之而見擯於介甫耶如此等著聞之集皆無之何以稱備有之而不取尚得為有目人耶徐敦立記陳去非語本朝之詩愼不可讀者梅聖俞也不可不讀者陳無已也此意殊不可解去非之學杜亦予所未解也古來相業之盛莫如北宋劉莘老謝右僕射表曰君臣賡歌今百三十載勲名繼踵纔五十二人可見得人命相之難乃明末崇禎十七年間拜罷遂至五十人欲不亂得乎宋宣和中三公三孤皆備太師童貫少師梁師成少保楊戩餘即蔡京王黼蔡攸鄧洵武之流凡十人而宦寺居其三予昔使廣州游光孝寺觀偽南漢所造鐵塔四角有諸僧題名列銜皆金紫大夫檢校工部尚書又當時崇尚宦寺士人多自宫以圖進用亂朝之舉措可笑如此唐時有走馬應不求聞達科者傳以為笑宋亦置高蹈丘園科許於本貫投狀乞應與唐正同名實相悖真可一噱也古彩選始唐李郃宋尹師魯踵而為之元豐官制行宋保國者又更定之劉貢父則取西漢官秩陞黜次第為之又取本傳所以陞黜之語注其下其兄原父見之喜因序之而以為已作明倪文正公鴻寶亦以明官制為圖予少時偶病臥旬日無所用心戲作三國志圖以季漢為主而魏呉分兩路遞遷中頗叅用陳壽書頗謂馴雅有義例也馮祭酒具區夢禎䟦孫覿尚書尺牘云陽羡孫老得東坡棄婢而生尚書實坡公遺體予䟦鴻慶集既辯之矣頃又考得一事坡往陽羡憇村舍見一童子頗聰慧出對句云衡門稚子璠璵器童子應聲曰翰苑仙人錦繡腸坡喜之童子即覿也然則遺體之說益知其妄矣予䟦鴻慶集惜未睹此故再著之南唐二徐鉉無子鍇有後人居攝山前開茶肆號徐十郎家王銍性之嘗訪之鉉鍇告勅具在又言嘗見鍇文集有南唐宫人喬氏出家誥今騎省集三十卷尚完楚金集則不傳矣泰和縣白鶴觀云有楚金書碑予以康熙甲子奉使東粤過之維舟特訪此碑亦不復存鍇諡文公魏野詩數聲離岸櫓幾㸃别州山一篇最佳王彦輔記其一絶亦有風致可喜城裏爭㸔城外花獨來城裏訪僧家辛勤旋覓新鑽火為我親烹嶽麓茶劔俠傳言嘉興一囚善繩技至戲場捧繩百尺餘置諸地將一頭擲空中初抛二三丈次四五丈仰直如人牽之後乃抛至十餘丈仰空不見端緒其人隨繩身足離地高二十餘丈勢如鳥隼旁飛逺颺望空而失又黙記載晏元獻罷相守潁州一日有人呈􅂿索之技已而擲索向空索植立縁索而上疾若風雨遂飛空而去不知所在公大駭有牌軍白曰頃出戍曾見此等事此妖術未能遽出府門但請闔譙門大索必獲之乃命衆軍凡遇非衙中舊有之物即斧斫之最後至馬院一卒曰舊有繫馬柱五枚今有六何也亟以斧斫之乃妖人耳遂獲之今浙西之杭州嘉興稱呉地錢塘江以東乃為越地故唐詩曰到江呉地盡隔岸越山多予讀呉越春秋闔閭五年呉南伐越破檇李左傳史記亦然越絶書語兒鄉故越界名曰就李就李即檇李然則春秋之時嘉興本越之北境初不隸呉唐詩云云非也宋元論唐詩不甚分初盛中晚故三體鼓吹等集率詳中晚而畧初盛攬之憒憒楊仲𢎞唐音始稍區别有正音有餘響然猶未暢其說間有舛謬迨高廷禮品彚出而所謂正始正音大家名家羽翼接武正變餘響皆井然矣獨七言古詩以李太白為正宗杜子美為大家王摩詰高達夫李東川為名家則非是三家者皆當為正宗李杜均之為大家岑嘉州而下為名家則確然不可易矣余辛丑歲客秦淮邀笛步曽有和友人石厓秋栁小景絶句云宫栁烟含六代愁絲絲畏見冶城秋無情畫裏逢搖落一夜西風滿石頭袁籜菴于令見而戲余曰忍俊不禁矣近日金華刻元陳樵鹿皮子集郡人盧聯所編刻於明正徳戊寅今郃陽縣丞會稽董肇勲重刻於婺郡凡古賦十五首為一卷詩三卷卷首載宋文憲公所撰墓銘董有序頗佳又云原刻有慈谿周旋序佚去不載甲申董自秦中以卓異入京陛見來謁以是書為贄惜未暇晤其人香祖筆記卷六
