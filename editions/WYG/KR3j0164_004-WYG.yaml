body:
  text: 香祖筆記卷四刑部尚書王士禎撰康熙四十年駕臨塞外喇里逹番頭人進彩鷂一架青翅蝴蝶一䨇于行在問之對曰鷂能擒虎蝶能捕鳥又哈密獻麟草一方云草生鳴鹿山必俟千月乃成自利用元年至今止結數枚髙陵令朱某有白玉籠高廣二寸有竒四面皆作連瑣格子上下屯字文外一童子俯首而窺中有一猿坐而仰視意態如生鈕玉樵琇官秦中嘗見之黄周星字九煙崇禎庚辰進士性簡傲嘗遊嘉善遇一人負薪過市口作吟哦聲揖入詢其名氏曰崔姓名金友出其詩五言云花落無人徑雲飛到處山七言云因風去住憐黄蝶與世浮沉笑白鷗又云吟思白墮傾家釀坐對青山讀異書自號樵隱黄驚異因與定交某大臣籍沒時有一書案乃琥珀琢成而嵌水精方廣二尺下承一替亦水精為之髙可三寸貯水畜朱魚紅鱗碧藻呴沫游泳怳若麗空按元時雅克特穆爾於私第作水精亭子四壁皆水精鏤空貯水飬五色魚其中剪綵為白蘋朱荷諸花草壁中置珊瑚闌干光采玲瓏右李材解酲語載之古今事相類有如此宜興任𢎞嘉字葵尊康熙丙辰進士以行人改授御史上疏請定服色於是三品已上始許衣貂及舍利猻一日五鼓入朝遇梅桐厓鋗少廷尉時隆冬梅有寒色予口占絶句戲贈之云京堂詹翰兩衙門齊脱貂裘舍利猻昨夜五更寒徹骨滿朝誰不怨葵尊吏部侍郎趙公玉峰士麟曰公詩大佳尤難其押韻天然耳梅今為御史中丞廵撫福建鈕玉樵琇觚賸記此訛為京師謠語葢不知為予戲作也元時張進中者字子正都城耆老善製筆管用堅竹毫用鼬䑕精銳宜書吳興趙子昻淇上王仲謀上黨宋齊彦皆與之善尚方時有所需非進中製不用也每自持筆以入必蒙賜酒今京師未有以善筆名者矣昌平紅崖谷有道人戒行甚嚴一夜有美婦人叩門求宿時天寒憐而納之婦以言挑道人不為動忽言腹痛就盆産一兒詰旦抱去道人惡盆汚覆諸澗中誤染左手五指皆金色復視澗際沙石亦皆金色矣大小勞山在萊膠州即墨之境延安府甘泉縣北二十里亦有大小勞山狄武襄與夏人相拒士卒疲困憇此因名烈婦王氏名富英儒家女也其母夢吞牡丹花而生故以為名康熙癸丑歸孫文恪公之孫槐㑹土冦亂婦被掠賊帥慕其色將犯之堅不從繼以兵刃搒掠亦不從亱闌伺守者倦而寐遂以帛自縊死貌如生賊帥驚嘆其貞烈已而自悔曰如此烈婦而我偪之以至于死吾不知死所矣乃謝其儕伍披緇入山不知所終明末靖海衛向化其父指揮某投海死化年十六沿海岸哀號三日亦投于海次日天方晴霽忽西南有聲如天鼔雷雨大作化尸以頭戴父尸浮至海岸觀者如堵莫不驚異泣下其家乃祔葬焉順治初京師有賣水人趙遜者未有室同輩醵金謀為娶婦一日于市中買一婦人歸去其帕則髪毿毿白居然嫗也遜曰嫗長我且倍何敢犯非禮請母事之居數日嫗感其忠厚曰醵錢本欲得婦耳今若此反為君累且奈何吾幸有藏珠一囊紉衣中當易金為君娶婦以報徳越數日于市中買一少女子入門見嫗相抱痛哭則嫗之女也葢母子俱為旗丁所掠而相失者至是皆歸遜所嫗即為之合􅈟成禮嫗又自言洪洞人家有二子今尚存珠數顆可鬻之為歸計乃攜壻及女俱歸二子者固無恙一家大喜過望嫗乃三分其産同居終其身人以為遜忠厚之報云張道濟手題王灣海日生殘夜江春入舊年一聨于政事堂王元長賞桞文暢亭臯木葉下隴首秋雲飛書之齋壁皇甫子安子循兄弟論五言推馬戴猿啼洞庭樹人在木蘭舟以為極則又若王籍蟬噪林逾静鳥鳴山更幽當時稱為文外獨絶孟浩然㣲雲澹河漢疎雨滴梧桐羣公咸閣茟不復為繼司空表聖自標舉其詩曰回塘春盡雨方響夜深船玩此數條可悟五言三昧漢侯覇子孫稱祖父曰家公陳思王稱父曰家父母曰家母潘尼稱祖曰家祖蔡邕書文稱姑女曰家姑家姊班固書集曰家孫顔氏家訓姑姊妹已嫁則以夫氏稱之在室以次第稱之言禮成他族不得云家也子孫不得稱家者輕略之也此説與班蔡之稱不同矣漢律二千石有予告有賜告予告在官有功最法所當得者也賜告者病滿三月當免天子優賜其告使得印綬將官屬歸家理病郡二千石賜告不歸家自馮野王始也琵琶録云羽調緑腰注云即録要也本自樂工進曲上令録出要者以為名誤為緑腰也白樂天詩注又譌為六么乃其曲又有髙平仙吕非羽調吳楚材彊識略云然詹事府左右春坊司經局皆東宫從官雖居同署而各有印信不相統攝今文移章奏往往稱詹事府春坊者謬也亦如十三道御史例不冠以都察院今或稱都察院監察御史者謬也本朝設詹事府㳂明代之舊而稍不同明詹事率以禮部尚書掌府事少詹事亦多加尚書或侍郎皆與枚卜今則班通政大理之下府丞罷不設通事舍人亦罷不設左右春坊明初庶子之上有大學士後罷不設今㳂之司直郎清紀郎司誎俱罷不設司經局洗馬一人洗先也荀子曰天子乘大輅諸侯持輪乘輿先馬注導馬也國語曰勾踐為夫差洗馬如淳曰前驅也晉太子詹事官屬有洗馬八人掌太子經書圖籍其後止一人今㳂之漢蘭臺東觀有校書郎北齊有正字明司經局之屬有校書有正字今校書罷不設正字則以内閣中書舍人改充之世或疑文中子以為房杜李諸公未必皆出其門者陋儒也予讀司空圖文中子碑云天生文中子以致聖人之用得衆賢而廓之以俟我唐故梁衛數公皆為其徒恢文武之道以濟貞觀治平之盛圖唐人也又文中子鄉人也其言如此可信耶不可信耶吾故特筆之以結此輩之舌若門人薛收等議諡文中子則詳唐書文苑王勃傳文中子之名則附見王績傳禮生曰名死曰諱今世俗不辨以諱混施之生者極可笑然漢人有之吳楚材彊識略言漢西嶽廟碑云樊君諱毅毅時尚在也然則俚俗相㳂亦有所本堂谿公曰玉巵無當當底也謂人主漏洩羣臣之語也譬玉巵美矣而無底則水迸散不若瓦器有當適用也如所謂君不宻則失臣也海船曰艆䑼江船曰􅀈􅀈作蠡音明洪武初立宗人府以秦王為宗令晉王燕王為宗正周王楚王為左右宗人皆正一品其後不然本朝無宗令宗正等名率以和碩親王多羅郡王掌之亦有多羅貝勒協理府事者惟宗人府丞則以漢人為之位次副都御史與通政使大理卿同列曰宗通大古稱宗室藩王之賢者曰間平謂漢河間獻王東平憲王也又古稱原嘗謂趙平原君齊孟嘗君皆舉第二字言之今户部有總督倉場滿漢侍郎二人滿左漢右總轄京通各倉倉監督則以各部員外郎主事差遣即漢之太倉令丞也唐明皇以御史充太倉出納使五代改曰如京使取詩如坻如京之義宋㳂之故柳開稱桞如京舉其官也兵部有督捕滿漢侍郎二人滿左漢右左右理事官四人滿官二人漢官二人專司緝捕八旗逋逃之事其屬漢郎中一人員外郎一人主事六人司務一人今歸之刑部曰督捕司止設漢郎中主事各一人管子所謂僕區是也昔耶律文正公楚材對元世祖曰今天下一統逃將安之此言最得大臣之體予先曽官督捕侍郎今十四五年官刑部尚書復兼領是事惟以文正之意仰承朝廷寛大之恩宣布四方而已故終嵗不劾一失察之官不治一窩隱之罪非敢縱也亦古人所云無擾獄市之意而已户部之屬古有民部度支金部倉部明改十三清吏司分掌十三布政司之事而各司吏書仍分民支金倉四科刑部之屬古有憲部比部司門都官明改十三清吏司分掌十三按察司之事而各司吏書仍分憲比司門都官四科存古制也本朝因之但明代以南北兩直隸之事分隸十三司本朝則増江南一司耳刑部又増督捕一司為十五司工部四清吏司外今増製造庫滿洲司官外惟設漢郎中一人即宋之文思院也考工之官以文思命名甚竒六月初七日和碩恭親王病薨諡曰闕諱長寜世祖皇帝三子六月二十六日和碩裕親王病薨諡曰憲諱福全世祖皇帝長子和碩裕親王世子保泰襲封親王偶觀明秦人趙統伯一驪山集崖雞一篇略之如左以補物類相感志所未及客有籠鳥者謂為崖雞丹喙朱趾隹尾鳩臆大倍鴿葢雉屬也因指其喙此雛時殊黒成翮而飛始蜕其喙褪黒出丹鸚䳇之褪易其色崖鷄之褪并脱軀殻方褪時喙吭腫藃如蛇蜕然因言蛇蜕如蟬蜕殻枮虚裂頂而出如更生然座客或言􅝤蜕眼常求亡羊得􅝤窮谷草中故睛閉而新眶未啓又有言獺蜕肝者曰獺肝凡十二析月腐一析則他一析更新循還嵗更故諺曰人心象膽世事獺肝又有言羱蜕角者羱野羊也大者重千斤方蜕時自投紀厓冀震撼以自解而羱亦自决死矣已甦而自逸但不能得其蜕期若麈鹿之冬夏云有趙生者因言其地多麝曰前人言麝噬虺食栢而香結退臍而藏覆以自珍吾邑㑹寧無栢麝將何食麝春和其臍自張獵諸花卉得其香而括之蠅蠓集其臍膻然亦括之凡諸花香蟲肉皆香材也遇蛇回旋數周撑足張臍以當之蛇自起而納諸臍獵人得其臍或收蛇不既者或收而未化化而不盡者大抵蛇為其香之主也言既客有談龍者龍之蜕以首昔見晁氏蓄藥嘗得全首置牖下高可二尺許或得之地中或得之石中然不得其蜕之詳文矯異甚可喜趙又辨鳩逐婦一則云鳩逐婦乃感天地之雨𤾉而動其雌雄之情求好逑也非逐而去之之謂歐陽永叔云天將隂鳴鳩逐婦啼中林鳩婦怒啼無好音非也趙又云韻書五噫噫本平聲楊眉菴莫解梁鴻五噫歌趙大洲梁君五噫今安否皆作去聲誤按字書噫音依恨聲又音隘飽食氣滿而有聲也則依音為是楊用修言何仲黙謂宋人尚不能解唐人詩以之解三百篇真是枉事不如且從毛鄭胡釘鉸事或言列禦寇或言柳文暢王性之黙記又載諸先生遇慈上座事云他日見胡釘鉸者知吾所在後諸為章惇引薦特置第五甲勉往置冠帶而作帶者極有士人風範問之即胡釘鉸也驚問慈上座何在曰上座於人一舉意即知之且頃刻已萬里矣何可知其處也此胡釘鉸又異人矣一耶二耶寳應孝亷陶成字雲湖朱升之大叅妻父也以畫名家偶閲王兆雲揮麈新談載其行事怪僻甚殆郭忠恕之流成小時從師見其妻即圖之次見其女又圖之皆逼眞師怒逐之寫花鳥人物最工芙蓉尤入神品然與物多忤性不可測識有富人欲求之而不敢言乃於其游歴之所遍栽芙蓉秋日花盛開成過之喜甚主人已預具絹素張于庭立成二十幅索酒痛飲而去嘗同升之赴㑹試距試期僅三日忽語升之曰聞張灣某氏丁香盛開子其從我游乎升之不可成買小車徑造其家痛飲花下五日乃去遂悞試期嘗以挾伎事露御史知其名欲全之觀其贈伎詩曰此殆非子作成爭之曰天下歌詩豈有出陶成之右者而謂他人作乎竟坐除名晚遇一伎甚美而不肯與接成自織錦裙持見之精類鬼工伎乃大喜既遂挾伎以遁坐謫戍邉陳寒山函輝云王立轂字伯無少入雞足山忽逢伽葉引入石壁中語之曰汝墮火宅中行慈忍戒他日勇退急流橋下前身猶在既出壁合如故王遂持戒殺終身髙念東侍郎遊山隂道上有句云笻杖古松流水外蒲團修竹緒風間予愛之命畫師禹鴻臚之鼎寫為二圖大唐傳載云顔魯公刻姓名於石或置髙山之上或沉大洲之中云安知不有陵谷之變耶此因杜元凱事而傅㑹之耳魯公碑版照曜天下安用區區為爾亦陋甚矣李龜年有弟彭年鶴年開元中皆有盛名鶴年善歌製渭州彭年善舞龜年善打羯鼔見大唐傳載宋荔裳琬在京師一日招龔芝麓大宗伯梁蒼巖大司馬及予兄弟飲梁家園子予首倡偶用纈字明日梁問予纈字之意對不能悉按潘氏記聞云唐明皇柳媫妤妹適趙氏性巧慧鏤版為雜花打為夾纈代宗賞之命宫中依樣製造又西河記西河婦女無桑蠶皆著碧纈韻書但言繒耳上己卯南廵視河賜江蘇廵撫臣宋犖仁惠諴民四大字又賜懐抱清朗四字癸未以河工底績再南廵渡江駐蹕江天寺即金山寺御賜今名犖時扈從奏云臣家有别業在西陂乞御書西陂二大字賜臣不令宋臣范成大石湖獨有千古玉音云此二字頗不易書犖再奏云二字臣求善書者多不能工刑部尚書王士禎少與臣為同學嘗云二字倘得御書乃為不朽盛事上笑而書之即以頒賜頃之駕回行宫又命侍衛取入重書賜焉再賜清徳堂大字犖西陂有緯蕭草堂釣家芰梁諸勝嘗邀予輩同人賦詩今果獲御書張之不世之遇也古名臣别業最著無如午橋平泉皆地以人重顧未聞有此矧輞川盤洲以下乎犖有扈從紀㤙詩紀其事中一首云御筆傳來訝再三西陂寳墨秘龍函一時盛事流傳速已入漁洋續偶談李庶常麗生暄亨蔚州人示予雲中節義録所録闖寇之難大同殉節者五人宗室二人永慶郡王某管理襄垣王府事鎭國中尉俊􅀢廵撫衛景瑗韓城人監司朱家仕河州人其一則諸生李若葵也衛公本末載諸他書甚著餘得略而書之永慶郡王失其名居大同甲申正月李賊将出鴈門掠雲中諸王府謀迎降王獨大言曰堂堂親藩奈何降賊持何面目見太祖列宗于地下乎賊至王介胄率左右鼓譟出将赴敵死顧左右曰今日乃孤畢命時也卿輩寜死同時勿辱賊手方抵城門㑹總兵官姜瓖叛出迎賊與王衛士戰射王中肩王死之官屬殱焉瓖遂以城降鎮國中尉俊􅀢被服儒雅善八分書慷慨好談節義賊逼城聚弟姪謀曰所不遣汝曹先去者欲同急難耳然同死無益汝不聞㣲子之去伍員之覆楚乎我死使人知宗室有殉國之臣若輩各從其志惟不可降賊以辱國乃闔户大書于壁曰襄垣管理殉國盡忠旁注九二慧泉四字遂自剄九二行也慧泉其字數日家人歸殮之顔色如生朱家仕中崇禎戊辰進士廵撫衛景瑗雅重之聞冦警衛公召集文武衆僚屬㰱血漢夀亭侯祠下衛既㰱總兵官姜瓖有異志逡廵不進家仕獨義形于色誓不與賊俱生城䧟前一日赴井死諸生李若葵率妻子等同縊題壁曰一門俱死大節已完七日始殮舉家顔色如生代王明太袒第十二子國大同諡曰簡七月初一日上聞裕親王薨自行在冒雨回京師至東直門望城而哭未入宫先駕臨王府率皇太子哭奠既登輦哭不絶聲入大内避正殿居延禧宫諸王貝勒内閣部院九卿八旗都統等文武諸臣慰問起居請節哀仍赴蒼震門請駕還宫不許王慈惠謙和動必以禮上素篤手足之愛朝論以為不愧漢之間平云是日又命皇太子詣恭親王靈幄奠酒予前記雲間有木工蕭姓者能詩未詳名字近讀觚賸乃知蕭名詩字中素别字芷厓博學能文尤長于詩嘗有五言云遼海吞邉月長城鎻亂山七言云山寺落梅傷别易天涯芳草寄愁難皆佳句也初五日裕親王殯于齊化門外郊園皇太后皇上皆臨王府親送滿漢内閣九卿皆送至園奠畢歸入朝上傳尚書臣士禎大理寺卿李斯義掌河南道監察御史吕琨同内閣户部赴乾清門問山東今年水災情形并問前遣官照口外飬蒙古例往賑實有益于百姓否臣士禎奏皇上軫念民艱特遣人員照口外飬蒙古之例賑濟地方大小官員仰體聖意實心料理不敢文具視之自實有禆益于百姓但今年之災非比去年去年被水不過十餘州縣今年則六郡無不被水加以丹災視去年不啻數倍今舊榖已盡新榖絶望民間所苦在于無米上諭户部尚書凱音布速發通州倉米往賑初六日駕幸口外袁氏自江左已來淑粲察昂歴著高節及唐初文皇将選東宫官屬謂岑文本曰梁陳名臣有誰可稱復有子弟堪招引否對曰隋師入陳百司奔散唯袁憲侍側不去王充受隋禪羣僚表請勸進憲子給事中承家獨不署名父子皆稱忠烈又袁朗自以中外人物為海内冠族雖瑯琊王氏繼世台鼎而累朝首為佐命恥與為伍朗孫誼虞世南外孫也為蘇州刺史謂司馬張沛曰門户須歴代人賢名節風教為衣冠顧矚始可稱舉老夫是也宜其髙自位置如此崔信明楓落吳江冷五字初唐所少信明吾鄉益都人也以五月五日午時生有異雀數頭五色畢備嗚于庭樹初仕隋為尭城令竇建徳欲引用之族弟敬素為建徳鴻臚卿勸以立事信明曰昔申胥海畔漁者尚能固其節吾終不能屈身偽朝遂隱太行山貞觀中應詔舉為秦川令卒信明不獨才名冠一時而大節毅然尤為可書其自負詩過李百藥非蹇傲也鄭世翼何許人乃敢肆其輕薄耶全州謝良琦字石臞能為古文康熙初以明經通判常州恃才傲睨意不可一世常以謁廵按御史與予解后公廨初未相識彼此不交一言罷去既而知其予也乃遣使過江致書問通殷勤後貽其刻集中有為予漁洋詩序予笑語人謝君何前倨而後恭耶㑹同年江陵胡黙齋在悔官江南提學聞謝名過毘陵因召見之謝時有母之喪要絰而往甫登舟胡亦卞急人也望見之怒甚急使麾去謝傲然不屑予按唐李林甫欲致蕭頴士時頴士居喪廣陵聞召詣京師縗麻謁林甫于政事省林甫大惡之即令斥去頴士忿乃作伐櫻桃賦以刺之與良琦事正相類舊唐書為李巨川作佳傳列于文苑始終無貶詞新唐書則置之叛臣傳特書其導韓建殺十六宅諸王及定州行營将李筠之罪使非宋景文則巨川首惡網漏吞舟矣春秋之義謂何然新書既以僕固懐恩李懐光李錡等為叛臣又列李正巳師古師道吳少誠元濟等於藩鎭一進一退其義何居每開卷至此輒為憤懣移日致仕前文華殿大學士兼吏部尚書伊桑阿卒公滿洲人順治乙未科進士康熙戊辰以禮部尚書大拜在相位十五年壬午以病予告至是卒年六十六諡文端黄山湯泉皆朱砂天啟中或浴于泉見一䑕躍出純赤色長尺餘曰朱砂䑕古今文人有名不大著而其詩實卓然名家者世人多耳食抑何從知之如歸田録所載謝伯初景山送永叔謫夷陵詩中聨云長官衫色江波緑學士才華蜀錦張下國難留金馬客新詩傳與竹枝孃明欽天監博士馬軾字敬瞻送岳季方閣老云五嶺瘴髙煙蔽日兩孤雲濕雨鳴秋結句祭罷鰐魚歸去晚刺桐花下月如鈎右二詩即使當世專門名家操觚染翰未必能到論者不可狥名而失實故特表而出之常愛杜詩兩邉山木合終日子規啼又明初人詩數家茅屋臨江水一路松風響杜鵑寫蜀江風景宛然在目予曽擬作一聨送同年張仲誠沐知資縣云子規聲斷處山木雨来時又嘉陵驛路千餘里處處春山呌畵眉皆眼前實景也歐陽公云秋霖不止文書頗稀叢竹蕭蕭似聼愁滴蘇公云歳云莫矣風雪淒然紙牕竹屋燈火青熒時于此間得少佳趣此等寂寥風味富貴人所不耐而予最喜之政苦一年中如此境不多得耳二公葢先得我心之所同然歐公有刑部海棠及刑部看竹詩今刑部詎復有此㳺觀之勝耶予嘗謂詩文書畵以人重蘇黄遺墨流傳至今者一字兼金章惇京卞豈不工書後人糞土視之一錢不直所謂三代之直道也永叔有言古之人率皆能書獨其人之賢者傳遂逺使顔魯公書雖不工後世見者必寳之非獨書也詩文之屬莫不皆然歸田録記陶榖召對便殿徬徨不進太祖笑曰此措大索事分顧左右取袍帶来榖乃趨入予嘗笑之榖欲效汲長孺而其奉使南唐呉越狼狽乃爾疑出兩人之所為又何歟御史言事不先白臺長自宋劉子儀為中丞始李方伯紫瀾濤自桂林歸求為母夫人作傳貽予楊孟載手録眉菴詩集五大册雖書法未為當家然先哲故物可寳惜也每幅有子京墨林項叔子琴書清暇等印葢禾中項氏藏本也卷首自識行末有業字􅃅三字云余自離吳門未嘗作詩間有所述不復存藁邇來西江意或得追理舊業而案牘山積雖罷竭駑鈍猶不及十之二矧從容筆硯間哉固知有愧于穆之也冬十一月宜春侯上猶臨江冬字至侯一勾下又一圈句疑有誤余奉省檄執鴈謁軍門修聘禮自己未至丙寅往返者八月凡目所覩身所歴念慮所思得短章五七言古律絶句四十首如春山早鶯初出深谷舌强語澀殊不成音欲棄置水中復念余友方君以常每以不得見舊藁為憾姑存此以貽方君君長于詩尤工唐人五言與余友張羽來儀為倡和友云吳人楊基識後書五言一篇云今夕復何夕夢我生平友握手無所言但道别離乆覺來聞秋蟲空堂竟何有不知千里道君魂果來否當年亦如夢聚散一回首起坐誰與親鐘鳴月穿牖其詩分體不分巻凡若干首不止序所云奉使四十首也按孟載始以薦為江西行省幕官此葢江西時所自書首卷起寓懐十二首與今本同但今本作感懐耳按眉菴集中有秋日懐方員外詩張静居集亦有元日雪懐方員外以常送方員外歸吳興詩所云晴春入舊臘積雪含清暉是也方葢吳興人王徴士集四卷都少卿元敬所定有元敬及浦杲序徴士名彛字常宗又􅃅媯蜼子洪武初與髙季廸同修元史後亦同死魏觀之難元敬稱其古文明暢英發又或以為吳中四傑之一以常宗代張来儀者今觀其詩歌行擬李賀温庭筠殊墮惡道餘體亦不能佳詎能與髙楊頡頏上下乎固知髙楊徐王之説誕而無徴矣此本嘉定門人陸廷燦扶照所刻王元之五代史闕文僅一卷而辨證精嚴足正史官之謬如辨司空圖清直大節一叚尤萬古公論所繋非眇小也如叙荘宗三矢告廟一叚文字淋漓慷慨足為武皇父子寫生歐陽五代史伶官傳全用之遂成絶調惟以張全義為亂世賊臣深合春秋之義而歐陽不取于全義傳略無貶詞葢即舊史以成文耳終當以元之為定論也元之吾郷鉅野人其小畜集三十卷黄俞邰虞稷千頃堂有傳本惜未及借録元吳師道禮部集二十卷詩九卷雜文十一卷師道金華蘭谿人與許白雲講明金仁山之學而與黄晉卿溍柳道傳貫為友故其學問文章逺有統緒時稱其為文清勁善持論友人朱簡討竹垞常稱之此本乃崑山徐少宰果亭秉義寫以見貽者吳至治辛酉進士仕止國子博士致仕加禮部郎中故集稱禮部云吳師道仙山秋月圖詩自注宫扇馬逺畫宋寜宗后楊氏題詩自稱楊妹子詩中感慨濟王之事以楊妹子為楊后誤陸廣㣲吳地記所載如語兒亭等最為可笑又多可疑者如馮驩宅謂在吳縣東北二里五十歩有彈鋏巷又謂海鹽縣東十五里有公孫㨗田開疆古冶子三墓尤謬按齊乘云三士冢在臨淄南一里一基三冡晏子春秋公孫㨗田開疆古冶子事齊景公勇而無禮晏子言于公餽之二桃云云是事眞妄固不足辯然三子齊臣死不葬近郊而逺葬吳地此復何理至于馮驩宅之譌謬又不煩筆劄者也與張騫有墓在平原班超有墓在長清同一傳譌齊乘已辯其非矣世言瓊花天下惟揚州蕃釐觀一株故宋人作無雙亭于其側然元遺山續夷堅志云鄠縣南十里炭谷入谷五里有瓊花樹大四人始合抱逢閏即花以初伏開末伏乃盡花白如玉中有玉蝴蝶一髙出花上花落不著地乘空而起按此則不止廣陵有之矣香祖筆記卷四
