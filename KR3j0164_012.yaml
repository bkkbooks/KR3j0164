body:
  text: 香祖筆記卷十二刑部尚書王士禎撰東坡詩云詩文豈在多一頌了伯倫朱少章謂藝文志載劉伶集三卷伯倫非他無文章鍾退谷謂劉眘虛生平詩才十四首豫觀獨孤及三賢論及殷寅所嘆眘虛之長不止於詩詩亦豈止十四首但此一頌十四詩足以不朽其人他文可不必傳政如白頭花鈿滿面不如美人半妝耳山谷豫章集最多而晚年自刪其詩止存三百篇徐昌穀自定迪功集亦最少二公正得此意豫生平為詩不下三千首門人盛侍御誠齋符升曹祭酒峩睂禾為撰精華録意存簡貴然所取尚近千首愧山谷昌榖多矣朱少章詩話云黃魯直獨用崑體功夫而造老杜渾成之地禪家所謂更高一著也此語入微可與知者道難為俗人言物類相感志云芽茶得鹽不苦而甜乃知古人煎茶必加薑鹽以此然茶取其清苦若取其甘何如啜蔗漿棗湯之為愈也陳仲醇云溧陽人家有鍾離權書花押如一劔狀則是神仙亦有押字唐牛李之黨贊皇君子功業爛然與裴晉公相頡頏武宗之治幾復開元元和之盛其黨又皆君子也儈孺小人功業無聞怛悉謀維州一事怨恫神人其黨李宗閔楊虞卿之流又皆小人也二人之賢不肖如薰蕕然不難辨也自蘇潁濱二人皆偉人之説出謂僧孺以德量高德裕以才氣勝而賢不肖始混淆矣初僧孺尉嵩縣而水中灘出有􅗌鶒一雙飛下儈孺果入西臺陳仲醇云奇章入臺當以鴟梟應之此雖戲論實公言耳吾宗鶴尹兄抃工於詞曲晚作籌邊樓傳竒一褒一貶字挾風霜至於維州一案描摹情狀可泣鬼神嘗屬豫序之而未果也今鶴尹歿數年矣憶前事為之憮然聊復論之如此將以代序且以見傳竒小技足以正史家論斷之謬誣也鶴尹大父緱山先生作鬱輪袍及裴湛和合二曲詞曲家稱為本色當行何大復平涼詩云惟餘青草王孫路不屬朱門帝子家莫中江以為李滄溟在河南時作人與地皆誤也濟南府城東三十里王舍人店萬厯間耕者得片石於田中刻讀書臺三字乃蘇長公書也按元遺山濟南行記以為宋張公掞讀書處掞舉進士仁宗朝知掖縣奏免登萊租稅後以户部侍郎致仕或云是其兄揆揆字貫之通易太元陳執中薦為龍圗閣直學士進翰林侍講學士云徐渭墨芍藥一軸甚竒恣上有自題云花是揚州種瓶是汝州窰注以東吳水春風鎖二喬字亦怪醜豫少喜渭詩後再讀乃不然只是欠雅馴耳後山談叢云齊之龍山鎮有平陵故城高五丈四方五里附城有走馬臺其高半之濶五之三上下如一其西與南則在內東北則在外莫曉其理按東平陵城唐之全節縣也即古談子國詩所謂談公維私者也故城址尚存走馬臺則不可辨識矣城東門有漢夏侯勝墓後山云趙內翰彥若家有南唐澄心堂書目才三千餘卷有建業文房之印永叔論書喜李西臺而集古録不取張從申秦玠兵部學西臺書文忠在亳問秦西臺何學曰張從申也今金陵棲霞寺碑乃從申書豈文忠偶未睹耶印章舊尚青田石以燈光為貴三十年來閩壽山石出質溫栗宜鐫刻而五色相映光采四射紅如靺鞨黃如蒸栗白如珂雪時競尚之價與燈光石相埒近斧鑿日久山脈枯竭或以芙蓉山石充之無復寶色其直亦不及壽山五之一矣二山皆在福州語云棗不救儉言歉歲不宜棗也康熙甲申歲仍儉而棗倍收乙酉歲豐棗亦收語不皆驗寒食麵臘月雪為糊則不蠧宋王文憲家以皂莢末置書中以辟蠧王弇州觚不觚録云親王體至尊於文武大臣投刺作書有稱王者别號者不稱名惟今魯王一切通名自分宜當國而親王無不稱名矣至江陵而無不稱晚生矣當其時襲封者至稱門生按宋朝儀親王班宰相之下已乖大體况以天潢之尊降而稱晚生門生乎其褻越已甚而權相之氣熖亦可想見又何怪士風之不競乎江陵媚大璫馮保刺稱晚生以江陵之薰灼至使羣臣上疏不敢斥名親王次輔皆稱晚生在外布按二司至行跪禮而屈體媚璫乃如此可謂羞朝廷而辱當世之士矣御史於左都御史副都御史例用上銜名帖即升遷至大官仍稱晚生不改豫以康熙庚午為副院今梅少司馬桐崖鋗為御史掌京畿道後九年豫為掌院梅已為副院猶稱晚生及出為閩撫不改也金少司寇璽亦嘗為屬同時為副院亦稱晚生及出為楚撫則改稱侍生不知用何例也各道御史掌道論俸之先後一定不易惟協理則總憲批委遂多趨避如河南江南浙江三道缺協理之員則人競趨之臺規不肅為日已久豫為掌院凡協理一按俸次先後不許越次至內升京卿初薦常百子翼聖後薦李質君斯義陳大年齊永皆以久次掌河南道者無所容其營競後常至大理寺卿陳至太常寺少卿卒李今為福建巡撫此亦所以崇恬退抑奔競之道而前後皆不盡然翰林有對房師生之例自明代相沿至今弇州謂三品已上則不復敘然豫見王大宗伯涓來澤𢎞為吏侍杜大司馬肇余臻為尚書每相遇杜執弟子禮益恭此盛德足以風世也弇州又言常熟嚴文靖公訥以嘉靖甲辰會試分領詩經房瞿文懿景淳以本經中式乙未再分房李文定春芳亦以本經中式皆不稱門生不可解也明舊例五部尚書避大學士惟吏部尚書不避相遇則下輿而揖今吏部亦與五部尚書同矣弇州謂蒲州楊襄毅公為太宰位望俱重侍郎以下皆逺避後起掌兵部亦然明舊例太常光祿太僕寺正卿皆避侍郎弇州議其非今無是矣即遇尚書亦不避也若翰林庶常以至內閣中書舍人遇尚書都御史亦分途抗行不避不知何説弇州載吳中陸子剛之治玉鮑天成之治犀朱碧山之治銀趙良璧之治錫馬勳治扇周之治商嵌吕愛山治金王小溪治瑪瑙蔣抱雲治銅皆比常價再倍其人或與士大夫抗禮文房寶飾云養筆以硫黃水舒其毫東坡以黃連煎湯調輕粉蘸筆頭候乾收之山谷以川椒黃蘗煎湯磨松煙染筆藏之尤佳又東坡作墨以高麗煤契丹膠為之倪雲林每作畫必題一詩多率意漫興惟妮古録載一詩最佳云十月江南未隕霜青楓欲赤碧梧黃停橈坐對西山晚新鴈題詩小著行又顧阿瑛題文與可竹云湖州昔在陵州日日日逢人寫竹枝一段枯梢三作折分明雪後上窗時風致不減雲林昔在京師從宋荔裳琬所見元朱碧山所製銀槎乃太乙仙人一時多為賦詩以為張騫事非是妮古録云曾見所作昭君像琵琶乘騎睂髮衣領花繡鬃鬛種種精細馬腹上豆許一穴其中嵌空琵琶上刻碧山二字羣碎録云書曰帙者古人書卷外必用帙藏之如今裹袱之類宋真宗取廬山東林寺白居易集命崇文院寫較包以斑竹帙送寺嘗於秀水項氏見王右丞畫一卷外以斑竹帙裹之云是宋物帙如細簾其內襲以薄繒故帙字從巾內典云福不唐捐今謂亭館無壁曰唐肆唐訓空續文獻通考載劉辰翁須溪集一百卷今所傳止記略二卷及批點老莊列班馬世説摩詰子美長吉子瞻詩九種耳太平清話云朱竹古無所本宋克仲溫在試院卷尾以朱筆掃之故張伯雨有偶見一枝紅石竹之句然閩中實有此種紅如丹砂明仁宗賜禮侍金問歐陽居士集凡二十册遭回祿失其八後在文華殿從容言及賜書事宣宗促命內侍補之復完余聞曹舍人貞吉云官典籍日料撿內府藏書宋刻歐陽集凡有八部竟無一全者蓋鼎革之際散軼不可勝道矣王介甫狠戾之性見於其詩文可望而知如明妃曲等不一其作平甫墓志通首無兄弟字亦無一天性之語敘述漏略僅四百餘字雖曰文體謹嚴而人品心術可知唐宋八家文選取之可笑屠隆長卿令青浦梁辰魚伯龍過之為演浣紗記遇佳詞輒浮以大白昔袁荆州籜菴于令自金陵過豫廣陵與諸名士泛舟紅橋豫首賦三闋所謂緑楊城郭是揚州者諸君皆和袁獨製套曲時年八十矣曲載紅橋倡和昔張子野與東坡會飲垂虹亭年亦八十司馬子長采左氏內外傳國䇿世本以為史記楊用修取華陽國志王象之紀勝成都碑目費著器物譜蜀錦譜蜀箋譜以為蜀志昔人謂可以為修志乘法豫見康對山武功志前幅載織錦璿璣詩圖劉九經郿志前幅載武侯木牛流馬圖殊有别趣但如此佳料不易得耳秦少遊有姬邊朝華極慧麗恐妨其學道賦詩遣之至再後南遷過長沙乃眷一妓有郴江幸自繞郴山為誰流下瀟湘去何前後矛盾如此畫家界畫最難如衛賢馬逺夏圭王振鵬皆以此專門名家不足貴也郭忠恕畫山水入逸品乃工界畫斯足異耳論詩文當以是推之或云忠恕以篆籀畫屋李義山記滎陽鄭璠官象州得怪石六輦運以歸費俸錢六十萬後還長安無居宅妻兒寄人舍下余讀而笑之既稱亷吏安所得六十萬錢鬱林石殆不如此豫最愛湯義仍先生絶句清逺樓中一覺眠雨鳩風燕乍晴天年來愛作團欒語不得中男在眼前昔丁卯戊辰間豫家居而第三男啓汸官文登廣文嘗寫此詩寄之以代家書真不減子由彭城逍遙堂絶句也興觀羣怨學詩者當於此等求之張景山一石中有月形石色紫而月白月中有桂樹其文黑枝葉老徑雖工畫者不能為又吕東萊蓄一犀帶中有月影過望則見范文正家一古鏡背具十二時如博碁子每至某時則碁中明如月又季鴈山一爐幕上有十二孔應時則香出趙松雪鵲華秋色圖為周密公謹作山頭皆著青緑全學右丞公謹家世濟南流寓吳興故松雪為作此以寄其故鄉之思密嘗著癸辛雜識雲煙過眼録諸書癸辛所居巷名猶許渾之丁卯橋康熙中嘗命畫苑寫耕織圗御製詩冠其上方刻印頒行按此圖始於宋於潛令四明樓璹作耕織圖以獻思陵各繫五言八句詩逐段有憲聖皇后題字古人文章身後所託不一如白居易以轉輪藏唐球以瓢劉蛻以冢陸龜蒙以白蓮寺佛腹後百千年必有知者何必藏之名山副在通都耶梅梁有二會稽禹廟梅梁乃大梅山所産梅樹張僧繇畫龍其上夜大風雨飛入鏡湖與龍鬬乃以鐡索鎖之晉謝安石作新宫造太極殿少一梁忽有梅樹流至石頭城下取為梁殿乃成畫梅花於其上豫昔奉使廣州親見蓽麻樹扁豆樹茄樹昨閲一書言西土甘草亦有成大樹者皆異聞也袁淑山公九錫文沈約修竹彈甘蕉文韓愈毛頴傳之類偶然遊戲後來作者遂多吾鄉賈公三近嘗輯滑耀編若干卷先王父方伯贈尚書府君曾屬毛子晉刻之汲古閣又嘗見文府滑稽一書皆此等文也會稽女子商婉人能詩工楷法嘗仿吳彩鸞寫唐韻作草三先草四仙武林沈澗芳名蓀為題絶句云簪花舊格自嫣然顆顆明珠貫作編始識彩鸞真韻本草三草四是先仙商本老學究女兼能制舉文字嘗手評沈文一卷又有詩贈之云細筆猩紅絶妙辭掃睂窗下拜名師從來玉稱稱才子樓上昭容字婉兒門生沈澗芳又云康熙壬子為河道總督請主任城書院有諸生饋墨數丸云是土人所製形如掘丸磨之甚黝黑則兖墨至今猶有傳其遺法者惜豫未及見之杭州臬署本宋嶽忠武王宅東偏有王祠祠後又有一祠並祀文信國及元巴延養濟院則祠嚴嵩為土地皆不知起於何時澗芳嘗與友人泛西湖未幾雨作座有請􅀈仙者至則書一絶句云才散笙歌罷緑么冷風疏雨上輕舠問豫名字真消息曾向王維雪裏描叩之自云緑天仙子賈秋壑半間堂後植蕉百本子乃其中之得靈氣者現美人身侍書於巾峰洞天翼日迹之果有巨蕉一本樵牧不侵遂醵金搆精舍其側自後數降􅀈與諸生倡和云康熙甲申十二月蘇州洪生者與客談次忽空中有聲舉頭視之見一人左手抱册右手持杖黃巾黃衫御風而過頃刻漸逺猶見衣角出問市人亦多見之澗芳云曾見諸生中有油姓煙姓粵東撫署即尚藩故王宫東園有樹一株結實如枇杷中空似有核而脫去竟無能名之者亦異植也先兄考功集詩屢經芟削最後止刻四卷佳句佚者頗多略記一二如濰縣道中云人煙通下密橋路繞東丹夏夜詞云夢覺聞花漏星河一帶橫感興云大人有賦言仙意內景何方駐聖胎此類尚夥豫少時詩如送人知鄞縣云天晴真臘樹日射灌門潮分賦菊名孔雀尾云未登嵇氏狀却號孔家禽贈徐東癡云湘君品第留金管江左風流續玉臺過郡城云郭邊萬户皆臨水雪後千峰半入城舟中小飲云行藏略已同仙尉得失何妨任老兵餘亦頗有可存者今略識其概耳雪蕉館紀談云明玉珍在蜀有成都人陸子良能造薛濤箋工巧過之玉珍建搗錦亭於浣花置箋局俾子良領其事今萬里橋東有蜀府造箋白石盆鏤刻甚精然距浣花尚數里又云陳友諒在南昌喜食玉葉羮乃以西山羅漢菜曲江金花魚為之按曲江隸豐城宋元祐太后為金人所追投金花於此祈風改名金花潭倪雲林小畫一軸上題字云三月四日解后德方郎官九成掾使於荆溪之上相從及旬而别因九成徴豫畫并賦詩剡掾學阮掾宛然西晉風百年聊復爾三語將無同載酒來溪上看山入剡中孤帆逐雲樹煙雨滿春空淨因菴主瓚沈石田摹大癡山水自題云山疊氣未闕衍迤勢叵窮溪壑互中涵草樹發青紅縹眇神仙居隱現金銀宫飛霞隔鸞鶴叢笙思閬風誰從此招手度我逍遙翁時𢎞治辛亥九月下浣沈周右二幅皆於濟南朱氏楓香閣觀豫於前卷太息郟縣同軌之遇以為郃陽康乃心與軌前後皆以詩見知而有遇有不遇皆命也乙酉九月豫歸田且近一載一日得河南題名小録閲之則軌居然領解額第一自喜老眼無花因檢篋中軌所寄詩尚存輒録於此與識者共質之云華星炯炯羅秋穹帝車正色臨天中今古文章各司命龍門吾代趨王公賤子曾公公從祖大羅天詠霓裳同萬厯乙未孔李通家踰百載日月泥塗牛馬風何况虞廷儀鸑鷟和聲應答唯笙鏞鶴唳鶯啼瘖不發草間誰敢矜寒蛩東平牙齒濫餘論江天颯颯羞吳楓新文底用把小陸飛夢已過尸鄉東驚聞面赤汗浹背進退交惑心忡忡灑掃何年懷四本聊將耳學思擊蒙騷經詩史立忠義豈徒排比鋪陳工霧夕芙蕖詫沈范區區兒女塗青紅劉生示我漁洋集南海蜀道爭豪雄工部吏部水赴海白公蘇公金在鎔深林二月亂桃李大江百怪騰蛟龍餘子我亦輕狹陋如公誰不懷朝宗恨不遭公問緒業微言日日開心胸莫訝投詩未相識平生一瓣曾南豐太倉孝亷吳樞字大年言其叔廩膳生某授徒學宫之側諸童子苦之時有乞兒曰張鬼子者形貌怪醜每夜宿城隍廟下乃羣往商於鬼子欲其暮夜假鬼物以駭之鬼子曰諾然必得硃書符票如官司勾攝狀乃可衆如其言一日日未晡吳方危坐鬼子忽從忩入持符示吳曰奉命勾汝吳素識之曰汝乞兒張某何事相嬲鬼子曰冥司符在豈誑耶挾吳自忩徑出衆驚視吳已卒鬼子亦不復見毗陵一士大夫妻頗能詩既而納一姬處之别館夫人偵知將自往掩取之倉皇無計攜姬渡江假寓廣陵夫人追之至京口江岸不敢渡而歸一日座客述之余曰所謂長江天塹天之所以限南北也一座大笑吾郡遺文惟朝無咎北渚亭賦最為瑰麗有淮南小山之遺風其序曰北渚亭熙寧五年集賢挍理南豐曾侯鞏守齊之所作也蓋取杜甫宴歷下亭詩以名之風雨廢久州人思侯猶能道之後二十一年而祕閣挍理南陽朝補之來承守乏侯於補之丈人行辱出其後訪其遺文故事厪有存者而圃多大木歷下亭又其最高處也舉首南望不知其有山嘗登所謂北渚之址則羣峰屹然列於祠上城郭井閭皆在其下陂湖迤邐川原極望太息語客想見侯經始之意乃徹池南葦間壞亭徙而復之賦見雞肋集第二卷今水靣亭歷下亭皆在明湖之南而湖北水關之西有小圃傳為北渚亭故址尚有古屋數椽修竹數十竿其地瀕湖背城絶無高明爽塏之觀不知子固所創無咎所賦果此地否因讀雞肋集而識之俟訪諸故老俗人傳訛襲謬有絶可笑者兖州陽榖縣西北有冢俗呼西門冢有大族潘吳二氏自言是西門嫡室吳氏妾潘氏之族一日社會登臺演劇吳之族使演水滸記潘族謂辱其姑聚衆大鬨互控於縣令令大笑各撲一二人荷挍通衢硃批曰無恥犯人某某示衆然二氏終不悟也從姪鵷過陽榖親見之徐神翁謂蔡京曰天上方遣許多魔君下生人間作壞世界蔡曰安得識其人徐笑曰太師亦是按水滸傳傳竒首述誤走妖魔意亦本此然不識蔡京是為天罡是為地煞耳神翁語見錢氏私志朝無咎陌上花八首工妙不減蘇公其二篇云娘子歌傳樂府悲當年陌上看芳菲曼聲更緩何妨緩莫似東風火急歸荆王夢罷已春歸陌上花隨暮雨飛却喚江船人不識杜秋紅淚滿羅衣無咎將别歷下詩云來見紅蕖溢渚香歸途未變柳梢黃殷勤趵突溪中水相送扁舟向汶陽鴛鴦鸂鶒繞漁梁搖漾山光與水光不管使君征棹逺依然飛下舊池塘將行陪二車觀燈云行歌紅粉滿城歡猶作常時五馬看忽憶使君身是客一時揮淚逐金鞍譙郡對酒憶玉函山自注齊州西樓對此山云不遣西樓對此山宋譙頻綴副車銜今年重汚花前酒猶是揚州别駕衫蘇潁濱從事吾郡作閔子祠堂記濼源石橋記又和孔武仲濟南四詠環波亭云過盡緑荷橋斷處忽逢朱檻水中央北渚亭云西湖已過百花汀未厭相攜上古城據此則北渚亭當在北城之上不疑鵲山亭檻泉亭檻泉即趵突也又和李誠之待制燕别西湖西湖即明湖之西偏曾子固詩亦稱西湖又西湖二詠又徐正權秀才城西溪亭云溪上路窮惟畫舫城中客至有罾魚徐石介之壻也又次韻李昭敘燕别湖亭又遊泰山四首初入南山云兹人謂川路今黃山鋪已南至泰山皆名川路故其下又云嘉陵萬壑底棧道百回屈崖巘互崢嶸征夫時出沒因川路以寄故鄉之思也四禪寺靈岩寺嶽下又舜泉復發又答徐正權謝示閔子廟記又舜泉詩四言序曰始余在京師聞濟南多甘泉流水被道蒲魚之利與東南比會其郡從事闕求而得之既至大旱問之其人云城南舜祠有二泉今竭矣明年夏雖雨而泉不作相與驚曰舜其不復享耶又明年夏大雨麥木薦登泉乃復發民歡曰舜其尚顧我哉泉之始發瀦為二池釃為石渠自東南流於西北無不被焉灌濯播灑蒲蓮魚鱉其利滋大因為詩使祠者歌之詩不具録按李公擇亦為齊守而歷下詩不多見惟潁濱集有和公擇赴歷下道中雜詠十二首耳公擇子由在齊正同時也潁濱棲賢寺記造語竒特雖唐作者如劉夢得柳子厚妙於語言亦不能過之入棲賢谷谷中多大石岌嶪相倚水行石間其聲如雷霆如千乘車行者震掉不能自持渡橋而東依山循水水平如白練橫觸巨石滙為大車輪流轉洶湧窮水之變石壁之址僧堂在焉狂峰怪石翔舞於簷上杉松竹箭橫生倒植蔥蒨相紏每大風雨至堂中之人疑將壓焉豫遊廬山至此然後知其形容之妙如丹青畫圖後人不能及也吾郡李文叔格非元祐黨人文士也其著作自洛陽名園記外不多見頃從墨莊漫録得其所著墨癖説及雜書二篇録之以備文獻云客出墨一函其製為璧為丸為手握凡十餘種以錦囊之詫曰昔李廷圭為江南李國主父子作墨絶世後二十年乃有李承晏又二十年有張遇自是無繼者自吾大父始得兩丸於徐常侍鉉其後吾父為天子作文章書碑銘法當賜金或天子寵異則以此易之余於是捧硯惟謹不敢議闕三字余用薛安潘谷墨三十餘年皆如吾意不覺少有不足不知所謂廷圭墨者用之當何如也他日客又出墨余又請其説甚辨余曰吁余可以不愛墨矣且子之言曰吾墨堅可以割然吾割當以刀不以墨也曰吾墨可置水中再宿不腐然吾貯水當以盆罌不以墨也客復曰凡世之墨不過二十年膠敗輒不可用今吾墨可百餘年不敗余曰此尤不足貴余墨當用二三年者何用百年客辭窮曰吾墨得多色凡用墨一圭他墨兩圭不逮余曰余用墨每一二歲不能盡一圭往往失去輒易墨未嘗苦少墨也客曰吾墨黑余曰天下固未有白墨雖然使其誠異他墨猶足尚乃使取硯屏人雜他墨書之使客自辨客亦不能辨也因恚曰天下竒物要當有識者余曰此正吾之所以難也夫碔砆之所以不可為玉魚目之所以不可為珠者以其用之才異也今墨之用在書茍有用於書與凡墨無異則亦凡墨而已烏在所可寶者嗟乎非徒墨也世之人不考其實用而眩於虛名者多矣此天下寒弱禍敗之所由兆也吾安可以不辨又雜書論左馬班韓云馬遷之視丘明如麗倡黠婦清歌緩舞間以諧笑傾蓋立至亦可喜矣然不如絶代之女却鉛黛曵縞紵施帷幄裴回微吟於高堂之上使淫夫穴隙窺之終不敢意其啓齒而一笑也班固之視馬遷如韓魏之壯馬短鬣大腹服千鈞之重以策隨之日夜不休則亦無所不至矣而曾不如騕裊之馬方且脫驤逸駕驕嘶顧影俄而縱轡一騁千里韓愈之視班固如十室之邑百家之聚有儒生崛起於蓬蓽之下詩書傳記鏘鏘常欲鳴於齒頰間忽遇奕世公卿不學無術之子弟乘高車從虎士而至雖鄙惡而體已下之矣又云余嘗與宋遐叔言孟子之言道如項羽之用兵直行曲施逆見錯出皆當大敗而舉世莫能當者何其橫也左丘明之於辭令亦橫自漢後千年惟韓退之之於文李太白之於詩亦皆橫者近得睂山篔簹谷記經藏記又今世橫文章也夫其橫乃其自得而離俗絶畦徑間者故衆人不得不疑則人之行道作文政恐人不疑耳又墨客揮犀云李格非善論文章嘗曰諸葛公出師表李令伯陳情表陶淵明歸來引沛然如肺肝流出殊不見有斧鑿痕數君子在後漢之末兩晉之間未嘗以文章名世而其詞意超邁如此蓋文章以氣為主氣以誠為主故老杜謂之詩史者其大過人在誠實耳輟耕録言或題畫曰特健藥不喻其義豫因思昔人如秦少遊觀輞川圖而愈疾而黃大癡曹雲西沈石田文衡山輩皆工畫皆享大年人謂是煙雲供養則特健藥之名不亦宜乎宋王安中履道作元旦致語云君子有酒多且旨得盡羣心化國之日舒以長對揚萬夀與余少時所夢同而小異聨對雖小道亦足見人才思門人殷彥來譽慶曩在京師集成語作一聨相贈云一時賢士皆從其遊天下文章莫大於是時稱其自然工妙又汪閣學丈漪灝一聨云尚書天北斗司寇魯東家人亦稱之從叔祖洞庭先生象咸明末官光祿寺署正擅草聖崇禎時嘗奉詔書御屏先王父尚書一日置酒召之酒闌諸孫競進乞書余時總角王父把酒命對句云醉愛羲之迹余應聲對云狂吟白也詩公大喜以巵賜之趙甥執端以元人畫二軸索題其一崇山大溪山水間多林木丹緑相錯中有草堂堂上二丈夫左右相向立左者抱琴中有繡墩墩上有盤盤中橫紅梅一枝階下二人控馬立不知何謂也其一士女惜花圖叢花片石豫昔藏江上女子周禧畫惜花春起早一幀似是臨摹此畫上方有潘純張雨倪瓚錢惟善四詩錢詩云庭院無人春已深東風吹老惜花心自知命薄難承寵不費長門買賦金頗有寄託豫少時有詠梅妃減字木蘭花一闋云天然姿媚比似梅花應不異一斛珍珠得似鮫人淚點無文園老去恨煞無人能解賦我見應憐不索長門買賦錢意各别而語相似康熙乙酉命詞臣廣續羣芳譜羣芳譜者先王父贈尚書方伯府君萬厯末被亓韓之黨齮齕歸田林下十年所著書也異代乃為九重所賞亦家世盛事不可不紀世謂宋文貞公鐡心石腸而賦梅花殊不類其為人愚按南卓羯鼓録云宋開府雖耿介亦深好色樂尤善羯鼓常與明皇論鼓事曰頭如青山峰手如白雨點云云大類教坊樂人語文貞豈宜有此文貞南和人葬沙河今二縣皆有祠香祖筆記卷十二
