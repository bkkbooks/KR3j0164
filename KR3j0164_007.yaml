body:
  text: 香祖筆記卷七刑部尚書王士禎撰越處女與勾踐論劔術曰妾非受於人也而忽自有之司馬相如答盛覽論賦曰賦家之心得之於内不可得而傳詩家妙諦無過此數語西京雜記戚夫人善鼓瑟擊筑歌出塞入塞望歸之曲此逺在十九首蘇李之前漢詩最古者惟此及安世房中歌耳晉樂志以為李延年造不知何據今在樂府横吹郭茂倩樂府詩所載則始六朝劉孝標王褒諸人而古辭不傳可惜也西京雜記杜子夏臨終作文曰魏郡杜鄴立志忠欵犬馬未陳奄先草露骨肉歸於后土魂無所不之何必故丘然後即化封於長安北郭此焉宴息按此即後人自祭文自譔墓誌之始三國志蘇則傳云仕宦不止執虎子虎子溺器也西京雜記言漢朝以玊為虎子侍中執之視玊杯象箸相萬矣而後世不議其奢僭何也太史公報任安書全軀保妻子之臣隨而媒孽其短漢書注師古曰媒如媒妁之媒孽如麯孽之孽又曰齊人謂麯餅為媒今吾鄉之語猶然然以媒作糜終不如作媒之古太史公傳司馬氏本程伯休父之後而劉歆以為史佚後又云遷作景帝本紀極言其短及武帝之過帝怒削去之後坐李陵下蠶室有怨言下獄死與傳皆不合未知歆何所据也曹孟徳作疑冢七十二又遺令婕妤伎人時時登銅雀臺望吾西陵墓田予常笑之謂操體魄果藏西陵即不必作疑冢既作疑冢體魄且不知散落何許雖望陵作伎寧復聞之可謂詐而愚矣故友劉考功公㦷董侍御玉虬皆為捧腹而韙之樂府詩云緑蛇含珠丹初讀之謂偶然語耳非有故實後觀鄴中記云魏宫中有緑蛇口有赤珠若梧子大甄后每梳妝則盤結一髻形於后前因效而為髻號靈蛇髻乃知樂府用此事也韻語陽秋載錢起贈杜牧詩今坊刻襄陽集有贈孟郊詩皆可一噱仙人屏絶塵壒游於太淸然如上元夫人欲嫁封陟紫素元君欲從任生之類殆不可曉至如文殊三處過夏一月在婬舍及婆子燒菴公案復是何理恐妄解禪縛適為俗人學鳩摩羅什一輩藉口也謝在杭文海披沙云虱瘕黄龍浴水治之應聲蟲雷丸及藍治之食肺系蟲獺爪治之膈食蟲藍汁治之人面瘡貝母治之唐牛僧孺人稱太牢楊虞卿稱少牢京師語曰太牢手少牢口謂牛善為文楊善言說也白樂天不失為賢者而黨於二牢未免為累每讀長慶集輒惜之不啻如癰疽瘠環耳道書多荒誕不經可為笑柄如謂牽牛娶織女借天帝二萬錢下禮久而不還被驅在營室之間此與段柯古天帝白鵲事類東坡守揚州始至即判革牡丹之會自云雖煞風景且免造業予少時為揚州推官舊例府僚迎春瓊花觀以妓騎而導輿太守節推各四人同知已下二人既竣事歸而宴飲仍令歌以侑酒府吏因縁為奸利予深惡之語太守一切罷去揚人一時誦美之與坡公事頗相似附識於此東坡先生知登州問徐神翁學道之要答曰勿作官即好及南遷過海潁濵曰吾兄知信其言而不能用也左思賦古度君遷北户録云古度樹一呼䢷子故閩清林先輩茂之名古度字䢷子也南人义號曰柁日亞反其實大如櫻桃黃即可食過則化蛾及蚊飛去北方有無核棗嶺南無核茘支有大如鷄卵者其肪瑩白如水精鹽煑於海惟河東寧夏有鹽池紅鹽池滇蜀有黒白鹽井河間鹽山縣以地産鹽故名非有山也獨元人西使記言過殢掃兒城徧山皆鹽如水精狀此則真鹽山耳虛谷閒鈔云徐太尉彦若赴廣南將渡小海於淺瀨得一琉璃瓶子中有龜長可一寸往來旋轉畧無暫已有胡人識之曰龜寶也詩集句起於宋石曼卿王介甫皆為之李龏至作剪綃集然非大雅所尚近士大夫競以詩牌集字牽凑無理或至刻之集中尤可笑荆芥穗為末以酒調下三錢治中風立愈治走馬疳用瓦壟子比蚶子差小用未經鹽醬者連肉火煅存性置冷地用盞葢覆候冷取出碾為末滲患處又一方馬蹄燒灰入鹽少許滲患處治痘疹黒陷用沉香乳香檀香不拘多少放火盆内焚之抱兒於烟上熏之即起治惡瘡取冬𤓰一枚中截之先以一頭合瘡候𤓰熱削去再合熱減乃已又一方用蒜泥作餅瘡上炙不痛炙痛痛者炙不痛即止小兒耳後生瘡腎疳也地骨皮一味為末麤者熱湯洗之細者香油調搽已上諸方見蓼洲閒録唐徳宗使段善本授康崑崙琵琶奏曰且遣崑崙不近樂器十年忘其本領然後可教後乃盡段之藝知此者可與言詩矣嘗見一貴人買得柴窑盌一枚其色正碧流光四照價餘百金始憶陸魯望詩九秋風露越窑開奪得千峯翠色來可謂妙於形容唐時謂之秘色也南唐李主研山後歸米元章米與蘇仲恭學士家易北固甘露寺海嶽菴地宣和入御府事詳避暑漫鈔後又四百餘年不知更易幾姓而至新安許文穆國家已而歸嘉禾朱文恪國祚予戊辰春從文恪曾孫檢討彛尊京邸見之眞竒物也檢討請予賦詩既為作長句又題一絶句云南唐寶石刼灰餘長與幽人伴著書青峭數峯無恙在不須淚滴玉蟾蜍後二年復入京師則研山又為崑山徐司冦購去矣今又十五年不知尚藏徐氏否青峭數峰葢用南唐元宗語元章既失研山賦詩云研山不可見哦詩徒嘆息惟有玉蟾蜍向子頻淚滴皆用本亊也僧祐釋迦譜云懿摩王四子被擯到雪山住直樹林中四子生子王歡喜言此真釋子能自存立故名釋注釋迦為能譜又云在直樹林中故名為釋注梵語呼直亦曰釋别傳云此國有釋迦樹甚茂盛相師云必出國王因移四子立國因名釋種萊陽左公蘿石忠孝大節出于天性鄉人敬仰之稱大忠先生崑山徐章仲炯健菴尚書次子也嵗庚辰官山東提學允公議建大忠祠于其里首捐百金為倡一時皆樂佽助不浹嵗落成粗有次第而新令某適至方修衙署日遣胥役入祠取所庀甓石木植之屬鄉之紳士以為言令詬怒欲申請毁祠㑹章仲按萊考試令恐拂其創建之意乃詭辭以自白章仲因而慰之曰子勿慮第往具牲牢躬拜祭則浮議自息令如其指祠竟得無恙順治初吏部諸司郎官最為清要吳郡顧松交子咸蒨來贄俱以吏部郎里居賓客輻輳一日廣坐中一客忽曰二公所謂一顧傾人城再顧傾人國也客皆為之絶倒佛經幻妄有最不可究詰者如善慧菩薩自兜率天宫下作佛在摩耶夫人母胎中晨朝為色界諸天説種種法日中時為欲界諸天亦説諸法晡時又為諸鬼神説法於夜三時亦復如是雖稗官小説如西遊記者亦不至誕妄如是余官左都御史一日五鼔啓事候于中左門故吏部侍郎趙公玉峰士麟謂曰公真今日之泰山北斗也余曰何忽見推趙曰公為户部侍郎七年屏絶貨賄不名一錢夫人而知之至為御史大夫清風亮節坐鎮雅俗不立門户不急彈劾務以忠厚惇大培養元氣真朝廷大臣也抑亦今日藥石也余謝不敢當然數語實有關治體之論故追記之趙官浙江巡撫嘗開濬杭城市河代貧民償旗債萬餘金浙人至今尸祝之近日名臣也聞見雜録云韶州人于江邊得巨蚌剖之有珠大如彈丸光若水精中有北斗七星隠然可見納本州軍資庫揚州瓊花天下秖一株晏元獻守揚作無雙亭于其側宋徳祐乙亥北兵至花遂不榮趙棠國炎有詩曰他年我若修花史合傳瓊花烈女中然山房隨筆所記仁宗慶厯中常分植禁中輒枯比載還則鬱茂如故又何説耶貴州苗峒出沙板然彼中不甚貴重其最重者曰桂板有金桂水桂二種一如黄金間碧玉竹一如沈香之色嗅之如沈速香其木在地中横生長或丈餘短或三五尺大者或至數圍更無枝葉其生多在山根其上土色皆黄庶草不殖以鐵斸之堅而難入苗人解為板售之直較沙板數倍與宋人談藪所記大同小異談藪謂湖南亦然湖南與苗蠻風壤相接理合有之又謂平江即今蘇州大旱河水涸居人就河底掘井得沙板愈取愈多亦有得沈香者此則不可曉也古董字東坡作骨董晦菴作汩董見霏雪録上東巡幸曲阜謁至聖廟廟門外降輦步行行三拜禮留御前曲柄繖於大成殿命家祭即陳設之古今未睹之異數也事詳幸魯盛典按宋故事天子謁孔廟止行肅揖之禮慶厯四年五月仁宗特行再拜禮乃知先聖後聖其揆一也盛典衍聖公孔毓圻疏請翰林院庶吉士孫致彌乙丑進士金居敬金予之門人纂修書成金已前授靈丘縣知縣卒於官孫先以無妄詿誤至是復官授編修云木鱉子入藥能殺人見霏雪録康熙己卯南廵視河工廻蹕有御製詩云行徧江南水與山栁舒花放鳥綿蠻明朝又入邳徐路鳯闕龍樓計日還會予以御史大夫被㫖與大司徒陳公廷敬大宗伯張公英大司空王公鴻緒入直南書房因獲恭睹共嘆為太平和吉之音云吕宋國所產烟草本名淡巴菰又名金絲薰余既詳之前卷近京師又有製為鼻烟者云可明目尤有辟疫之功以玻瓈為缾貯之缾形象種種不一顔色亦具紅紫黃白黒緑諸色白如水晶紅如火齊極可愛翫以象齒為匙就鼻嗅之還納於缾皆内府製造民間亦或仿而為之終不及古來兼官皆以大兼小明初大學士學士皆五品其後加尚書侍郎始為二品三品故明初三楊輩結銜皆云某部尚書兼某殿閣大學士今内閣結銜移大學士於上而云兼某部尚書學士兼侍郎亦然與古制異甲申七月門人李子來先復自奉天少京兆遷少廷尉歸京師遺松花硯一紺色白文徧體作雲錦形試之細潤宜墨類端溪之下嵓後有續硯譜者品當列洮河龍尾紅絲之上李林甫外傳言有術士說安禄山常有五百銅頭鐵額人侍其左右一日請林甫宴令術士窺之見一童子捧香爐而入五百人皆走避云云又言道士許林甫三百年後白日上昇及為相二十年復見之云相公所行多不合道更六百年乃如約矣信如所云是天上神仙必需此不忠不孝之人義何所取而小說往往記林甫後身有為牛為倡之說詎盡誣耶唐高宗將立武氏謀之李勣對曰此陛下家事明皇將廢太子瑛兄弟未决李林甫亦曰家事何必問外人姦臣誤國先後一轍如此予以順治八年辛卯中鄉試闈牘為座主蒲阪御史大夫杜公篤祐字振門房師夀春侍御夏公人佺字敬孚所賞異已定解元三日矣有丘縣令李應軫者高郵人與夏公為淮南鄉里年七十矣私於夏公曰某老矣日暮途逺使元出本房差慰遲暮公能相讓則奕世之感也請至再三夏公乃許之其首薦即昌樂滕國相字和梅也已擬第六與予皆習毛詩杜公甚難之而李請益堅杜憐其意遂改予第六而滕得元時滕年近六十予年始十八耳榜後旅謁杜公頗悔之語予以前事且曰予文合作元此亦命也予初不以屑意其後十年而予銓授揚州府推官李以兵部主事告老家居年八十餘矣其子為州役窘辱屬子讞其事李憶往事殊惴惴予顧力直其子而痛懲州役且戒州守呉君之俊後為東昌府知府以李公高年家居有司宜加禮呉詣李道予意李感泣遂通聞問陳謝如平生交凡子一生報徳不蓄怨皆此類唐摭言載裴垍舉宏辭崔樞考之被落及垍為宰相擢樞為禮部笑謂樞曰聊以報徳予不敢妄擬古人其存心寧厚勿薄庶不愧耳偶書之以示子孫邯鄲人侯二素不孝其母以米施乞者二見而怒痛捶而逐之妻子泣諌不聽未幾二遍體生毒瘡潰爛而死夢告其子曰我以忤逆不孝罸往京師宣武門西車子營張二家作豬汝可速往贖歸遲無及矣子如其言至京師宣武門訪張氏果有牝豕適生數子其一豕身人面有髭貎如其父子痛哭述其故願以十金贖歸張不聽而殺之此康熙三十九年事四川逹州民某兄弟二人甚友愛弟未授室而他出其兄賣身得十二金為弟聘婦弟歸娶知兄賣身事乃相持而泣遣其婦往母家取原聘金為兄贖身湖南流民二人某某知其事尾之中途擊婦死而攫其金忽迅雷大震擊二人立斃其尸羅跪於婦家之門手中持十二金頃之婦復甦歸至其家則二人者已先跪門外矣婦語其故兄弟鄰里及州人來觀者如堵莫不嘆異以為孝友强暴之報施不爽如此予丙子奉使祭告西嶽於玉泉院見無憂樹四株後閲内典頻頭婆羅王立瞻婆國婆羅門女為第一夫人生子名無憂又生子名離憂其無憂即阿育王也後王出外園遊戯見一無憂樹華極敷盛王見已此華樹與我同名心大歡喜葢此樹與青柯坪婆羅樹皆西域種然西嶽乃道士所宅絶無蘭若不知以何因縁而有此樹又釋迦譜毘婆尸佛有執事弟子名無憂唐劉希夷汝陽潭詩魚鱗可憐紫鴨毛自然碧寫物最工然非初唐人語已似皮陸予近詠寓邸西齋叢竹有句云冉冉紫雲葢翻翻紅鵲尾自謂不減劉語本朝新進士臚傳後自鼎甲授翰林修撰編修外餘皆引見欽選庶吉士分清漢書與鼎甲三人一體教習順治間定例清書者陞内閣學士漢書者陞京堂官或徑陞侍郎如程其相芳朝以丁亥榜眼及第至侍讀學士陞太常寺卿左䖍孫敬祖以己丑㑹元至侍讀學士陞通政使臨朐馮易齋相國溥以讀學陞吏部侍郎錢塘黄次辰相國機以讀學陞禮部侍郎是也如勝國甲科即不拘此例故王宗伯敬哉宗簡白司宼東谷印謙高侍郎念東珩胡學士此菴統虞諸公皆為三院學士三院者國史秘書𢎞文院也庶吉士則專隸𢎞文既設内閣遂罷三院不設而别立翰林院以學士掌之劉宋忠武公沈慶之詩朽老筋力盡徒歩還南岡辭榮此聖世何愧張子房按客座贅語云周子隱讀書臺下舊為光宅寺乃梁武帝故居其地又名南岡六朝士大夫多居之武帝評書云南岡士夫徒尚風軌不免寒乞正指此乃知沈所居在南岡非泛設耳古有通鳥語牛馬語者梁廷尉卿沈僧昭先為山隂令與會稽太守武陵王紀校獵中道而返左右問其故答曰國家有邉事當還處分問何以知之曰向聞南山虎嘯故知耳俄而使至是知鳥獸莫不能語者釋氏戒殺厥有㫖哉本朝翰林遷吏禮二部侍郎例兼翰林院學士至尚書則不復兼按明萬厯中王三渠用賓官南京吏書仍兼翰林院學士此其同而異者也若霸州郝恭定惟訥合肥龔端毅鼎孳二公皆不由翰林而為禮書董禮侍安國則旗下人不由科甲錢唐高禮侍士竒則以供奉内庭久特加少宗伯未嘗視部事也康熙初予自揚州入為禮部主事時蘇松詞林甚少現任數公又皆以奏銷一案詿誤京堂至三品者亦止華亭宋副都直方徵輿一人迄今三十載乃極盛其他無論即狀元鼎甲駢肩接踵而身兼會狀兩元者如癸丑韓宗伯慕廬菼丙辰彭侍講訪濂定求乙丑陸侍講澹成肯堂皆是也他如翰林臺省尤衆地氣盛衰信有時哉近日地氣自江南至江北而揚州為極盛如甲戌顧圖河江都人榜眼及第庚辰季愈寶應人榜眼及第癸未王式丹亦寶應人會狀兩元及第一時稱科名盛事前此未有也江淮以北鼎甲甚不易得葢自明時已然然如直隸之滄州順治丙戌吕讀學顯祖乙未戴少叅王綸皆榜眼及第河南柘城縣康熙甲辰李侍郎元振庚辰王編修露一榜眼及第一探花及第露即㑹元也滄州又有丁亥㑹元李人龍官内閣中書舍人然則堪輿家言信有徴矣陳後主賚天台智者大師物有中藤紙一墮葢六朝語沈后書有赤松澗米五石隋煬帝所嚫衣物又有南榴夾膝桃一枚柹心筆格一枚篆字榖皮屏風一具鵄納袈裟一領絲布祗支二領銅搔勞一口布三十禪鳥獸羽毛之竒異者如紅紫鸚鵡五色鸚鵡紅鴿紅鳩鵝兒黄馬桃紅瓣㸃子花馬朱毛虎山水文豹硃砂䑕緑蝴蝶予或見或聞雜記於池北偶談居易録二書近日京師金魚顔色種種變化尤為艶異而白魚硃砂㸃或在首或在背或在尾置之盆池游泳噞喁粲若錦綺信生物之不可測也聞又有藍其色者惜未見至於鴿之屬兎之屬亦多異種不能悉記又顧鄰初客座贅語云全椒學博王忠徴曾以禱雨見紅鵞疑是神物非世所恒有萊陽姜如農埰别墅有紅鵞館陳其年維崧檢討詩餘有紫鵞橋未詳出處不敢輒書杜堇字古狂按字書堇具吝切即烏頭也其汁飲之能殺人故唐明皇取其汁以毒張果齒盡黒用以取名真狂士矣𢎞治五年南直隸鄉試劉尚書南坦麟以武學生中式十四年鄉試陳翰林魯南沂以太醫院醫生中式二公名碩而皆以雜流入試所未解也此例至嘉靖中始革去予於明代郡縣志書祇取關中諸公所纂如武功平凉朝邑華州等十餘種此外惟崔後渠安陽志章楓山蘭谿志馬應龍安丘志邢子愿武定州志史蓮勺紀事介休志不失史法偶觀顧東橋與陳魯南論修志書云嚴介谿袁州志都元敬黄山圖經李懋卿東莞志邵二泉許州志各有義例須取叅訂已上諸志則又予所未聞未見者東橋先生平生傲睨相嵩及撫楚被㫖修奉天志大又忤世宗真所謂豪傑之士矣登髙能賦自是佳話若蘭亭之集古今艶之然詩不成受罰者若干人殊煞風景乃亦有不識字不成詩傳之於後反成佳話者如唐人韋蟾嘲李瑒詩渭水秦川照眼明希仁何事寡詩情料應學得虞姬壻書字才能記姓名宋人釣臺詩諸老凋零極可哀尚留名字壓崔巍劉郎可是疎文墨㡬㸃胭脂涴緑苔政使希仁題詩光世能書亦復尋常未必如此令人解頤也遯園居士言金陵盛仲交家多藏書書前後副葉上必有字或記書所從來或記他事往往盈幅皆有鈐印常熟趙定宇少宰閲舊唐書每卷畢必有硃字數行或評史或閲之日所遇某人某事一一書之馮具區校刻監本諸史卷後亦然并以入梓前輩讀書游泳賞味處可以想見此語良然予所見劉欽謨昌官河南督學時所刻中州文表每卷亦然予勸宋牧仲開府重刻文表及梁園風雅二書且云欽謨諸䟦當悉刻之以存其舊亦遯園先生之意又甞觀袁中郎所刻宗鏡摘録亦復如是弇州先生讀書後同此意也金陵許尚寳石城先生榖年二十中嘉靖乙酉鄉試乙未南宫第一夀八十餘及見萬厯乙酉後輩近上海姚方伯通所先生永濟萬厯戊戌進士夀近百歳及見順治戊戌後輩姚公與先祖贈尚書公為浙藩左右使同僚夀亦相埒鼎革後尚有書問往來今又五十餘年往矣予年十八以順治八年辛卯中鄉試至今康熙四十三年甲申已五十四年去辛卯止八載耳不知假我數年猶及見之否然釋氏石火電光之喻信有然矣戊戌同年呉侍讀黙岩對全椒人榜眼及第詩未入格而頗有勝情予官揚州時常與共客儀真一日過予客園置酒酒間作擘窠大字及便面數事皆即事漫興之語令人解頤尚記其一則云少陵云一洗萬古凡馬空東坡云筆所未到氣已吞才人須具此胸次落筆自爾不凡惟阮亭可以語此頃之予衣領上偶見一蟻即又云宰官衣領驀上一蟻子此正須耐煩以為勝俗客耳雖偶然游戯皆有理趣久之露坐月色皎然賦絶句云如此青天如此月兩人須問大江秋予和之得四首翰林兄弟皆名士廨屋三間分兩頭及第綾綾分餅日閉門黄葉著書秋鳴㠊園中小山名斜日森碧篠人影參差曲岸頭頃刻疾書兩丸墨山蟬墮地數聲秋又二首不具録詳鑾江倡和集焦山瘞鶴銘或云王右軍書或云陶貞白或云顧况而周暉金陵瑣事言唐李石續博物志陶隠居書自竒世傳畫板帖及焦山瘞鶴銘皆其遺跡顧元慶作瘞鶴銘考厯引黄長睿以至都元敬諸家之説斷以為陶書而未及引此證之予門人淮隂張力臣弨作瘞鶴銘辯援据甚博予以遺新安張山來潮刻叢書中不記引此否也金陵瑣事云神樓乃劉南坦尚書製為修煉者用篾編成似陶靖節之籃輿懸於屋梁僅可弓臥其上下收放之機皆自握之不須他人文徴仲冩其圖諸詞人多詠歌之皆不得其㫖按清恵好樓居而力不能搆文徴仲作神樓圖以遺之又升菴先生後神樓曲序亦然曲中仙人五城十二樓等句亦未詳其形製何如皆所云不得其㫖者也予嘗謂古人詩且未論時代但開卷㸔其題目即可望而辯之如魏晋人製詩題是一様宋齊梁陳人是一様初盛唐人是一様元和以後又是一様北宋人是一様蘇黄又是一様明人製題汎濫漸失古意近則年伯年文公祖父母俚俗之談盡竄入矣詩之雅俗又何論乎詩題有一二字不古遂分雅俗如古人祇有同韻和韻而今人則改作歩韻武韻矣古祗有絶句今人則改作截句矣古人贈答或云以詩贈之以詩寄之今則改詩以贈之詩以寄之矣此類未易更僕但取古人集觀之雅俗自辨當以三隅反也江寧有西域賈胡見人家几上一石欲買之凡數至主人故髙其直未售也一日重磨洗冀増其價明日賈胡來驚嘆曰此至寶惜無所用矣石列十二孔按十二時辰每交一時輙有紅蟢子布網其上後網成前網即消乃天然日晷也今蟢子磨損何所用之不顧而去史癡翁金陵人佯狂玩世工詩畫樂府妻號樂清道人姬人何號白雲善畫工篆書通音律琵琶得兩京國工張禄之傳翁每製一曲即命白雲被之絃索嘗訪沈石田於呉中不值見堂中坐絹素尚未渲染輙濡墨縱筆作山水不題姓名而去石田歸見之曰吾呉中無如此人必金陵史癡也亟追邀之相見一笑留石田家三月而後返明代册使至諸藩府藩王以刺迓之於郊刺稱某王拜三字而已應天鄉試榜後魏國公例設宴中山府第邀集新舉人亦惟書魏國公拜四字於刺不書姓名余少時官廣陵與諸名勝修禊紅橋即席賦冶春詩二十四首陳其年後至贈余詩曰玉山筵上頽唐甚意氣公然籠罩人劉公㦷曰采明珠耀桂旗麗矣或率而兒拜或揚袂從風如欲仙去冶春詩獨歩一代不必如鐵厓遁作别調乃見姿媚也香祖筆記卷七
